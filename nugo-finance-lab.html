<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nugO Personal Finance Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--card:#0e1320;--border:#1a2640;
  --accent:#00c896;--as:#00c89618;
  --gold:#f5b731;--gs:#f5b73118;
  --red:#f04060;--rs:#f0406018;
  --blue:#3d9eff;--bs:#3d9eff18;
  --purple:#a875f0;--ps:#a875f018;
  --orange:#ff7c3a;--os:#ff7c3a18;
  --teal:#00d4d4;--ts:#00d4d418;
  --pink:#ff6eb4;--pks:#ff6eb418;
  --green:#4cdb8a;--grs:#4cdb8a18;
  --text:#ddeeff;--muted:#7a90b0;--dim:#374a66;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
input,select,textarea{font-family:'Syne',sans-serif;}
button{font-family:'Space Mono',monospace;cursor:pointer;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes diceShake{0%{transform:rotate(-10deg)scale(1.12)}50%{transform:rotate(10deg)scale(0.91)}100%{transform:rotate(-5deg)scale(1.05)}}
@keyframes cardReveal{0%{opacity:0;transform:scale(0.85)translateY(12px)}100%{opacity:1;transform:scale(1)translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp 0.32s ease forwards;}
.shake{animation:diceShake 0.07s infinite;}
.reveal{animation:cardReveal 0.4s ease forwards;}
#app{max-width:720px;margin:0 auto;padding:0 16px 80px;}
#hdr{background:linear-gradient(180deg,#0d1520,transparent);padding:20px 18px 0;margin-bottom:6px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
#hdr-inner{max-width:720px;margin:0 auto;}
.hdr-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.logo-box{background:var(--as);border:1px solid #00c89633;border-radius:11px;padding:7px 13px;font-size:19px;flex-shrink:0;}
.logo-title{color:var(--accent);font-weight:900;font-size:16px;letter-spacing:-0.5px;}
.logo-sub{color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:1.5px;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.save-flash{color:var(--accent);font-size:10px;font-weight:700;display:flex;align-items:center;gap:3px;}
.prog-wrap{margin-top:14px;margin-bottom:2px;}
.prog-bar{display:flex;gap:2px;}
.prog-seg{flex:1;height:4px;border-radius:99px;background:var(--border);transition:background .3s;}
.prog-labels{display:flex;justify-content:space-between;margin-top:4px;}
.prog-labels span{color:var(--muted);font-size:9px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:0 2px 20px #00000055;}
.glow-accent{border-color:#00c89655!important;box-shadow:0 0 28px #00c89622!important;}
.glow-gold{border-color:#f5b73155!important;box-shadow:0 0 28px #f5b73122!important;}
.glow-teal{border-color:#00d4d455!important;box-shadow:0 0 28px #00d4d422!important;}
.glow-purple{border-color:#a875f055!important;box-shadow:0 0 28px #a875f022!important;}
.glow-blue{border-color:#3d9eff55!important;box-shadow:0 0 28px #3d9eff22!important;}
.glow-green{border-color:#4cdb8a55!important;box-shadow:0 0 28px #4cdb8a22!important;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.col{display:flex;flex-direction:column;gap:15px;}
.stat{text-align:center;}
.stat .val{font-family:'Space Mono',monospace;font-weight:800;line-height:1;}
.stat .lbl{color:var(--muted);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
.badge{display:inline-block;border-radius:99px;font-weight:700;white-space:nowrap;}
.pbar-wrap{background:#151f35;border-radius:99px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:99px;transition:width 1s cubic-bezier(.4,2,.6,1);}
.inp-wrap{display:flex;flex-direction:column;gap:5px;}
.inp-label{color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.inp-hint{color:var(--dim);font-size:10px;margin-top:-3px;}
.inp-row{display:flex;align-items:center;background:#080c18;border:1px solid var(--border);border-radius:9px;overflow:hidden;}
.inp-pre{color:var(--muted);padding:9px 11px;background:#111825;font-size:12px;border-right:1px solid var(--border);}
.inp-suf{color:var(--muted);padding:9px 11px;font-size:11px;}
.inp-row input,.inp-row select{flex:1;background:transparent;border:none;outline:none;color:var(--text);padding:9px 13px;font-size:14px;font-family:'Space Mono',monospace;width:100%;}
.btn{border-radius:10px;font-weight:800;font-size:12px;letter-spacing:.3px;transition:opacity .15s,transform .1s;border:none;}
.btn:hover{opacity:.85;transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.btn.primary{background:var(--accent);color:#060a12;}
.btn.gold{background:var(--gold);color:#060a12;}
.btn.ghost{background:transparent;color:var(--accent);border:1px solid #00c89655;}
.btn.purple{background:var(--purple);color:#fff;}
.btn.blue{background:var(--blue);color:#060a12;}
.btn.teal{background:var(--teal);color:#060a12;}
.btn.red{background:var(--red);color:#fff;}
.btn.dark{background:#151f35;color:var(--muted);border:1px solid var(--border);}
.btn.green{background:var(--green);color:#060a12;}
.btn.sm{padding:6px 14px;font-size:11px;}
.btn.md{padding:9px 20px;}
.btn.lg{padding:13px 28px;font-size:14px;}
.btn.xl{padding:15px 38px;font-size:16px;}
.btn.full{width:100%;}
.toggle{width:42px;height:22px;border-radius:99px;cursor:pointer;position:relative;transition:background .2s;border:none;flex-shrink:0;}
.toggle .knob{position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.tab{background:#0a0e1a;color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Space Mono',monospace;transition:all .13s;}
.dice-face{width:72px;height:72px;border-radius:14px;font-size:42px;display:flex;align-items:center;justify-content:center;transition:border-color .3s,background .3s,box-shadow .3s;flex-shrink:0;}
.round-hdr{border-radius:14px;padding:14px 17px;margin-bottom:15px;display:flex;gap:13px;align-items:center;}
.profile-opt{border-radius:13px;padding:14px;cursor:pointer;transition:all .13s;border:2px solid var(--border);background:var(--card);}
.profile-opt.sel{border-color:var(--accent);background:var(--as);}
.option-card{border-radius:13px;padding:15px;cursor:pointer;transition:all .13s;border:2px solid var(--border);}
.option-card.sel{border-color:var(--accent);background:var(--as);}
.modal-overlay{position:fixed;inset:0;background:#000000bb;z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--card);border-radius:20px;padding:26px;max-width:480px;width:100%;animation:slideDown .25s ease;}
.modal-progress{display:flex;gap:5px;margin-bottom:20px;}
.modal-prog-seg{flex:1;height:3px;border-radius:99px;cursor:pointer;transition:background .3s;}
.resume-banner{background:linear-gradient(135deg,#0e1a10,#0a1520);border:1px solid #00c89655;border-radius:14px;padding:14px 17px;display:flex;align-items:center;gap:13px;margin-bottom:16px;}
.cert{background:linear-gradient(135deg,#1a1300,#0e1a0a);border:1px solid #f5b73155;border-radius:16px;padding:26px 18px;text-align:center;}
.budget-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--border);}
.budget-row .lbl{flex:1;font-size:13px;}
.budget-row .amt{font-family:'Space Mono',monospace;font-weight:700;font-size:13px;min-width:70px;text-align:right;}
.budget-row .pct{color:var(--muted);font-size:10px;min-width:35px;text-align:right;}
.debt-card{border-radius:12px;padding:13px 15px;border:1px solid var(--border);margin-bottom:8px;transition:all .15s;}
.invest-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-top:1px solid var(--border);}
.month-ev{border-radius:14px;padding:14px 17px;display:flex;align-items:center;gap:13px;margin-top:12px;}
.nw-row{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--border)22;font-size:12px;}
.audit-item{border-radius:11px;padding:12px 14px;border:1px solid var(--border);margin-bottom:8px;transition:all .15s;}
.score-row{margin-bottom:12px;}
.stmt-row{display:flex;justify-content:space-between;padding:7px 0;border-top:1px solid #1a264022;font-size:12px;}
.life-banner{background:linear-gradient(135deg,#0e1730,#131b2e);border:1px solid var(--blue)33;border-radius:13px;padding:13px 16px;display:flex;align-items:center;gap:12px;}
@media(max-width:500px){.g4{grid-template-columns:1fr 1fr;}.g3{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-inner">
    <div class="hdr-row">
      <div class="logo-box">💰</div>
      <div><div class="logo-title">nugO Personal Finance Lab</div><div class="logo-sub">12-Month Life Simulation · Budgeting · Financial Audit</div></div>
      <div class="hdr-right">
        <div id="save-flash" class="save-flash" style="display:none">💾 Saved</div>
        <button class="btn dark sm" onclick="openHTP()" style="background:var(--ps);border:1px solid var(--purple)55;color:var(--purple)">❓ How to Play</button>
        <div id="prof-hdr" style="display:none;text-align:right">
          <div id="prof-hdr-name" style="color:var(--gold);font-weight:800;font-size:12px"></div>
          <div id="prof-hdr-type" style="color:var(--muted);font-size:9px"></div>
        </div>
      </div>
    </div>
    <div id="prog-wrap" class="prog-wrap" style="display:none">
      <div class="prog-bar" id="prog-bar"></div>
      <div class="prog-labels"><span id="prog-l">Round 1 of 19</span><span id="prog-r" style="color:var(--accent)">0%</span></div>
    </div>
  </div>
</div>

<div id="htp-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeHTP()">
  <div class="modal-box" id="htp-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div><div style="color:var(--teal);font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:1.5px">How to Play</div><div style="color:var(--muted);font-size:11px;margin-top:2px" id="htp-step-lbl">Step 1 of 10</div></div>
      <button class="btn dark sm" onclick="closeHTP()">✕ Close</button>
    </div>
    <div class="modal-progress" id="htp-dots"></div>
    <div id="htp-content"></div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button class="btn ghost sm" id="htp-prev" onclick="htpNav(-1)">← Back</button>
      <div style="flex:1"></div>
      <button class="btn blue md" id="htp-next" onclick="htpNav(1)">Next →</button>
    </div>
  </div>
</div>

<div id="app"><div id="screen"></div></div>

<script>
// ═══════════════════════════════════
// DATA
// ═══════════════════════════════════
const PROFILES = [
  {id:"grad",    icon:"🎓", label:"Recent Graduate",      desc:"First job, student loans, building credit",       income:3800, rent:1100, groceries:300, transport:200, utilities:120, debt:28000, debtRate:0.055, savings:500,  investPct:0.03, color:"var(--blue)"},
  {id:"family",  icon:"🏠", label:"Young Family",          desc:"Mortgage, kids, dual income, emergency fund",     income:7200, rent:1800, groceries:600, transport:500, utilities:220, debt:185000,debtRate:0.065, savings:4000, investPct:0.06, color:"var(--green)"},
  {id:"single",  icon:"🚗", label:"Single Professional",   desc:"Car payment, rent, investing, side hustle",       income:5500, rent:1400, groceries:350, transport:450, utilities:150, debt:12000, debtRate:0.08,  savings:2000, investPct:0.08, color:"var(--purple)"},
  {id:"student", icon:"📚", label:"College Student",       desc:"Financial aid, part-time job, budgeting basics",  income:1400, rent:600,  groceries:200, transport:100, utilities:60,  debt:8000,  debtRate:0.045, savings:200,  investPct:0.0,  color:"var(--gold)"},
  {id:"retire",  icon:"🏖️", label:"Pre-Retirement",        desc:"401k, paying off debt, healthcare planning",      income:8500, rent:1600, groceries:500, transport:300, utilities:200, debt:45000, debtRate:0.04,  savings:120000,investPct:0.15, color:"var(--orange)"},
  {id:"founder", icon:"💡", label:"Self-Employed",         desc:"Variable income, self-employment taxes, savings",  income:4200, rent:1300, groceries:380, transport:320, utilities:130, debt:22000, debtRate:0.09,  savings:3000, investPct:0.05, color:"var(--pink)"},
  {id:"buyer",   icon:"🏡", label:"First-Time Homebuyer",  desc:"Saving for down payment, credit score building",   income:5000, rent:1250, groceries:320, transport:280, utilities:140, debt:15000, debtRate:0.07,  savings:8000, investPct:0.04, color:"var(--teal)"},
];

const LIFE_EVENTS = [
  {id:"carbreak",  e:"🚗", t:"Car Broke Down",         d:"Unexpected repair bill this month.",                      ef:"expense", v:800,   lbl:"-$800 Repair",      c:"var(--red)"},
  {id:"medical",   e:"🏥", t:"Medical Bill",           d:"Surprise medical expense hit your budget.",                ef:"expense", v:600,   lbl:"-$600 Medical",     c:"var(--red)"},
  {id:"raise",     e:"📈", t:"Got a Raise!",           d:"Your employer increased your monthly salary.",             ef:"income",  v:300,   lbl:"+$300/mo Income",   c:"var(--accent)"},
  {id:"layoff",    e:"😰", t:"Hours Cut",              d:"Work hours reduced — lower income this month.",            ef:"income",  v:-500,  lbl:"-$500 Income",      c:"var(--red)"},
  {id:"theft",     e:"🚨", t:"Identity Theft Alert",   d:"Fraudulent charge — your bank refunds but delays cash.",   ef:"expense", v:400,   lbl:"-$400 Fraud Loss",  c:"var(--red)"},
  {id:"refund",    e:"💸", t:"Tax Refund Arrived!",    d:"Your tax refund hit your account this month.",             ef:"income",  v:1200,  lbl:"+$1,200 Refund",    c:"var(--gold)"},
  {id:"sidehustle",e:"💻", t:"Side Hustle Pays Off",   d:"Your side gig brought in extra cash.",                     ef:"income",  v:450,   lbl:"+$450 Side Income", c:"var(--accent)"},
  {id:"rentup",    e:"🏠", t:"Rent Increased",         d:"Landlord raised your rent starting this month.",           ef:"expense", v:150,   lbl:"+$150 Rent Hike",   c:"var(--red)"},
  {id:"bonus",     e:"🎉", t:"Year-End Bonus!",        d:"Your employer paid out a performance bonus.",              ef:"income",  v:1500,  lbl:"+$1,500 Bonus",     c:"var(--gold)"},
  {id:"invdip",    e:"📉", t:"Investment Dip",         d:"Market pulled back — portfolio value dropped temporarily.", ef:"invest",  v:-0.08, lbl:"-8% Portfolio",     c:"var(--orange)"},
  {id:"invgain",   e:"📊", t:"Investment Gains",       d:"Strong market month — portfolio gained value.",            ef:"invest",  v:0.06,  lbl:"+6% Portfolio",     c:"var(--accent)"},
  {id:"emergency", e:"🔥", t:"Home Emergency",         d:"Appliance broke or pipe burst — repair needed.",           ef:"expense", v:950,   lbl:"-$950 Emergency",   c:"var(--red)"},
  {id:"freelance", e:"🤝", t:"Freelance Project",      d:"Extra freelance work came your way this month.",           ef:"income",  v:700,   lbl:"+$700 Freelance",   c:"var(--accent)"},
  {id:"subscriptions",e:"📱",t:"Subscription Creep",  d:"You realized you've been overpaying on subscriptions.",    ef:"expense", v:120,   lbl:"-$120 Subscriptions",c:"var(--orange)"},
  {id:"foodinfl",  e:"🛒", t:"Grocery Prices Up",      d:"Inflation hit the grocery store hard this month.",         ef:"expense", v:100,   lbl:"+$100 Food Costs",  c:"var(--red)"},
  {id:"windfall",  e:"🎁", t:"Unexpected Windfall",    d:"Birthday gift, inheritance, or lottery scratch ticket win.",ef:"income",  v:500,   lbl:"+$500 Windfall",    c:"var(--gold)"},
  {id:"creditup",  e:"⭐", t:"Credit Score Boost",     d:"On-time payments boosted your credit score this month.",   ef:"credit",  v:15,    lbl:"+15 Credit Points", c:"var(--accent)"},
  {id:"creditdn",  e:"⚠️", t:"Missed Payment",         d:"You missed a payment — credit score took a hit.",          ef:"credit",  v:-25,   lbl:"-25 Credit Points", c:"var(--red)"},
  {id:"sale",      e:"🏷️", t:"Big Sale — Smart Buy",  d:"You found a great deal and saved on a planned purchase.",  ef:"expense", v:-200,  lbl:"-$200 Saved",       c:"var(--accent)"},
  {id:"pet",       e:"🐾", t:"Pet Vet Bill",           d:"Your furry friend needed an unexpected vet visit.",         ef:"expense", v:350,   lbl:"-$350 Vet Bill",    c:"var(--red)"},
];

const MONTH_NAMES=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DICE_FACES=["⚀","⚁","⚂","⚃","⚄","⚅"];
const TOTAL_ROUNDS=19;
const SAVE_KEY="nugo-finance-v1";

const HTP=[
  {icon:"🎓",title:"Round 1 — Choose Your Profile",color:"var(--accent)",body:"Pick a real-life financial scenario: Recent Graduate, Young Family, Single Professional, College Student, Pre-Retirement, Self-Employed, or First-Time Homebuyer. Each comes with real income, expenses, and debt levels."},
  {icon:"💵",title:"Round 2 — Set Your Numbers",color:"var(--gold)",body:"Customize your monthly income, rent, groceries, transport, and utilities. You also see your starting savings and debt balance. These become the foundation of every financial decision."},
  {icon:"📊",title:"Round 3 — Build Your Budget",color:"var(--blue)",body:"Use the 50/30/20 rule: 50% Needs, 30% Wants, 20% Savings & Debt. Allocate your monthly income across each category. The system shows whether your budget is balanced or if you're overspending."},
  {icon:"🛡️",title:"Round 4 — Emergency Fund",color:"var(--teal)",body:"Decide how many months of expenses to keep in your emergency fund. Financial experts recommend 3-6 months. You set your target and the system calculates how long it takes to reach it."},
  {icon:"💳",title:"Round 5 — Debt Strategy",color:"var(--red)",body:"Choose your debt payoff method: Avalanche (highest interest first — saves the most money) or Snowball (smallest balance first — builds momentum). The system calculates your payoff timeline and total interest paid."},
  {icon:"📈",title:"Round 6 — Credit Score",color:"var(--purple)",body:"Make credit decisions: pay on time, keep utilization low, avoid new hard inquiries. Your choices affect your simulated credit score throughout the 12 months — and some life events will also move your score."},
  {icon:"💼",title:"Round 7 — Investing",color:"var(--green)",body:"Allocate your investment dollars: 401(k) contribution %, Roth IRA, and stock index funds. The system uses compound interest to show your portfolio growth over 12 months — including market event impacts."},
  {icon:"📅",title:"Rounds 8–19 — 12 Months of Life",color:"var(--blue)",body:"Each round = one calendar month. You review your budget, then roll 2 dice. The sum auto-draws a life event — car breakdown, bonus check, medical bill, identity theft, investment gain, and more. No choice — just like real life."},
  {icon:"🧾",title:"Round 18 — Tax Filing",color:"var(--gold)",body:"File your simulated annual tax return. Based on your income, deductions, and filing status, the system calculates whether you owe taxes or get a refund. You'll practice W-2 and self-employment tax concepts."},
  {icon:"🔍",title:"Round 19 — Financial Audit",color:"var(--teal)",body:"Review your Net Worth Statement, budget performance, debt payoff progress, credit score journey, and investment growth. Complete the Financial Health Checklist and receive an official Financial Health Score with your Certificate."},
];

const AUDIT_CHECKS=[
  {id:"budget",    lbl:"Monthly budget was followed — spending within plan",          cat:"Budgeting",   risk:"high"},
  {id:"emergency", lbl:"Emergency fund reached target (3+ months expenses)",         cat:"Savings",     risk:"high"},
  {id:"debt",      lbl:"Debt balance decreased over the 12-month period",            cat:"Debt",        risk:"high"},
  {id:"credit",    lbl:"Credit score maintained or improved",                        cat:"Credit",      risk:"medium"},
  {id:"invest",    lbl:"Consistent investing contributions every month",             cat:"Investing",   risk:"medium"},
  {id:"savings",   lbl:"Personal savings rate is positive (not spending all income)",cat:"Savings",     risk:"high"},
  {id:"needs",     lbl:"Needs spending stayed at or below 50% of income",            cat:"Budgeting",   risk:"medium"},
  {id:"wants",     lbl:"Wants spending stayed at or below 30% of income",            cat:"Budgeting",   risk:"low"},
  {id:"networth",  lbl:"Net worth increased compared to starting position",          cat:"Net Worth",   risk:"high"},
  {id:"taxes",     lbl:"Tax filing completed — income and deductions recorded",      cat:"Taxes",       risk:"medium"},
  {id:"insure",    lbl:"Adequate insurance coverage maintained",                     cat:"Protection",  risk:"low"},
  {id:"goals",     lbl:"At least one financial goal was set and tracked",            cat:"Planning",    risk:"low"},
];

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let S={round:0,profile:null,months:[],auditChecks:{},strategy:{}};
let _profileId="grad",_htpStep=0,_auditTab="networth";
let _diceRolled=false,_chosenEvent=null,_diceInterval=null;

function saveGame(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({...S,savedAt:new Date().toLocaleString()}));const el=document.getElementById("save-flash");if(el){el.style.display="flex";setTimeout(()=>el.style.display="none",2200);}}catch(e){}}
function loadSave(){try{return JSON.parse(localStorage.getItem(SAVE_KEY)||"null");}catch{return null;}}
function clearSave(){try{localStorage.removeItem(SAVE_KEY);}catch{}}
function advance(){S.round++;if(S.round>0&&S.profile)saveGame();render();}

// ═══════════════════════════════════
// MATH
// ═══════════════════════════════════
const fmt  = n=>"$"+Math.abs(Math.round(n)).toLocaleString();
const fmtS = n=>(n>=0?"+":"−")+fmt(n);
const pct  = (a,b)=>b===0?"0%":Math.round((a/b)*100)+"%";
const clamp= (v,lo,hi)=>Math.min(hi,Math.max(lo,v));

function compoundGrowth(principal,rate,months){return principal*Math.pow(1+(rate/12),months);}
function calcNetWorth(p,months){
  const assets = p.savings + (months.length>0?months[months.length-1].savingsEnd||0:0);
  const invest  = p.investBalance||0;
  const debts   = p.debtBalance||p.debt;
  return {assets,invest,debts,net:assets+invest-debts};
}
function pickEvent(d1,d2,mi){
  const sum=d1+d2+2;
  return LIFE_EVENTS[((sum-2)*2+mi)%LIFE_EVENTS.length];
}

function calcScores(months,profile){
  if(!months.length) return {budget:0,savings:0,debt:0,invest:0,credit:0,total:0};
  const avgBalance=months.reduce((a,m)=>a+(m.savingsEnd||0),0)/months.length;
  const budget   =clamp(Math.round(50+avgBalance/100),0,100);
  const lastSav  =months[months.length-1].savingsEnd||0;
  const savings  =clamp(Math.round(Math.min(100,(lastSav/profile.savings)*80)),0,100);
  const lastDebt =months[months.length-1].debtBalance||profile.debt;
  const debtRed  =profile.debt-lastDebt;
  const debt     =clamp(Math.round(50+(debtRed/profile.debt)*80),0,100);
  const lastInv  =profile.investBalance||0;
  const invest   =clamp(Math.round(Math.min(100,(lastInv/5000)*80)),0,100);
  const creditSc =profile.creditScore||650;
  const credit   =clamp(Math.round((creditSc/850)*100),0,100);
  const total    =Math.round((budget+savings+debt+invest+credit)/5);
  return {budget,savings,debt,invest,credit,total};
}

const b  =(txt,fn,v="primary",sz="md",dis=false)=>`<button class="btn ${v} ${sz}" onclick="${fn}" ${dis?"disabled":""}>${txt}</button>`;
const bdg=(txt,color,sz="sm")=>`<span class="badge" style="background:${color}28;color:${color};border:1px solid ${color}44;padding:${sz==="lg"?"4px 14px":"2px 10px"};font-size:${sz==="lg"?13:11}px">${txt}</span>`;
const st =(lbl,val,color,sm=false)=>`<div class="stat"><div class="val" style="color:${color};font-size:${sm?14:20}px">${val}</div><div class="lbl">${lbl}</div></div>`;
const pb =(p,color,h=8)=>`<div class="pbar-wrap" style="height:${h}px"><div class="pbar-fill" style="width:${clamp(p,0,100)}%;background:${color}"></div></div>`;
const inp=(lbl,id,type="text",val="",pre="",suf="",hint="")=>{
  const pH=pre?`<span class="inp-pre">${pre}</span>`:"";
  const sH=suf?`<span class="inp-suf">${suf}</span>`:"";

};
const card=(c,cls="",style="")=>`<div class="card ${cls}" style="${style}">${c}</div>`;
const restartLink=()=>`<div style="text-align:center;margin-top:14px"><button onclick="if(confirm('Restart?'))restartFull()" style="background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:11px;font-family:'Space Mono',monospace;text-decoration:underline">↺ Restart from beginning</button></div>`;

function roundHdr(icon,rndNum,title,desc){
  const r=S.round;
  const isAudit=r===19; const isLife=r>=8&&r<=19; const isStrat=r>=3&&r<=7;
  const isTax=r===18; const isMonth=r>=8&&r<=19;
  const bgC=isAudit?"var(--ts)":isTax?"var(--gs)":isStrat?"var(--ps)":"var(--as)";
  const brdC=isAudit?"var(--teal)":isTax?"var(--gold)":isStrat?"var(--purple)":"var(--accent)";
  const moName=(r>=8&&r<=19)?MONTH_NAMES[r-8]:"";
  return `<div class="round-hdr" style="background:linear-gradient(135deg,${bgC},transparent);border:1px solid ${brdC}44">
    <div style="background:${bgC};border-radius:10px;padding:9px 11px;font-size:22px;flex-shrink:0">${icon}</div>
    <div style="flex:1">
      <div style="display:flex;gap:7px;margin-bottom:5px;flex-wrap:wrap">
        ${bdg("Round "+rndNum,"var(--accent)")}
        ${bdg("of 19","var(--dim)")}
        ${r>=8&&r<=19?bdg(moName,"var(--blue)"):""}
        ${isAudit?bdg("Final Round","var(--teal)"):""}
        ${isStrat&&!isTax?bdg("Strategy Round","var(--purple)"):""}
        ${isTax?bdg("Tax Filing","var(--gold)"):""}
      </div>
      <div style="font-size:16px;font-weight:900">${title}</div>
      <div style="color:var(--muted);font-size:11px;margin-top:2px">${desc}</div>
    </div>
    <button class="btn dark sm" onclick="openHTP()">❓</button>
  </div>`;
}

function updateHeader(){
  const pw=document.getElementById("prog-wrap"),ph=document.getElementById("prof-hdr");
  if(S.round===0){pw.style.display="none";ph.style.display="none";return;}
  pw.style.display="block";
  const bar=document.getElementById("prog-bar");
  bar.innerHTML=Array.from({length:TOTAL_ROUNDS},(_,i)=>{
    const done=i<S.round;
    const col=i===18?"var(--teal)":i>=7&&i<=17?"var(--blue)":i>=2&&i<=6?"var(--purple)":"var(--accent)";
    return `<div class="prog-seg" style="background:${done?col:i===S.round-1?col+"88":"var(--border)"}"></div>`;
  }).join("");
  document.getElementById("prog-l").textContent=`Round ${S.round} of ${TOTAL_ROUNDS}`;
  document.getElementById("prog-r").textContent=Math.round((S.round/TOTAL_ROUNDS)*100)+"%";
  if(S.profile){
    ph.style.display="block";
    document.getElementById("prof-hdr-name").textContent=S.profile.name;
    document.getElementById("prof-hdr-type").textContent=S.profile.profileLabel;
  }
}

function render(){
  updateHeader();window.scrollTo({top:0,behavior:"smooth"});
  const el=document.getElementById("screen");
  el.className="fu";void el.offsetWidth;
  if(S.round===0)       el.innerHTML=renderIntro();
  else if(S.round===1)  el.innerHTML=renderPickProfile();
  else if(S.round===2)  el.innerHTML=renderSetNumbers();
  else if(S.round===3)  el.innerHTML=renderBudget();
  else if(S.round===4)  el.innerHTML=renderEmergencyFund();
  else if(S.round===5)  el.innerHTML=renderDebtStrategy();
  else if(S.round===6)  el.innerHTML=renderCreditScore();
  else if(S.round===7)  el.innerHTML=renderInvesting();
  else if(S.round>=8&&S.round<=19) el.innerHTML=renderMonth(S.round-8);
  else if(S.round===20) el.innerHTML=renderAudit();
}

  const actualWants=S.strategy.wants||Math.round(inc*0.25);
  const actualSavings=S.strategy.savings||Math.round(inc*0.20);
  const total=actualNeeds+actualWants+actualSavings;
  const surplus=inc-total;

  return `
    ${roundHdr("📊","3","Build Your Budget","50% Needs · 30% Wants · 20% Savings & Debt")}
    <div class="col">
      ${card(`
        <div style="color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:12px">📐 The 50/30/20 Rule</div>
        <div class="g3">

          ${st("30% Wants",fmt(ideal.wants),"var(--blue)")}
          ${st("20% Save",fmt(ideal.savings),"var(--accent)")}

      <div class="card">
        <div style="color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:12px">📋 Your Budget Breakdown</div>
        <div class="budget-row">

          <div class="pct" style="color:${actualNeeds/inc>0.55?"var(--red)":"var(--muted)"}">${pct(actualNeeds,inc)}</div>
        </div>
        <div style="margin:5px 0">${pb((actualNeeds/inc)*100,actualNeeds/inc>0.55?"var(--red)":"var(--accent)")}</div>
        <div style="color:var(--dim);font-size:10px;margin-bottom:12px">Rent ${fmt(p.rent)} + Groceries ${fmt(p.groceries)} + Transport ${fmt(p.transport)} + Utilities ${fmt(p.utilities)}</div>
        <div class="budget-row">
          <div class="lbl" style="color:var(--blue)">🎮 Wants (Lifestyle)</div>
          <div class="amt" style="color:var(--blue)">${fmt(actualWants)}</div>
          <div class="pct">${pct(actualWants,inc)}</div>
        </div>
        ${inp("","wants-amt","number",actualWants,"$","","Dining out, entertainment, subscriptions")}

          <div class="amt" style="color:var(--accent)">${fmt(actualSavings)}</div>
          <div class="pct">${pct(actualSavings,inc)}</div>
        </div>
        ${inp("","save-amt","number",actualSavings,"$","","Emergency fund + investments + extra debt payments")}

        <div class="g4">

  const chosen=S.strategy.efMonths||3;

  return `

            <div style="color:${sel?"var(--teal)":"var(--text)"};font-weight:800;font-size:14px;margin:4px 0">${m} Mo</div>
            <div style="color:var(--gold);font-family:'Space Mono',monospace;font-size:11px">${fmt(amt)}</div>
          </div>`;
        }).join("")}
      </div>
      ${card(`
        <div style="color:var(--teal);font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:13px">🛡️ Emergency Fund Plan</div>

          ${st("Monthly Expenses",fmt(monthlyExp),"var(--muted)")}

function rollDice(mi){
  if(_diceRolled) return;
  let count=0;
  const d1=document.getElementById("d1"),d2=document.getElementById("d2"),ctrl=document.getElementById("dice-ctrl");
  ctrl.innerHTML=`<div style="color:var(--purple);font-weight:800;font-size:13px;animation:pulse 0.45s infinite">Rolling…</div>`;
  d1.classList.add("shake");d2.classList.add("shake");
  d1.style.border="2px solid var(--purple)";d1.style.background="var(--ps)";
  d2.style.border="2px solid var(--purple)";d2.style.background="var(--ps)";
  _diceInterval=setInterval(()=>{
    const r1=Math.floor(Math.random()*6),r2=Math.floor(Math.random()*6);
    d1.textContent=DICE_FACES[r1];d2.textContent=DICE_FACES[r2];count++;
    if(count>=20){
      clearInterval(_diceInterval);
      const f1=Math.floor(Math.random()*6),f2=Math.floor(Math.random()*6);
      d1.textContent=DICE_FACES[f1];d2.textContent=DICE_FACES[f2];
      d1.classList.remove("shake");d2.classList.remove("shake");
      d1.style.border="2px solid var(--gold)";d1.style.background="var(--gs)";d1.style.boxShadow="0 0 20px #f5b73166";
      d2.style.border="2px solid var(--gold)";d2.style.background="var(--gs)";d2.style.boxShadow="0 0 20px #f5b73166";
      const sum=f1+f2+2;
      const sumEl=document.getElementById("dice-sum");sumEl.style.display="flex";
      document.getElementById("sum-val").textContent=sum;
      ctrl.innerHTML=`<div style="display:flex;gap:8px">${bdg("Die 1: "+(f1+1),"var(--gold)")} ${bdg("Die 2: "+(f2+1),"var(--gold)")}</div>`;

}

  if(ev.ef==="credit")  creditAdj=ev.v;
  if(ev.ef==="invest")  investAdj=ev.v;
  const netIncome=monthlyIncome+incomeAdj;
  const netExpenses=monthlyExp+expenseAdj;
  const netSaved=netIncome-netExpenses-monthlyInvest-debtPay;
  const savingsEnd=prevSav+netSaved;
  const debtBalance=Math.max(0,prevDebt-debtPay);
  const investGrowth=prevInv*(1+(0.07/12))*(1+investAdj);
  const investBalance=investGrowth+monthlyInvest;
  const creditScore=Math.min(850,Math.max(300,prevCredit+creditAdj));
  S.months.push({month:mi+1,monthName:MONTH_NAMES[mi],netIncome,netExpenses,netSaved,savingsEnd,debtBalance,investBalance,creditScore,debtPay,monthlyInvest,event:ev});
  p.investBalance=investBalance;
  advance();
}

// HOW TO PLAY
// ═══════════════════════════════════
function openHTP(){_htpStep=0;renderHTP();document.getElementById("htp-modal").style.display="flex";}
function closeHTP(){document.getElementById("htp-modal").style.display="none";}
function htpNav(dir){_htpStep=Math.max(0,Math.min(HTP.length-1,_htpStep+dir));renderHTP();}
function renderHTP(){
  const s=HTP[_htpStep];
  document.getElementById("htp-step-lbl").textContent=`Step ${_htpStep+1} of ${HTP.length}`;
  document.getElementById("htp-dots").innerHTML=HTP.map((_,i)=>`<div class="modal-prog-seg" onclick="_htpStep=${i};renderHTP()" style="background:${i<=_htpStep?s.color:"var(--border)"}"></div>`).join("");
  document.getElementById("htp-content").innerHTML=`<div style="font-size:50px;text-align:center;margin-bottom:12px">${s.icon}</div><div style="color:${s.color};font-weight:900;font-size:16px;text-align:center;margin-bottom:10px">${s.title}</div><div style="color:var(--muted);font-size:13px;line-height:1.8;text-align:center">${s.body}</div>`;
  document.getElementById("htp-prev").style.display=_htpStep===0?"none":"inline-block";
  const nx=document.getElementById("htp-next");
  if(_htpStep===HTP.length-1){nx.textContent="Got it! 💰";nx.className="btn gold md";nx.onclick=closeHTP;}
  else{nx.textContent="Next →";nx.className="btn blue md";nx.onclick=()=>htpNav(1);}
  const box=document.getElementById("htp-box");
  box.style.borderColor=s.color+"55";box.style.boxShadow=`0 0 48px ${s.color}33`;
}
