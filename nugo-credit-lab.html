<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nugO Credit Simulation Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--card:#0e1320;--border:#1a2640;
  --accent:#3d9eff;--as:#3d9eff18;
  --gold:#f5b731;--gs:#f5b73118;
  --red:#f04060;--rs:#f0406018;
  --green:#4cdb8a;--grs:#4cdb8a18;
  --blue:#3d9eff;--bs:#3d9eff18;
  --purple:#a875f0;--ps:#a875f018;
  --orange:#ff7c3a;--os:#ff7c3a18;
  --teal:#00d4d4;--ts:#00d4d418;
  --text:#ddeeff;--muted:#7a90b0;--dim:#374a66;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
input,select,textarea{font-family:'Syne',sans-serif;}
button{font-family:'Space Mono',monospace;cursor:pointer;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes diceShake{0%{transform:rotate(-10deg)scale(1.12)}50%{transform:rotate(10deg)scale(.91)}100%{transform:rotate(-5deg)scale(1.05)}}
@keyframes cardReveal{0%{opacity:0;transform:scale(.85)translateY(12px)}100%{opacity:1;transform:scale(1)translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes scoreUp{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.fu{animation:fadeUp .32s ease forwards;}
.shake{animation:diceShake .07s infinite;}
.reveal{animation:cardReveal .4s ease forwards;}
#app{max-width:720px;margin:0 auto;padding:0 16px 80px;}
#hdr{background:linear-gradient(180deg,#060a14,transparent);padding:20px 18px 0;margin-bottom:6px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
#hdr-inner{max-width:720px;margin:0 auto;}
.hdr-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.logo-box{background:var(--as);border:1px solid var(--accent)33;border-radius:11px;padding:7px 13px;font-size:19px;flex-shrink:0;}
.prog-wrap{margin-top:14px;margin-bottom:2px;}
.prog-bar{display:flex;gap:2px;}
.prog-seg{flex:1;height:4px;border-radius:99px;background:var(--border);transition:background .3s;}
.prog-labels{display:flex;justify-content:space-between;margin-top:4px;}
.prog-labels span{color:var(--muted);font-size:9px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:0 2px 20px #00000055;}
.card.blue{border-color:var(--blue)55;box-shadow:0 0 28px var(--blue)22;}
.card.gold{border-color:var(--gold)55;box-shadow:0 0 28px var(--gold)22;}
.card.green{border-color:var(--green)55;box-shadow:0 0 28px var(--green)22;}
.card.red{border-color:var(--red)55;box-shadow:0 0 28px var(--red)22;}
.card.purple{border-color:var(--purple)55;box-shadow:0 0 28px var(--purple)22;}
.card.teal{border-color:var(--teal)55;box-shadow:0 0 28px var(--teal)22;}
.card.dark{background:#080c18;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;}
.col{display:flex;flex-direction:column;gap:15px;}
.stat{text-align:center;}
.stat .val{font-family:'Space Mono',monospace;font-weight:800;line-height:1;}
.stat .lbl{color:var(--muted);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
.badge{display:inline-block;border-radius:99px;font-weight:700;white-space:nowrap;}
.pbar{background:#151f35;border-radius:99px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:99px;transition:width 1.2s cubic-bezier(.4,2,.6,1);}
.inp-wrap{display:flex;flex-direction:column;gap:5px;}
.inp-label{color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.inp-hint{color:var(--dim);font-size:10px;}
.inp-row{display:flex;align-items:center;background:#080c18;border:1px solid var(--border);border-radius:9px;overflow:hidden;}
.inp-pre{color:var(--muted);padding:9px 11px;background:#111825;font-size:12px;border-right:1px solid var(--border);}
.inp-suf{color:var(--muted);padding:9px 11px;font-size:11px;}
.inp-row input,.inp-row select{flex:1;background:transparent;border:none;outline:none;color:var(--text);padding:9px 13px;font-size:14px;font-family:'Space Mono',monospace;width:100%;}
.btn{border-radius:10px;font-weight:800;font-size:12px;letter-spacing:.3px;transition:opacity .15s,transform .1s;border:none;}
.btn:hover{opacity:.85;transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.btn.primary{background:var(--blue);color:#060a12;}
.btn.gold{background:var(--gold);color:#060a12;}
.btn.ghost{background:transparent;color:var(--blue);border:1px solid var(--blue)55;}
.btn.dark{background:#151f35;color:var(--muted);border:1px solid var(--border);}
.btn.green{background:var(--green);color:#060a12;}
.btn.red{background:var(--red);color:#fff;}
.btn.teal{background:var(--teal);color:#060a12;}
.btn.purple{background:var(--purple);color:#fff;}
.btn.sm{padding:6px 14px;font-size:11px;}
.btn.md{padding:9px 20px;}
.btn.lg{padding:13px 28px;font-size:14px;}
.btn.xl{padding:15px 38px;font-size:16px;}
.btn.full{width:100%;}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:14px;}
.round-hdr{border-radius:14px;padding:14px 17px;margin-bottom:15px;display:flex;gap:13px;align-items:center;}
.profile-opt{border-radius:13px;padding:14px;cursor:pointer;transition:all .13s;border:2px solid var(--border);background:var(--card);}
.profile-opt.sel{border-color:var(--blue);background:var(--as);}
.dice-face{width:72px;height:72px;border-radius:14px;font-size:42px;display:flex;align-items:center;justify-content:center;transition:all .3s;flex-shrink:0;}
.modal-overlay{position:fixed;inset:0;background:#000000bb;z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--card);border-radius:20px;padding:26px;max-width:480px;width:100%;animation:slideDown .25s ease;max-height:88vh;overflow-y:auto;}
.modal-progress{display:flex;gap:5px;margin-bottom:20px;}
.modal-prog-seg{flex:1;height:3px;border-radius:99px;cursor:pointer;transition:background .3s;}
.resume-banner{background:linear-gradient(135deg,#0a0e1a,#060c18);border:1px solid var(--blue)55;border-radius:14px;padding:14px 17px;display:flex;align-items:center;gap:13px;margin-bottom:16px;}
.credit-report{background:#080c18;border:1px solid var(--border);border-radius:12px;overflow:hidden;font-family:'Space Mono',monospace;font-size:11px;}
.cr-header{background:#111825;padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.cr-section{padding:12px 14px;border-bottom:1px solid var(--border)22;}
.cr-row{display:flex;justify-content:space-between;padding:5px 0;border-top:1px solid var(--border)22;font-size:11px;}
.score-gauge{position:relative;width:100%;height:16px;border-radius:99px;overflow:hidden;background:linear-gradient(90deg,var(--red),var(--orange),var(--gold),var(--green),var(--teal));}
.score-needle{position:absolute;top:-2px;width:4px;height:20px;background:#fff;border-radius:99px;transform:translateX(-50%);box-shadow:0 0 8px #fff;transition:left 1.5s cubic-bezier(.4,2,.6,1);}
.util-bar{height:10px;border-radius:99px;transition:width 1s ease;}
.factor-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--border)22;}
.dispute-opt{border-radius:11px;padding:12px 14px;border:1px solid var(--border);cursor:pointer;transition:all .13s;margin-bottom:8px;}
.dispute-opt.sel{border-color:var(--blue);background:var(--as);}
.cert{background:linear-gradient(135deg,#0a1428,#060e20);border:1px solid var(--blue)55;border-radius:16px;padding:28px;text-align:center;}
.month-ev{border-radius:14px;padding:14px 17px;display:flex;align-items:center;gap:13px;}
.check-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--border)22;}
.day-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .13s;}
.day-check.done{background:var(--green);border-color:var(--green);color:#060a12;}
.score-change{font-size:18px;font-weight:900;font-family:'Space Mono',monospace;}
@media(max-width:500px){.g4{grid-template-columns:1fr 1fr;}.g3{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<div id="htp-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeHTP()">
  <div class="modal-box" id="htp-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div><div style="color:var(--teal);font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:1.5px">How to Play</div><div style="color:var(--muted);font-size:11px;margin-top:2px" id="htp-step-lbl">Step 1 of 9</div></div>
      <button class="btn dark sm" onclick="closeHTP()">✕ Close</button>
    </div>
    <div class="modal-progress" id="htp-dots"></div>
    <div id="htp-content"></div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button class="btn dark sm" id="htp-prev" onclick="htpNav(-1)">← Back</button>
      <div style="flex:1"></div>
      <button class="btn primary md" id="htp-next" onclick="htpNav(1)">Next →</button>
    </div>
  </div>
</div>

<div id="hdr">
  <div id="hdr-inner">
    <div class="hdr-row">
      <div class="logo-box">⭐</div>
      <div>
        <div style="color:var(--blue);font-weight:900;font-size:16px;letter-spacing:-0.5px">nugO Credit Simulation Lab</div>
        <div style="color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:1.5px">Credit Repair · Score Building · Full Audit</div>
      </div>
      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
        <div id="save-flash" style="color:var(--green);font-size:10px;font-weight:700;display:none">💾 Saved</div>
        <button class="btn dark sm" onclick="openHTP()" style="background:var(--ps);border:1px solid var(--purple)55;color:var(--purple)">❓ How to Play</button>
        <div id="prof-hdr" style="display:none;text-align:right">
          <div id="prof-hdr-name" style="color:var(--gold);font-weight:800;font-size:12px"></div>
          <div id="prof-hdr-score" style="color:var(--muted);font-size:9px"></div>
        </div>
      </div>
    </div>
    <div id="prog-wrap" class="prog-wrap" style="display:none">
      <div class="prog-bar" id="prog-bar"></div>
      <div class="prog-labels"><span id="prog-l">Round 1 of 16</span><span id="prog-r" style="color:var(--blue)">0%</span></div>
    </div>
  </div>
</div>

<div id="app"><div id="screen"></div></div>

<script>
// ═══════════════════════════════════
// DATA
// ═══════════════════════════════════
const PROFILES=[
  {id:"fresh",  icon:"😰",label:"Fresh Start",      desc:"No credit history, collections, late payments",    score:520,util:85,age:1,  mix:1,inq:3,missed:4,color:"var(--red)"},
  {id:"rebuild",icon:"💳",label:"Rebuilder",         desc:"Some accounts, high utilization, missed payments",  score:580,util:65,age:2,  mix:2,inq:2,missed:2,color:"var(--orange)"},
  {id:"climber",icon:"📈",label:"Climber",           desc:"Fair credit, working on improvement",               score:620,util:45,age:3,  mix:2,inq:1,missed:1,color:"var(--gold)"},
  {id:"homeprep",icon:"🏠",label:"Home Buyer Prep",  desc:"Good credit, wants mortgage-ready score",           score:660,util:30,age:5,  mix:3,inq:1,missed:0,color:"var(--blue)"},
  {id:"bizready",icon:"💼",label:"Business Ready",   desc:"Good credit, needs 700+ for business financing",   score:680,util:25,age:6,  mix:3,inq:0,missed:0,color:"var(--blue)"},
  {id:"optimizer",icon:"⭐",label:"Optimizer",       desc:"Very good credit, pushing toward excellent",        score:720,util:15,age:8,  mix:4,inq:0,missed:0,color:"var(--green)"},
  {id:"maintain",icon:"🏆",label:"Maintainer",       desc:"Excellent credit, protecting and maximizing",       score:760,util:8, age:12, mix:4,inq:0,missed:0,color:"var(--teal)"},
];

const CREDIT_EVENTS=[
  {id:"late",    e:"⏰",t:"Missed Payment!",         d:"You missed a payment this month.",                     ef:"score",v:-25,  lbl:"-25 Points",  c:"var(--red)"},
  {id:"ontime",  e:"✅",t:"On-Time Payment Streak",  d:"3 consecutive on-time payments recorded.",             ef:"score",v:8,    lbl:"+8 Points",   c:"var(--green)"},
  {id:"theft",   e:"🚨",t:"Identity Theft Alert",    d:"Fraudulent account opened — you dispute immediately.", ef:"score",v:-15,  lbl:"-15 Points",  c:"var(--red)"},
  {id:"limitup", e:"📈",t:"Credit Limit Increase!",  d:"Your card issuer raised your limit — utilization drops.",ef:"util",v:-10,  lbl:"-10% Util",  c:"var(--green)"},
  {id:"hardpull",e:"🔍",t:"Hard Inquiry",            d:"Someone pulled your credit — new account application.", ef:"score",v:-7,   lbl:"-7 Points",   c:"var(--orange)"},
  {id:"removed", e:"🗑️",t:"Collection Removed!",    d:"A collection account fell off your report.",           ef:"score",v:20,   lbl:"+20 Points",  c:"var(--green)"},
  {id:"scorejump",e:"🚀",t:"Score Jumped!",          d:"Multiple factors improved — great month.",             ef:"score",v:15,   lbl:"+15 Points",  c:"var(--green)"},
  {id:"missedmin",e:"😤",t:"Missed Minimum Payment", d:"You missed the minimum payment due.",                  ef:"score",v:-30,  lbl:"-30 Points",  c:"var(--red)"},
  {id:"paidoff", e:"💯",t:"Card Paid in Full!",      d:"You paid off a credit card completely.",               ef:"util",v:-15,   lbl:"-15% Util",  c:"var(--green)"},
  {id:"newacct", e:"📋",t:"New Account Opened",      d:"A new credit account was added to your report.",      ef:"score",v:-10,  lbl:"-10 Points",  c:"var(--orange)"},
  {id:"utilspike",e:"⚠️",t:"Utilization Spiked",    d:"Large purchase pushed your utilization above 50%.",   ef:"util",v:20,    lbl:"+20% Util",   c:"var(--red)"},
  {id:"dispute", e:"📝",t:"Dispute Resolved!",       d:"An error was removed from your credit report.",       ef:"score",v:18,   lbl:"+18 Points",  c:"var(--green)"},
  {id:"autopayon",e:"🔄",t:"Autopay Saved You!",     d:"Autopay prevented a missed payment this month.",      ef:"score",v:5,    lbl:"+5 Points",   c:"var(--green)"},
  {id:"buildup",  e:"⭐",t:"Credit Age Milestone",   d:"Your oldest account reached a new age milestone.",    ef:"score",v:10,   lbl:"+10 Points",  c:"var(--blue)"},
  {id:"utildown", e:"📉",t:"Utilization Dropped",    d:"Your smart payoff strategy lowered utilization.",     ef:"util",v:-12,   lbl:"-12% Util",  c:"var(--green)"},
  {id:"mixup",    e:"🎯",t:"Credit Mix Improved",    d:"Adding a new account type improved your credit mix.", ef:"score",v:8,    lbl:"+8 Points",   c:"var(--blue)"},
  {id:"freeze",   e:"🔒",t:"Credit Freeze Lifted",   d:"You unfroze your credit for a necessary application.",ef:"score",v:0,    lbl:"No Change",   c:"var(--muted)"},
  {id:"goodwill", e:"🤝",t:"Goodwill Adjustment",    d:"Lender removed a late payment after your request.",   ef:"score",v:22,   lbl:"+22 Points",  c:"var(--green)"},
  {id:"balancedrop",e:"💪",t:"Balance Dropped 50%",  d:"You cut your card balance in half this month.",       ef:"util",v:-18,   lbl:"-18% Util",  c:"var(--green)"},
  {id:"inqfades", e:"⏱️",t:"Old Inquiry Faded",      d:"A hard inquiry from 2 years ago dropped off your report.",ef:"score",v:5, lbl:"+5 Points",  c:"var(--blue)"},
];

const MONTH_NAMES=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DICE_FACES=["⚀","⚁","⚂","⚃","⚄","⚅"];
const TOTAL_ROUNDS=16;
const SAVE_KEY="nugo-credit-v1";

const HTP=[
  {icon:"⭐",title:"Welcome to the Credit Simulation Lab",color:"var(--blue)",body:"This lab simulates building and repairing your credit score over 8 months. You make real credit decisions, face real events, and watch your score respond — just like real life. No perfect answers — just smart strategy."},
  {icon:"👤",title:"Round 1 — Pick Your Credit Profile",color:"var(--blue)",body:"Choose a credit profile that matches your current situation — Fresh Start (520), Rebuilder (580), Climber (620), Home Buyer Prep (660), Business Ready (680), Optimizer (720), or Maintainer (760). Each has a unique credit report and set of challenges."},
  {icon:"📋",title:"Round 2 — Read Your Credit Report",color:"var(--gold)",body:"Your simulated credit report shows all 5 credit factors: Payment History, Credit Utilization, Length of History, Credit Mix, and New Inquiries. Study it carefully — you need to know what's hurting your score before you can fix it."},
  {icon:"📝",title:"Round 3 — Dispute Strategy",color:"var(--purple)",body:"Identify errors and negative items on your credit report. Choose what to dispute — incorrect late payments, wrong account information, fraudulent accounts. Smart disputes can remove negative items and boost your score."},
  {icon:"💳",title:"Rounds 4–6 — Credit Strategy Setup",color:"var(--teal)",body:"Set your utilization targets per card, decide on autopay amounts, and make decisions about opening, closing, or keeping accounts. These 3 rounds set your strategy for the next 8 months of simulation."},
  {icon:"📅",title:"Rounds 7–14 — 8 Monthly Simulation",color:"var(--blue)",body:"Each round = one month. You review your account status, make payment decisions, then roll 2 dice. The sum draws a random credit event — late payment, credit limit increase, dispute resolved, hard inquiry, and more. Your score updates automatically."},
  {icon:"⭐",title:"Understanding Your Score Changes",color:"var(--green)",body:"Your score goes up and down based on: your payment decisions + the random event drawn. Payment History (35%) and Utilization (30%) have the biggest impact. A single missed payment can drop your score 25–30 points. On-time payments build slowly but permanently."},
  {icon:"📊",title:"Round 15 — Final Credit Report",color:"var(--gold)",body:"After 8 months, your updated credit report shows every change — accounts paid, disputes resolved, new inquiries, and your final utilization. Compare it to your starting report to see exactly what moved your score."},
  {icon:"🏆",title:"Round 16 — Full Credit Audit",color:"var(--teal)",body:"Review your complete score journey month by month, see the breakdown of all 5 credit factors, complete the 10-item credit health checklist, and receive your Credit Mastery Rating — Poor, Fair, Good, or Excellent strategy. Earn your Certificate of Completion."},
];

const AUDIT_CHECKS=[
  {id:"autopay",  lbl:"Set up autopay on all accounts to prevent missed payments",   cat:"Payment History"},
  {id:"util30",   lbl:"Kept all card utilization below 30%",                         cat:"Utilization"},
  {id:"util10",   lbl:"At least one card kept below 10% utilization",                cat:"Utilization"},
  {id:"nohardpull",lbl:"Avoided unnecessary hard inquiries (no new applications)",   cat:"New Credit"},
  {id:"dispute",  lbl:"Disputed at least one inaccurate item on the credit report",  cat:"Report Accuracy"},
  {id:"noclose",  lbl:"Did NOT close any old credit accounts",                       cat:"Credit Age"},
  {id:"ontime",   lbl:"Made all minimum payments on time every month",               cat:"Payment History"},
  {id:"monitor",  lbl:"Monitored credit report regularly for changes",               cat:"Report Review"},
  {id:"mix",      lbl:"Maintained or improved credit mix (cards + loans)",           cat:"Credit Mix"},
  {id:"goal",     lbl:"Score moved closer to your target goal",                      cat:"Overall Progress"},
];

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let S={round:0,profile:null,months:[],auditChecks:{},strategy:{},disputes:[]};
let _profileId="fresh",_htpStep=0,_auditTab="journey";
let _diceRolled=false,_chosenEvent=null,_diceInterval=null;

function saveGame(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(S));const el=document.getElementById("save-flash");if(el){el.style.display="flex";setTimeout(()=>el.style.display="none",2000);}}catch(e){}}
function loadSave(){try{return JSON.parse(localStorage.getItem(SAVE_KEY)||"null");}catch{return null;}}
function clearSave(){try{localStorage.removeItem(SAVE_KEY);}catch{}}
function advance(){S.round++;if(S.round>0&&S.profile)saveGame();render();}

// ═══════════════════════════════════
// CREDIT SCORE ENGINE
// ═══════════════════════════════════
function calcScore(profile,months,strategy){
  let score=profile.startScore;
  let util=profile.util;
  const disputes=S.disputes||[];

  // Dispute bonus
  score+=disputes.length*8;

  // Strategy bonuses
  if(strategy.autopay)  score+=5;
  if(strategy.utilTarget<=10) score+=15;
  else if(strategy.utilTarget<=20) score+=8;
  else if(strategy.utilTarget<=30) score+=3;
  if(strategy.noNewAccounts) score+=5;
  if(strategy.keepOldAccounts) score+=8;

  // Monthly events
  months.forEach(m=>{
    if(m.event){
      if(m.event.ef==="score") score+=m.event.v;
      if(m.event.ef==="util")  util=Math.max(1,Math.min(99,util+m.event.v));
    }
    // Payment decision
    if(m.payment==="full")  score+=4;
    if(m.payment==="more")  score+=2;
    if(m.payment==="min")   score+=0;
    if(m.payment==="skip")  score-=28;
  });

  // Utilization factor
  if(util<=9)  score+=20;
  else if(util<=19) score+=12;
  else if(util<=29) score+=5;
  else if(util<=49) score-=5;
  else if(util<=74) score-=15;
  else score-=30;

  return {score:Math.min(850,Math.max(300,Math.round(score))),util:Math.max(1,Math.min(99,util))};
}

function scoreLabel(score){
  if(score<580) return {label:"Damaged",  color:"var(--red)"};
  if(score<670) return {label:"Fair",     color:"var(--orange)"};
  if(score<740) return {label:"Good",     color:"var(--gold)"};
  if(score<800) return {label:"Very Good",color:"var(--green)"};
  return             {label:"Excellent",  color:"var(--teal)"};
}

function pickEvent(d1,d2,mi){return CREDIT_EVENTS[((d1+d2+2-2)*2+mi)%CREDIT_EVENTS.length];}

// ═══════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════
const fmt  = n=>"$"+Math.abs(Math.round(n)).toLocaleString();
const clamp= (v,lo,hi)=>Math.min(hi,Math.max(lo,v));
const b    = (txt,fn,v="primary",sz="md",dis=false)=>
  `<button class="btn ${v} ${sz}" onclick="${fn}" ${dis?"disabled":""}>${txt}</button>`;
const bdg  = (txt,color,sz="sm")=>
  `<span class="badge" style="background:${color}28;color:${color};border:1px solid ${color}44;padding:${sz==="lg"?"4px 14px":"2px 10px"};font-size:${sz==="lg"?13:11}px">${txt}</span>`;
const st   = (lbl,val,color,sm=false)=>
  `<div class="stat"><div class="val" style="color:${color};font-size:${sm?14:20}px">${val}</div><div class="lbl">${lbl}</div></div>`;
const pb   = (p,color,h=8)=>
  `<div class="pbar" style="height:${h}px"><div class="pbar-fill" style="width:${clamp(p,0,100)}%;background:${color}"></div></div>`;
const card = (c,cls="",style="")=>`<div class="card ${cls}" style="${style}">${c}</div>`;
const inp  = (lbl,id,type="text",val="",pre="",suf="",hint="")=>{
  const pH=pre?`<span class="inp-pre">${pre}</span>`:"";
  const sH=suf?`<span class="inp-suf">${suf}</span>`:"";
  const hH=hint?`<div class="inp-hint">${hint}</div>`:"";
  return `<div class="inp-wrap"><label class="inp-label">${lbl}</label>${hH}<div class="inp-row">${pH}<input type="${type}" id="${id}" value="${val}">${sH}</div></div>`;
};
const restartLink=()=>`<div style="text-align:center;margin-top:14px"><button onclick="if(confirm('Restart?'))restartFull()" style="background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:11px;font-family:'Space Mono',monospace;text-decoration:underline">↺ Restart from beginning</button></div>`;

function scoreGauge(score){
  const pct=clamp((score-300)/550,0,1)*100;
  const sl=scoreLabel(score);
  return `<div style="margin-bottom:6px">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
      <span style="color:${sl.color};font-size:28px;font-weight:900;font-family:'Space Mono',monospace">${score}</span>
      <span style="color:${sl.color};font-weight:700;font-size:14px;align-self:flex-end">${sl.label}</span>
    </div>
    <div class="score-gauge">
      <div class="score-needle" style="left:${pct}%"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:4px">
      <span style="color:var(--red);font-size:9px">300</span>
      <span style="color:var(--orange);font-size:9px">580</span>
      <span style="color:var(--gold);font-size:9px">670</span>
      <span style="color:var(--green);font-size:9px">740</span>
      <span style="color:var(--teal);font-size:9px">850</span>
    </div>
  </div>`;
}

function roundHdr(icon,rndNum,title,desc){
  const r=S.round;
  const isAudit=r===16;const isMonth=r>=7&&r<=14;const isStrat=r>=4&&r<=6;
  const bgC=isAudit?"var(--ts)":isMonth?"var(--bs)":isStrat?"var(--ps)":"var(--as)";
  const brdC=isAudit?"var(--teal)":isMonth?"var(--blue)":isStrat?"var(--purple)":"var(--blue)";
  const moName=isMonth?MONTH_NAMES[r-7]:"";
  return `<div class="round-hdr" style="background:linear-gradient(135deg,${bgC},transparent);border:1px solid ${brdC}44">
    <div style="background:${bgC};border-radius:10px;padding:9px 11px;font-size:22px;flex-shrink:0">${icon}</div>
    <div style="flex:1">
      <div style="display:flex;gap:7px;margin-bottom:5px;flex-wrap:wrap">
        ${bdg("Round "+rndNum,"var(--blue)")}${bdg("of 16","var(--dim)")}
        ${isMonth?bdg(moName,"var(--blue)"):""}
        ${isAudit?bdg("Final Round","var(--teal)"):""}
        ${isStrat?bdg("Strategy Round","var(--purple)"):""}
      </div>
      <div style="font-size:16px;font-weight:900">${title}</div>
      <div style="color:var(--muted);font-size:11px;margin-top:2px">${desc}</div>
    </div>
    <button class="btn dark sm" onclick="openHTP()">❓</button>
  </div>`;
}

function updateHeader(){
  const pw=document.getElementById("prog-wrap"),ph=document.getElementById("prof-hdr");
  if(S.round===0){if(pw)pw.style.display="none";if(ph)ph.style.display="none";return;}
  if(pw)pw.style.display="block";
  const bar=document.getElementById("prog-bar");
  if(bar)bar.innerHTML=Array.from({length:TOTAL_ROUNDS},(_,i)=>{
    const done=i<S.round;
    const col=i===15?"var(--teal)":i>=6&&i<=13?"var(--blue)":i>=3&&i<=5?"var(--purple)":"var(--blue)";
    return `<div class="prog-seg" style="background:${done?col:i===S.round-1?col+"88":"var(--border)"}"></div>`;
  }).join("");
  const pl=document.getElementById("prog-l");if(pl)pl.textContent=`Round ${S.round} of ${TOTAL_ROUNDS}`;
  const pr=document.getElementById("prog-r");if(pr)pr.textContent=Math.round((S.round/TOTAL_ROUNDS)*100)+"%";
  if(S.profile&&ph){
    ph.style.display="block";
    const nm=document.getElementById("prof-hdr-name");if(nm)nm.textContent=S.profile.name;
    const sc=document.getElementById("prof-hdr-score");
    if(sc){const cs=calcScore(S.profile,S.months,S.strategy||{});if(sc)sc.textContent="Score: "+cs.score;}
  }
}

// ═══════════════════════════════════
// ROUTER
// ═══════════════════════════════════
function render(){
  updateHeader();window.scrollTo({top:0,behavior:"smooth"});
  const el=document.getElementById("screen");
  el.className="fu";void el.offsetWidth;
  if(S.round===0)      el.innerHTML=renderIntro();
  else if(S.round===1) el.innerHTML=renderPickProfile();
  else if(S.round===2) el.innerHTML=renderCreditReport();
  else if(S.round===3) el.innerHTML=renderDispute();
  else if(S.round===4) el.innerHTML=renderUtilization();
  else if(S.round===5) el.innerHTML=renderPaymentStrategy();
  else if(S.round===6) el.innerHTML=renderAccountDecisions();
  else if(S.round>=7&&S.round<=14) el.innerHTML=renderMonth(S.round-7);
  else if(S.round===15) el.innerHTML=renderFinalReport();
  else if(S.round===16) el.innerHTML=renderAudit();
}

function selProfile(id){
  _profileId=id;

    el.style.borderColor=s?"var(--blue)":"var(--border)";

  });
}

function submitPickProfile(){
  const name=(document.getElementById("pname")?.value||"").trim()||"My Profile";
  const p=PROFILES.find(x=>x.id===_profileId);
  S.profile={...p,name,profileLabel:p.label,startScore:p.score,currentUtil:p.util};
  advance();
}

function rollDice(mi){
  if(_diceRolled)return;
  let count=0;
  const d1=document.getElementById("d1"),d2=document.getElementById("d2"),ctrl=document.getElementById("dice-ctrl");
  ctrl.innerHTML=`<div style="color:var(--purple);font-weight:800;font-size:13px;animation:pulse 0.45s infinite">Rolling…</div>`;
  d1.classList.add("shake");d2.classList.add("shake");
  d1.style.border="2px solid var(--purple)";d1.style.background="var(--ps)";
  d2.style.border="2px solid var(--purple)";d2.style.background="var(--ps)";
  _diceInterval=setInterval(()=>{
    const r1=Math.floor(Math.random()*6),r2=Math.floor(Math.random()*6);
    d1.textContent=DICE_FACES[r1];d2.textContent=DICE_FACES[r2];count++;
    if(count>=20){
      clearInterval(_diceInterval);
      const f1=Math.floor(Math.random()*6),f2=Math.floor(Math.random()*6);
      d1.textContent=DICE_FACES[f1];d2.textContent=DICE_FACES[f2];
      d1.classList.remove("shake");d2.classList.remove("shake");
      d1.style.border="2px solid var(--gold)";d1.style.background="var(--gs)";d1.style.boxShadow="0 0 20px #f5b73166";
      d2.style.border="2px solid var(--gold)";d2.style.background="var(--gs)";d2.style.boxShadow="0 0 20px #f5b73166";
      const sum=f1+f2+2;
      const sumEl=document.getElementById("dice-sum");if(sumEl)sumEl.style.display="flex";
      const sv=document.getElementById("sum-val");if(sv)sv.textContent=sum;
      ctrl.innerHTML=`<div style="display:flex;gap:8px">${bdg("Die 1: "+(f1+1),"var(--gold)")} ${bdg("Die 2: "+(f2+1),"var(--gold)")}</div>`;
      _diceRolled=true;
      _chosenEvent=pickEvent(f1,f2,mi);
      showEventReveal(_chosenEvent,mi);
    }
  },65);
}

            <div style="color:${finalSl.color};font-size:24px;font-weight:900">${cs.score}</div>
            <div style="color:${finalSl.color};font-size:11px;font-weight:700">${finalSl.label}</div>
          </div>
        </div>
        <div class="cr-section">
          <div style="color:var(--blue);font-weight:700;font-size:11px;margin-bottom:10px">SCORE COMPARISON</div>
          <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap">
            <div style="text-align:center">
              <div style="color:var(--muted);font-size:10px">Starting Score</div>
              <div style="color:${startSl.color};font-size:28px;font-weight:900;font-family:'Space Mono',monospace">${p.startScore}</div>
              <div style="color:${startSl.color};font-size:11px">${startSl.label}</div>
            </div>
            <div style="font-size:24px">→</div>
            <div style="text-align:center">
              <div style="color:var(--muted);font-size:10px">Final Score</div>
              <div style="color:${finalSl.color};font-size:36px;font-weight:900;font-family:'Space Mono',monospace">${cs.score}</div>
              <div style="color:${finalSl.color};font-size:11px">${finalSl.label}</div>
            </div>
            <div style="text-align:center;flex:1">
              <div style="color:${diff>=0?"var(--green)":"var(--red)"};font-size:28px;font-weight:900;font-family:'Space Mono',monospace">${diff>=0?"+":""}${diff}</div>
              <div style="color:var(--muted);font-size:10px">Total Change</div>
            </div>
          </div>
        </div>
        <div class="cr-section">
          <div style="color:var(--blue);font-weight:700;font-size:11px;margin-bottom:8px">WHAT CHANGED</div>
          ${S.disputes.length>0?`<div style="color:var(--green);font-size:11px;padding:5px 0;border-top:1px solid var(--border)22">✓ Disputed ${S.disputes.length} item(s) — estimated +${S.disputes.length*8} points</div>`:""}
          ${S.strategy.autopay?`<div style="color:var(--green);font-size:11px;padding:5px 0;border-top:1px solid var(--border)22">✓ Autopay set up — no missed payments from automation</div>`:""}
          ${S.strategy.utilTarget<=19?`<div style="color:var(--green);font-size:11px;padding:5px 0;border-top:1px solid var(--border)22">✓ Low utilization target — strong utilization improvement</div>`:""}
          ${S.months.filter(m=>m.payment==="full").length>0?`<div style="color:var(--green);font-size:11px;padding:5px 0;border-top:1px solid var(--border)22">✓ Paid full balance ${S.months.filter(m=>m.payment==="full").length} month(s)</div>`:""}
          ${S.months.filter(m=>m.payment==="skip").length>0?`<div style="color:var(--red);font-size:11px;padding:5px 0;border-top:1px solid var(--border)22">✗ Skipped ${S.months.filter(m=>m.payment==="skip").length} payment(s) — major negative impact</div>`:""}
          ${S.months.filter(m=>m.event&&m.event.v>0&&m.event.ef==="score").length>0?`<div style="color:var(--green);font-size:11px;padding:5px 0;border-top:1px solid var(--border)22">✓ ${S.months.filter(m=>m.event&&m.event.v>0&&m.event.ef==="score").length} positive credit event(s) this period</div>`:""}
          ${S.months.filter(m=>m.event&&m.event.v<0&&m.event.ef==="score").length>0?`<div style="color:var(--red);font-size:11px;padding:5px 0;border-top:1px solid var(--border)22">✗ ${S.months.filter(m=>m.event&&m.event.v<0&&m.event.ef==="score").length} negative credit event(s) this period</div>`:""}
        </div>
        <div class="cr-section">
          <div style="color:var(--blue);font-weight:700;font-size:11px;margin-bottom:8px">MONTH-BY-MONTH EVENTS</div>
          ${S.months.map((m,i)=>`
            <div style="display:flex;gap:10px;padding:7px 0;border-top:1px solid var(--border)22;align-items:center">
              <span style="color:var(--muted);font-size:10px;min-width:55px">${m.monthName?.slice(0,3)||"Mo "+(i+1)}</span>
              <span style="font-size:16px">${m.event?.e||"•"}</span>
              <span style="color:var(--text);font-size:11px;flex:1">${m.event?.t||"No event"}</span>
              <span style="color:${m.event?.v>=0?"var(--green)":"var(--red)"};font-size:11px;font-weight:700;font-family:'Space Mono',monospace">${m.event?.lbl||""}</span>
            </div>`).join("")}
        </div>
      </div>
      ${b("Round 16: Full Credit Audit →","advance()","primary","lg full")}
      ${restartLink()}
    </div>`;
}

// ═══════════════════════════════════
// ROUND 16 — FULL CREDIT AUDIT
// ═══════════════════════════════════
function renderAudit(){
  const p=S.profile;
  const cs=calcScore(p,S.months,S.strategy);
  const diff=cs.score-p.startScore;
  const finalSl=scoreLabel(cs.score);
  const flagCount=Object.values(S.auditChecks).filter(v=>v==="flag").length;
  const passCount=Object.values(S.auditChecks).filter(v=>v==="pass").length;
  const allChecked=AUDIT_CHECKS.every(c=>S.auditChecks[c.id]);

  let rating,ratingColor,ratingIcon;
  if(!allChecked){rating="Incomplete";ratingColor="var(--muted)";ratingIcon="⏳";}
  else if(flagCount<=1&&diff>=30){rating="Excellent Strategy";ratingColor="var(--teal)";ratingIcon="🏆";}
  else if(flagCount<=2&&diff>=10){rating="Good Strategy";ratingColor="var(--green)";ratingIcon="✅";}
  else if(flagCount<=4){rating="Fair Strategy";ratingColor="var(--gold)";ratingIcon="⚠️";}
  else{rating="Needs Improvement";ratingColor="var(--red)";ratingIcon="📚";}

  const tabs=[
    {id:"journey",lbl:"📈 Score Journey"},
    {id:"factors",lbl:"📊 Factor Breakdown"},
    {id:"checklist",lbl:"✅ Checklist"},
    {id:"opinion",lbl:"🏆 Rating"},
  ];

  let tabContent="";

  if(_auditTab==="journey"){
    const maxScore=Math.max(p.startScore,...S.months.map((_,i)=>calcScore(p,S.months.slice(0,i+1),S.strategy).score));
    const minScore=Math.min(p.startScore,...S.months.map((_,i)=>calcScore(p,S.months.slice(0,i+1),S.strategy).score));
    tabContent=`
      <div style="margin-bottom:14px">
        <div class="g4">
          ${st("Starting Score",p.startScore,scoreLabel(p.startScore).color)}
          ${st("Final Score",cs.score,finalSl.color)}
          ${st("Total Change",(diff>=0?"+":"")+diff,diff>=0?"var(--green)":"var(--red)")}
          ${st("Peak Score",maxScore,"var(--teal)")}
        </div>
      </div>
      <div style="color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:10px">Month-by-Month Score Movement</div>
      ${[{monthName:"Start",score:p.startScore},...S.months.map((m,i)=>({monthName:m.monthName||"Month "+(i+1),score:calcScore(p,S.months.slice(0,i+1),S.strategy).score,event:m.event}))].map((m,i,arr)=>{
        const prev=i>0?arr[i-1].score:m.score;
        const chg=m.score-prev;
        const w=Math.round(clamp((m.score-300)/550,0,1)*100);
        return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="color:var(--muted);font-size:9px;width:55px;flex-shrink:0">${m.monthName?.slice(0,3)||"Start"}</span>
          <div style="flex:1;background:#151f35;border-radius:3px;height:14px;overflow:hidden;position:relative">
            <div style="width:${w}%;height:100%;background:${scoreLabel(m.score).color};border-radius:3px;transition:width 1s"></div>
          </div>
          <span style="color:${scoreLabel(m.score).color};font-size:10px;font-family:'Space Mono',monospace;width:35px;text-align:right;flex-shrink:0">${m.score}</span>
          ${i>0?`<span style="color:${chg>=0?"var(--green)":"var(--red)"};font-size:9px;font-family:'Space Mono',monospace;width:30px;flex-shrink:0">${chg>=0?"+":""}${chg}</span><span style="font-size:12px;flex-shrink:0">${m.event?.e||""}</span>`:"<span style='width:60px;flex-shrink:0'></span>"}
        </div>`;
      }).join("")}`;
  }
  else if(_auditTab==="factors"){
    const factors=[
      {name:"Payment History",weight:35,score:S.months.filter(m=>m.payment==="skip").length===0?90:S.months.filter(m=>m.payment==="skip").length===1?65:40,color:"var(--blue)",desc:"Based on your "+S.months.filter(m=>m.payment==="skip").length+" missed payment(s)"},
      {name:"Credit Utilization",weight:30,score:S.strategy.utilTarget<=9?95:S.strategy.utilTarget<=19?80:S.strategy.utilTarget<=29?65:45,color:"var(--green)",desc:"Target utilization: "+S.strategy.utilTarget+"%"},
      {name:"Length of History",weight:15,score:p.age<3?50:p.age<6?70:85,color:"var(--gold)",desc:p.age+" years — "+( S.strategy.keepOldAccounts?"kept old accounts open":"some accounts may have been closed")},
      {name:"Credit Mix",weight:10,score:p.mix===1?50:p.mix===2?70:85,color:"var(--purple)",desc:p.mix+" account type"+(p.mix!==1?"s":"")+" on file"},
      {name:"New Inquiries",weight:10,score:S.strategy.noNewAccounts?95:p.inq>2?50:75,color:"var(--teal)",desc:S.strategy.noNewAccounts?"No new applications — excellent":"Some new inquiries recorded"},
    ];
    tabContent=`
      <div style="margin-bottom:14px">
        <div style="color:var(--muted);font-size:11px;line-height:1.7">Your score is calculated from 5 factors. Each factor below shows your performance during the 8-month simulation.</div>
      </div>
      ${factors.map(f=>`
        <div style="padding:14px 0;border-top:1px solid var(--border)22">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div>
              <div style="font-weight:800;font-size:13px;color:${f.color}">${f.name}</div>
              <div style="color:var(--muted);font-size:11px;margin-top:2px">${f.desc}</div>
            </div>
            <div style="text-align:right">
              <div style="color:${f.color};font-weight:800;font-family:'Space Mono',monospace">${f.score}/100</div>
              <div style="color:var(--muted);font-size:10px">${f.weight}% weight</div>
            </div>
          </div>
          ${pb(f.score,f.color,10)}
        </div>`).join("")}
      <div style="margin-top:14px;padding:12px 14px;background:var(--as);border:1px solid var(--blue)44;border-radius:10px">
        <div style="color:var(--blue);font-weight:800;font-size:12px;margin-bottom:6px">Your Calculated Score Breakdown</div>
        <div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)">
          ${factors.map(f=>`<div>${f.name}: ${f.score}/100 × ${f.weight}% = ${Math.round(f.score*f.weight/100)} pts</div>`).join("")}
          <div style="border-top:1px solid var(--border);margin-top:6px;padding-top:6px;color:var(--blue);font-weight:700">Final Score: ${cs.score} (${finalSl.label})</div>
        </div>
      </div>`;
  }
  else if(_auditTab==="checklist"){
    tabContent=`${AUDIT_CHECKS.map(c=>{
      const val=S.auditChecks[c.id];
      return `<div style="border-radius:11px;padding:12px 14px;border:1px solid ${val==="pass"?"var(--green)44":val==="flag"?"var(--red)44":"var(--border)"};background:${val==="pass"?"var(--grs)":val==="flag"?"var(--rs)":"var(--card)"};margin-bottom:8px">
        <div style="display:flex;gap:11px;align-items:flex-start">
          <div style="flex:1">
            <div style="font-weight:700;font-size:12px">${c.lbl}</div>
            <div style="color:var(--muted);font-size:10px;margin-top:3px">${bdg(c.cat,"var(--blue)")}</div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <button class="btn sm ${val==="pass"?"green":"ghost"}" style="${val==="pass"?"":"color:var(--green);border-color:var(--green)55"}" onclick="setCheck('${c.id}','pass')">✓ Pass</button>
            <button class="btn sm ${val==="flag"?"red":"ghost"}" style="${val==="flag"?"":"color:var(--red);border-color:var(--red)55"}" onclick="setCheck('${c.id}','flag')">⚑ Flag</button>
          </div>
        </div>
      </div>`;
    }).join("")}
    <div class="card" style="background:#080c18">
      <div class="g3">${st("Checked",`${passCount+flagCount}/${AUDIT_CHECKS.length}`,"var(--blue)")}${st("Passed",passCount,"var(--green)")}${st("Flagged",flagCount,flagCount>0?"var(--red)":"var(--muted)")}</div>
    </div>
    ${allChecked?b("🏆 View My Rating →","setAuditTab('opinion')","primary","lg full"):""}`;
  }
  else if(_auditTab==="opinion"){
    if(!allChecked){
      tabContent=`<div style="text-align:center;padding:22px 0">
        <div style="font-size:34px;margin-bottom:10px">⏳</div>
        <div style="color:var(--gold);font-weight:800;font-size:15px">Complete the Checklist First</div>
        <div style="color:var(--muted);font-size:12px;margin-top:6px">Mark all 10 items Pass or Flag to receive your rating.</div>
        <div style="margin-top:14px">${b("Go to Checklist →","setAuditTab('checklist')","primary","md")}</div>
      </div>`;
    } else {
      const nextSteps=cs.score<580?["Dispute all negative items immediately","Set up autopay to prevent any missed payments","Get a secured credit card if you have none","Target: reduce utilization to below 30%"]:
        cs.score<670?["Continue paying down balances — target under 20% utilization","Apply for a credit limit increase on your best card","Keep all accounts open and make minimum payments","Target: 740 in 12 months"]:
        cs.score<740?["You're close to Very Good — focus on utilization under 10%","Request limit increases, don't open new accounts","Keep perfect payment history","Target: 740+ in 6 months"]:
        ["Maintain utilization under 10%","Keep payment streak going","Diversify credit mix if possible","You now qualify for the best rates available"];

      tabContent=`
        <div style="border-radius:14px;padding:24px 18px;text-align:center;background:${ratingColor}18;border:1px solid ${ratingColor}55;margin-bottom:13px">
          <div style="font-size:42px;margin-bottom:8px">${ratingIcon}</div>
          <div style="color:${ratingColor};font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px">Credit Strategy Rating</div>
          <div style="color:${ratingColor};font-size:22px;font-weight:900">${rating}</div>
          <div style="color:var(--muted);font-size:12px;margin-top:8px">Score moved from <strong style="color:${scoreLabel(p.startScore).color}">${p.startScore}</strong> to <strong style="color:${finalSl.color}">${cs.score}</strong> — a change of <strong style="color:${diff>=0?"var(--green)":"var(--red)"}">${diff>=0?"+":""}${diff} points</strong></div>
        </div>
        <div class="card" style="background:#080c18;margin-bottom:13px">
          <div style="color:var(--blue);font-weight:800;font-size:12px;margin-bottom:10px">📋 Your Next Steps in Real Life</div>
          ${nextSteps.map((s,i)=>`<div style="display:flex;gap:10px;padding:7px 0;border-top:${i>0?"1px solid var(--border)22":"none"}"><span style="color:var(--blue);font-weight:700;flex-shrink:0">${i+1}.</span><span style="color:var(--text);font-size:12px">${s}</span></div>`).join("")}
        </div>
        <div class="cert">
          <div style="font-size:46px;margin-bottom:8px">🏆</div>
          <div style="color:var(--blue);font-size:19px;font-weight:900">Certificate of Completion</div>
          <div style="color:var(--text);font-size:13px;margin-top:5px">nugO Credit Simulation Lab</div>
          <div style="color:var(--muted);font-size:12px;margin-top:12px">This certifies that</div>
          <div style="color:var(--gold);font-size:18px;font-weight:800;margin:5px 0">${p.name}</div>
          <div style="color:var(--muted);font-size:12px">completed all 16 rounds of credit simulation</div>
          <div style="color:var(--blue);font-size:13px;font-weight:700;margin-top:3px">${p.profileLabel} · 8-Month Credit Journey</div>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px">
            ${bdg((diff>=0?"+":"")+diff+" Points","var(--blue)","lg")}
            ${bdg(ratingIcon+" "+rating,ratingColor,"lg")}
            ${bdg(finalSl.label+" Credit",finalSl.color,"lg")}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:14px;text-align:left">
            ${["Credit Report Analysis","Dispute Strategy","Utilization Planning","Payment Strategy","Account Management","8-Month Simulation","20 Credit Events","Score Factor Breakdown","Credit Audit Checklist","Credit Mastery Rating"].map(s=>`
              <div style="display:flex;gap:6px;align-items:center"><span style="color:var(--blue);font-size:11px">✓</span><span style="color:var(--muted);font-size:10px">${s}</span></div>`).join("")}
          </div>
        </div>
        <div style="text-align:center;margin-top:14px">${b("↺ Try Another Profile","restartFull()","ghost","md")}</div>`;
    }
  }

  return `
    ${roundHdr("🔍","16","Full Credit Audit","Score Journey · Factor Breakdown · Credit Rating")}
    <div style="background:linear-gradient(135deg,#060e1a,#040a14);border:1px solid var(--teal)44;border-radius:13px;padding:14px 17px;display:flex;align-items:center;gap:13px;margin-bottom:14px;flex-wrap:wrap">
      <div style="font-size:28px">⭐</div>
      <div style="flex:1"><div style="color:var(--teal);font-weight:900;font-size:14px">${p.name} — Credit Simulation Complete</div><div style="color:var(--muted);font-size:11px;margin-top:2px">${p.profileLabel} · 8-Month Credit Journey</div></div>
      <div style="display:flex;gap:13px;flex-wrap:wrap">
        ${st("Start Score",p.startScore,scoreLabel(p.startScore).color,"sm")}
        ${st("Final Score",cs.score,finalSl.color,"sm")}
        ${st("Change",(diff>=0?"+":"")+diff,diff>=0?"var(--green)":"var(--red)","sm")}
      </div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
      ${tabs.map(t=>`<button class="btn ${_auditTab===t.id?"teal":"dark"} sm" onclick="setAuditTab('${t.id}')">${t.lbl}</button>`).join("")}
    </div>
    ${card(tabContent)}
    ${restartLink()}`;
}

function setCheck(id,val){S.auditChecks[id]=val;saveGame();render();}
function setAuditTab(tab){_auditTab=tab;render();}

// ═══════════════════════════════════
// HOW TO PLAY MODAL
// ═══════════════════════════════════
function openHTP(){_htpStep=0;renderHTP();document.getElementById("htp-modal").style.display="flex";}
function closeHTP(){document.getElementById("htp-modal").style.display="none";}
function htpNav(dir){_htpStep=Math.max(0,Math.min(HTP.length-1,_htpStep+dir));renderHTP();}
function renderHTP(){
  const s=HTP[_htpStep];
  document.getElementById("htp-step-lbl").textContent=`Step ${_htpStep+1} of ${HTP.length}`;
  document.getElementById("htp-dots").innerHTML=HTP.map((_,i)=>`<div class="modal-prog-seg" onclick="_htpStep=${i};renderHTP()" style="background:${i<=_htpStep?s.color:"var(--border)"}"></div>`).join("");
  document.getElementById("htp-content").innerHTML=`
    <div style="text-align:center;margin-bottom:14px">
      <div style="font-size:50px;margin-bottom:12px">${s.icon}</div>
      <div style="color:${s.color};font-weight:900;font-size:16px;margin-bottom:10px;line-height:1.3">${s.title}</div>
      <div style="color:var(--muted);font-size:13px;line-height:1.85;text-align:left">${s.body}</div>
    </div>`;
  document.getElementById("htp-prev").style.display=_htpStep===0?"none":"inline-block";
  const nx=document.getElementById("htp-next");
  if(_htpStep===HTP.length-1){nx.textContent="Let's Build Credit! ⭐";nx.className="btn gold md";nx.onclick=closeHTP;}
  else{nx.textContent="Next →";nx.className="btn primary md";nx.onclick=()=>htpNav(1);}
  const box=document.getElementById("htp-box");
  if(box){box.style.borderColor=s.color+"55";box.style.boxShadow=`0 0 48px ${s.color}33`;}
}

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
window.onload=function(){
  const saved=loadSave();
  if(saved&&saved.profile){_profileId=saved.profile.profileId||"fresh";}
  _auditTab="journey";
  render();
};
</script>
