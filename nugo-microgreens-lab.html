<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nugO Microgreens Business Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--card:#0e1320;--border:#1a2640;
  --accent:#4cdb8a;--as:#4cdb8a18;
  --gold:#f5b731;--gs:#f5b73118;
  --red:#f04060;--rs:#f0406018;
  --blue:#3d9eff;--bs:#3d9eff18;
  --purple:#a875f0;--ps:#a875f018;
  --orange:#ff7c3a;--os:#ff7c3a18;
  --teal:#00d4d4;--ts:#00d4d418;
  --green:#4cdb8a;--grs:#4cdb8a18;
  --lime:#a8e63d;--ls:#a8e63d18;
  --text:#ddeeff;--muted:#7a90b0;--dim:#374a66;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
input,select,textarea{font-family:'Syne',sans-serif;}
button{font-family:'Space Mono',monospace;cursor:pointer;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes diceShake{0%{transform:rotate(-10deg)scale(1.12)}50%{transform:rotate(10deg)scale(0.91)}100%{transform:rotate(-5deg)scale(1.05)}}
@keyframes cardReveal{0%{opacity:0;transform:scale(0.85)translateY(12px)}100%{opacity:1;transform:scale(1)translateY(0)}}
@keyframes grow{0%{transform:scaleY(0)}100%{transform:scaleY(1)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp 0.32s ease forwards;}
.shake{animation:diceShake 0.07s infinite;}
.reveal{animation:cardReveal 0.4s ease forwards;}
#app{max-width:720px;margin:0 auto;padding:0 16px 80px;}
#hdr{background:linear-gradient(180deg,#0a1a0a,transparent);padding:20px 18px 0;margin-bottom:6px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
#hdr-inner{max-width:720px;margin:0 auto;}
.hdr-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.logo-box{background:var(--as);border:1px solid var(--accent)33;border-radius:11px;padding:7px 13px;font-size:19px;flex-shrink:0;}
.logo-title{color:var(--accent);font-weight:900;font-size:16px;letter-spacing:-0.5px;}
.logo-sub{color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:1.5px;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.save-flash{color:var(--accent);font-size:10px;font-weight:700;display:flex;align-items:center;gap:3px;}
.prog-wrap{margin-top:14px;margin-bottom:2px;}
.prog-bar{display:flex;gap:2px;}
.prog-seg{flex:1;height:4px;border-radius:99px;background:var(--border);transition:background .3s;}
.prog-labels{display:flex;justify-content:space-between;margin-top:4px;}
.prog-labels span{color:var(--muted);font-size:9px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:0 2px 20px #00000055;}
.glow-green{border-color:var(--accent)55!important;box-shadow:0 0 28px var(--accent)22!important;}
.glow-gold{border-color:var(--gold)55!important;box-shadow:0 0 28px var(--gold)22!important;}
.glow-teal{border-color:var(--teal)55!important;box-shadow:0 0 28px var(--teal)22!important;}
.glow-blue{border-color:var(--blue)55!important;box-shadow:0 0 28px var(--blue)22!important;}
.glow-purple{border-color:var(--purple)55!important;box-shadow:0 0 28px var(--purple)22!important;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.col{display:flex;flex-direction:column;gap:15px;}
.stat{text-align:center;}
.stat .val{font-family:'Space Mono',monospace;font-weight:800;line-height:1;}
.stat .lbl{color:var(--muted);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
.badge{display:inline-block;border-radius:99px;font-weight:700;white-space:nowrap;}
.pbar-wrap{background:#151f35;border-radius:99px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:99px;transition:width 1s cubic-bezier(.4,2,.6,1);}
.inp-wrap{display:flex;flex-direction:column;gap:5px;}
.inp-label{color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.inp-hint{color:var(--dim);font-size:10px;margin-top:-3px;}
.inp-row{display:flex;align-items:center;background:#080c18;border:1px solid var(--border);border-radius:9px;overflow:hidden;}
.inp-pre{color:var(--muted);padding:9px 11px;background:#111825;font-size:12px;border-right:1px solid var(--border);}
.inp-suf{color:var(--muted);padding:9px 11px;font-size:11px;}
.inp-row input,.inp-row select{flex:1;background:transparent;border:none;outline:none;color:var(--text);padding:9px 13px;font-size:14px;font-family:'Space Mono',monospace;width:100%;}
.btn{border-radius:10px;font-weight:800;font-size:12px;letter-spacing:.3px;transition:opacity .15s,transform .1s;border:none;}
.btn:hover{opacity:.85;transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.btn.primary{background:var(--accent);color:#060a12;}
.btn.gold{background:var(--gold);color:#060a12;}
.btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent)55;}
.btn.purple{background:var(--purple);color:#fff;}
.btn.blue{background:var(--blue);color:#060a12;}
.btn.teal{background:var(--teal);color:#060a12;}
.btn.red{background:var(--red);color:#fff;}
.btn.dark{background:#151f35;color:var(--muted);border:1px solid var(--border);}
.btn.lime{background:var(--lime);color:#060a12;}
.btn.sm{padding:6px 14px;font-size:11px;}
.btn.md{padding:9px 20px;}
.btn.lg{padding:13px 28px;font-size:14px;}
.btn.xl{padding:15px 38px;font-size:16px;}
.btn.full{width:100%;}
.toggle{width:42px;height:22px;border-radius:99px;cursor:pointer;position:relative;transition:background .2s;border:none;flex-shrink:0;}
.toggle .knob{position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.tab{background:#0a0e1a;color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Space Mono',monospace;}
.dice-face{width:72px;height:72px;border-radius:14px;font-size:42px;display:flex;align-items:center;justify-content:center;transition:all .3s;flex-shrink:0;}
.round-hdr{border-radius:14px;padding:14px 17px;margin-bottom:15px;display:flex;gap:13px;align-items:center;}
.profile-opt{border-radius:13px;padding:14px;cursor:pointer;transition:all .13s;border:2px solid var(--border);background:var(--card);}
.profile-opt.sel{border-color:var(--accent);background:var(--as);}
.variety-card{border-radius:12px;padding:13px;border:1px solid var(--border);cursor:pointer;transition:all .13s;}
.variety-card.sel{border-color:var(--accent);background:var(--as);}
.grow-step{display:flex;gap:14px;padding:14px 0;border-top:1px solid var(--border);}
.grow-step .step-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;flex-shrink:0;font-family:'Space Mono',monospace;}
.problem-card{border-radius:11px;padding:12px 14px;border:1px solid var(--border);margin-bottom:8px;}
.modal-overlay{position:fixed;inset:0;background:#000000bb;z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--card);border-radius:20px;padding:26px;max-width:480px;width:100%;animation:slideDown .25s ease;}
.modal-progress{display:flex;gap:5px;margin-bottom:20px;}
.modal-prog-seg{flex:1;height:3px;border-radius:99px;cursor:pointer;transition:background .3s;}
.resume-banner{background:linear-gradient(135deg,#061a0a,#040c08);border:1px solid var(--accent)55;border-radius:14px;padding:14px 17px;display:flex;align-items:center;gap:13px;margin-bottom:16px;}
.cert{background:linear-gradient(135deg,#0a1a05,#061005);border:1px solid var(--accent)55;border-radius:16px;padding:26px 18px;text-align:center;}
.month-banner{background:linear-gradient(135deg,#061a0a,#040d0a);border:1px solid var(--accent)33;border-radius:13px;padding:13px 16px;display:flex;align-items:center;gap:12px;}
.harvest-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-top:1px solid var(--border)22;font-size:12px;}
.audit-item{border-radius:11px;padding:12px 14px;border:1px solid var(--border);margin-bottom:8px;transition:all .15s;}
.stmt-row{display:flex;justify-content:space-between;padding:7px 0;border-top:1px solid #1a264022;font-size:12px;}
/* Diagram styles */
.diagram-wrap{background:#060e08;border:1px solid var(--accent)33;border-radius:14px;padding:20px;overflow-x:auto;}
.shelf-unit{display:flex;flex-direction:column;gap:0;max-width:500px;margin:0 auto;}
.shelf-label{color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.shelf{background:linear-gradient(90deg,#1a2a1a,#0e1a0e);border:1px solid var(--accent)44;border-radius:8px;padding:12px 16px;margin-bottom:3px;display:flex;align-items:center;gap:12px;position:relative;}
.shelf-bracket{width:8px;background:var(--accent)66;border-radius:4px;align-self:stretch;flex-shrink:0;}
.tray{background:linear-gradient(135deg,#0a2a0a,#061806);border:1px solid var(--accent)66;border-radius:6px;padding:8px 12px;flex:1;font-size:11px;}
.tray-label{color:var(--accent);font-weight:700;font-size:11px;}
.tray-status{color:var(--muted);font-size:10px;margin-top:2px;}
.light-bar{background:linear-gradient(90deg,#fff8e1,#fffde7,#fff8e1);border-radius:4px;height:10px;flex:1;box-shadow:0 0 12px #fff8e188;}
.leg{width:6px;background:var(--accent)44;flex-shrink:0;border-radius:2px;}
.tooltip-wrap{position:relative;display:inline-block;}
.tooltip{visibility:hidden;background:#1a2a1a;color:var(--text);border:1px solid var(--accent)44;padding:6px 10px;border-radius:8px;font-size:11px;position:absolute;z-index:10;bottom:125%;left:50%;transform:translateX(-50%);white-space:nowrap;}
.tooltip-wrap:hover .tooltip{visibility:visible;}
@media(max-width:500px){.g4{grid-template-columns:1fr 1fr;}.g3{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-inner">
    <div class="hdr-row">
      <div class="logo-box">🌱</div>
      <div><div class="logo-title">nugO Microgreens Lab</div><div class="logo-sub">Business Simulation · Grow Guide · Full Audit</div></div>
      <div class="hdr-right">
        <div id="save-flash" class="save-flash" style="display:none">💾 Saved</div>
        <button class="btn dark sm" onclick="openHTP()" style="background:var(--ps);border:1px solid var(--purple)55;color:var(--purple)">❓ How to Play</button>
        <div id="farm-hdr" style="display:none;text-align:right">
          <div id="farm-hdr-name" style="color:var(--gold);font-weight:800;font-size:12px"></div>
          <div id="farm-hdr-type" style="color:var(--muted);font-size:9px"></div>
        </div>
      </div>
    </div>
    <div id="prog-wrap" class="prog-wrap" style="display:none">
      <div class="prog-bar" id="prog-bar"></div>
      <div class="prog-labels"><span id="prog-l">Round 1 of 16</span><span id="prog-r" style="color:var(--accent)">0%</span></div>
    </div>
  </div>
</div>

<div id="htp-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeHTP()">
  <div class="modal-box" id="htp-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div><div style="color:var(--teal);font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:1.5px">How to Play</div><div style="color:var(--muted);font-size:11px;margin-top:2px" id="htp-step-lbl">Step 1 of 9</div></div>
      <button class="btn dark sm" onclick="closeHTP()">✕ Close</button>
    </div>
    <div class="modal-progress" id="htp-dots"></div>
    <div id="htp-content"></div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button class="btn ghost sm" id="htp-prev" onclick="htpNav(-1)">← Back</button>
      <div style="flex:1"></div>
      <button class="btn blue md" id="htp-next" onclick="htpNav(1)">Next →</button>
    </div>
  </div>
</div>

<div id="app"><div id="screen"></div></div>

<script>
// ═══════════════════════════════════
// DATA
// ═══════════════════════════════════
const PROFILES=[
  {id:"home",    icon:"🏠", label:"Home Grower",         desc:"Start small, sell to neighbors & farmers markets",   income:800,  expenses:200, trays:10, price:4.50, color:"var(--accent)"},
  {id:"market",  icon:"🏪", label:"Market Vendor",        desc:"Farmers markets, pop-ups & weekend sales",           income:1800, expenses:450, trays:25, price:5.00, color:"var(--blue)"},
  {id:"resto",   icon:"🍽️", label:"Restaurant Supplier",  desc:"Direct to chefs, weekly standing orders",            income:3200, expenses:800, trays:50, price:6.50, color:"var(--gold)"},
  {id:"online",  icon:"📦", label:"Online Store",         desc:"Ship nationwide, subscription boxes",                income:2400, expenses:650, trays:40, price:7.00, color:"var(--purple)"},
  {id:"school",  icon:"🏫", label:"School/Community",     desc:"Schools, nonprofits & community centers",            income:1200, expenses:300, trays:18, price:4.00, color:"var(--teal)"},
  {id:"wellness",icon:"💆", label:"Wellness Brand",       desc:"Health stores, gyms & juice bars",                   income:2800, expenses:700, trays:45, price:8.00, color:"var(--lime)"},
  {id:"scale",   icon:"🚀", label:"Grow & Scale",         desc:"Full operation — wholesale, retail & online",        income:5500, expenses:1400,trays:90, price:5.50, color:"var(--orange)"},
];

const VARIETIES=[
  {id:"sunflower",name:"🌻 Sunflower",    days:"10–14", difficulty:"Easy",     yield:"High",   price:"$5–8/oz",  taste:"Nutty, crunchy",        light:"High",  water:"Moderate", germTime:"2–3 days", color:"var(--gold)"},
  {id:"peas",     name:"🫛 Pea Shoots",   days:"10–14", difficulty:"Easy",     yield:"High",   price:"$4–7/oz",  taste:"Sweet, tender",         light:"Medium",water:"Moderate", germTime:"2–3 days", color:"var(--accent)"},
  {id:"radish",   name:"🌶️ Radish",       days:"7–10",  difficulty:"Easy",     yield:"Medium", price:"$5–9/oz",  taste:"Spicy, peppery",        light:"High",  water:"Low",      germTime:"1–2 days", color:"var(--red)"},
  {id:"broccoli", name:"🥦 Broccoli",     days:"8–12",  difficulty:"Medium",   yield:"Medium", price:"$6–10/oz", taste:"Mild, nutritious",      light:"Medium",water:"Low",      germTime:"2–3 days", color:"var(--teal)"},
  {id:"basil",    name:"🌿 Basil",        days:"12–16", difficulty:"Hard",     yield:"Low",    price:"$8–14/oz", taste:"Aromatic, herby",       light:"High",  water:"Low",      germTime:"3–5 days", color:"var(--lime)"},
  {id:"wheatgrass",name:"🌾 Wheatgrass",  days:"7–10",  difficulty:"Easy",     yield:"High",   price:"$4–6/oz",  taste:"Earthy, grassy",        light:"High",  water:"High",     germTime:"1–2 days", color:"var(--green)"},
  {id:"amaranth", name:"💜 Amaranth",     days:"10–14", difficulty:"Medium",   yield:"Medium", price:"$7–12/oz", taste:"Earthy, colorful",      light:"High",  water:"Low",      germTime:"2–3 days", color:"var(--purple)"},
  {id:"cabbage",  name:"🥬 Cabbage",      days:"8–12",  difficulty:"Easy",     yield:"High",   price:"$5–8/oz",  taste:"Mild, crunchy",         light:"Medium",water:"Low",      germTime:"2–3 days", color:"var(--blue)"},
];

const EVENTS=[
  {id:"mold",     e:"🍄", t:"Mold Outbreak!",          d:"A tray developed mold — must be discarded.",           ef:"trays",    v:-2,    lbl:"−2 Trays Lost",       c:"var(--red)"},
  {id:"perfect",  e:"✨", t:"Perfect Harvest!",         d:"Ideal conditions produced a premium crop.",            ef:"revenue",  v:200,   lbl:"+$200 Premium Sale",  c:"var(--gold)"},
  {id:"bigorder", e:"🍽️", t:"Restaurant Big Order",     d:"A chef placed a large standing order.",               ef:"revenue",  v:400,   lbl:"+$400 Order",         c:"var(--accent)"},
  {id:"nongerm",  e:"😰", t:"Seeds Didn't Germinate",   d:"A bad seed batch failed to sprout.",                  ef:"trays",    v:-3,    lbl:"−3 Trays Lost",       c:"var(--red)"},
  {id:"rainout",  e:"🌧️", t:"Market Rained Out",        d:"Farmers market cancelled — no sales this week.",     ef:"revenue",  v:-150,  lbl:"−$150 Lost Sales",    c:"var(--red)"},
  {id:"store",    e:"🏪", t:"Health Store Contract!",   d:"A local health store wants weekly supply.",           ef:"revenue",  v:350,   lbl:"+$350 Contract",      c:"var(--accent)"},
  {id:"power",    e:"⚡", t:"Power Outage",              d:"Lights were out 24hrs — slow growth this cycle.",    ef:"trays",    v:-1,    lbl:"−1 Tray Affected",    c:"var(--orange)"},
  {id:"viral",    e:"🔥", t:"Social Media Viral!",       d:"Your harvest video blew up online.",                 ef:"revenue",  v:500,   lbl:"+$500 Orders",        c:"var(--gold)"},
  {id:"pest",     e:"🐛", t:"Pest Problem",              d:"Insects found in your grow area.",                   ef:"trays",    v:-2,    lbl:"−2 Trays Damaged",    c:"var(--red)"},
  {id:"award",    e:"🏆", t:"Local Agri Award!",         d:"Won a local small farm award — press coverage.",     ef:"revenue",  v:300,   lbl:"+$300 Exposure",      c:"var(--gold)"},
  {id:"heatwave", e:"🌡️", t:"Heatwave Week",             d:"High temps stressed plants — lower yield.",          ef:"revenue",  v:-100,  lbl:"−$100 Yield Loss",    c:"var(--orange)"},
  {id:"bulk",     e:"📦", t:"Bulk Seed Deal",            d:"Found a great deal on seeds — saved on supplies.",   ef:"expense",  v:-80,   lbl:"−$80 Supply Cost",    c:"var(--accent)"},
  {id:"subsbox",  e:"📫", t:"Subscription Box Feature",  d:"Featured in a popular subscription box service.",    ef:"revenue",  v:450,   lbl:"+$450 Feature",       c:"var(--lime)"},
  {id:"equip",    e:"🔧", t:"Equipment Failure",         d:"Grow light broke — emergency replacement.",          ef:"expense",  v:150,   lbl:"+$150 Repair",        c:"var(--red)"},
  {id:"coldsnap", e:"❄️", t:"Cold Snap",                 d:"Temperature drop slowed germination by 2 days.",    ef:"trays",    v:-1,    lbl:"−1 Slow Tray",        c:"var(--blue)"},
  {id:"chef",     e:"👨‍🍳",t:"Chef Partnership",          d:"A Michelin-starred chef wants exclusive supply.",    ef:"revenue",  v:600,   lbl:"+$600 Partnership",   c:"var(--gold)"},
  {id:"overwater",e:"💧", t:"Overwatered Trays",          d:"Rookie mistake — too much water caused root rot.",  ef:"trays",    v:-2,    lbl:"−2 Trays Rotted",     c:"var(--red)"},
  {id:"grant",    e:"🌱", t:"Farm Grant Awarded!",        d:"A local agriculture grant came through.",           ef:"revenue",  v:500,   lbl:"+$500 Grant",         c:"var(--accent)"},
  {id:"wholesale",e:"🚚", t:"Wholesale Deal",             d:"A grocery chain wants regular wholesale orders.",   ef:"revenue",  v:400,   lbl:"+$400 Wholesale",     c:"var(--lime)"},
  {id:"festival", e:"🎉", t:"Food Festival Win",          d:"Won best micro-greens at a local food festival.",   ef:"revenue",  v:350,   lbl:"+$350 Prize",         c:"var(--gold)"},
];

const MONTH_NAMES=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DICE_FACES=["⚀","⚁","⚂","⚃","⚄","⚅"];
const TOTAL_ROUNDS=16;
const SAVE_KEY="nugo-microgreens-v1";

const HTP=[
  {icon:"🌱",title:"Round 1 — Choose Your Farm Profile",color:"var(--accent)",body:"Pick your microgreens business model: Home Grower, Market Vendor, Restaurant Supplier, Online Store, School/Community, Wellness Brand, or Grow & Scale. Each has unique revenue potential, tray counts, and pricing."},
  {icon:"🏷️",title:"Round 2 — Name & Fund Your Farm",color:"var(--gold)",body:"Name your microgreens farm, set your starting capital, decide whether to take a startup loan, and choose if you'll hire help or go solo. These decisions affect your monthly cash flow for all 8 operating months."},
  {icon:"📖",title:"Round 3 — Grow Guide & Varieties",color:"var(--lime)",body:"Study the complete growing guide before you start. Learn germination times, light requirements, watering schedules, and harvest techniques for 8 microgreen varieties. Choose which variety to grow as your main crop."},
  {icon:"🏗️",title:"Round 4 — Setup Diagram & Equipment",color:"var(--teal)",body:"Set up your grow room using the interactive diagram. Learn shelf setup, light placement, fan position, and watering station layout. Then purchase your equipment and supplies — trays, seeds, grow medium, lights, and shelving."},
  {icon:"💰",title:"Round 5 — Pricing Strategy",color:"var(--gold)",body:"Calculate your cost per tray, price per ounce, and target profit margin. Use the BUAD222 contribution margin formula to find your break-even point and set a competitive price for your market."},

const fmt  = n=>"$"+Math.abs(Math.round(n)).toLocaleString();
const fmtS = n=>(n>=0?"+":"−")+fmt(n);
const pct  = (a,b)=>b===0?"0%":Math.round((a/b)*100)+"%";
const clamp= (v,lo,hi)=>Math.min(hi,Math.max(lo,v));

function pickEvent(d1,d2,mi){return EVENTS[((d1+d2+2-2)*2+mi)%EVENTS.length];}

function calcScores(months,farm){
  if(!months.length) return {revenue:0,profit:0,growth:0,quality:0,decisions:0,total:0};
  const avgProfit=months.reduce((a,m)=>a+(m.profit||0),0)/months.length;
  const profit=clamp(Math.round(50+avgProfit/20),0,100);
  const lastRev=months[months.length-1].revenue||0;
  const revenue=clamp(Math.round(Math.min(100,(lastRev/farm.income)*80)),0,100);
  const trayGrowth=(months[months.length-1].traysActive||0)-(months[0].traysActive||0);
  const growth=clamp(Math.round(50+trayGrowth*3),0,100);
  const lostTrays=months.reduce((a,m)=>a+(m.traysLost||0),0);
  const quality=clamp(Math.round(100-lostTrays*5),0,100);
  const decisions=clamp(Math.round(months.reduce((a,m)=>a+(m.profit>0?20:0)+(m.mktSpend>0?10:0),0)/months.length),0,100);
  const total=Math.round((profit+revenue+growth+quality+decisions)/5);
  return {revenue,profit,growth,quality,decisions,total};
}

function renderPricing(){
  const p=PROFILES.find(x=>x.id===S.farm.profileId);
  const seedCost=S.strategy.seedCost||2.50;
  const mediumCost=S.strategy.mediumCost||1.50;
  const laborCost=S.farm.solo?0:1.00;
  const miscCost=0.75;
  const totalCOGS=seedCost+mediumCost+laborCost+miscCost;
  const price=S.farm.pricePerOz||p.price;
  const avgYield=8;
  const revenuePerTray=price*avgYield;
  const profitPerTray=revenuePerTray-(totalCOGS*avgYield);
  const margin=revenuePerTray>0?profitPerTray/revenuePerTray:0;
  const breakEven=Math.ceil(totalCOGS*avgYield/price);

  return `
    ${roundHdr("💰","5","Pricing Strategy","Calculate your cost per oz, profit per tray & break-even point")}
    <div class="col">
      ${card(`
        <div style="color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:11px">📐 BUAD222 Contribution Margin Formula</div>
        <div style="background:#080c18;border-radius:9px;padding:12px;font-family:'Space Mono',monospace;font-size:12px;line-height:2">
          <div><span style="color:var(--gold)">Revenue/Tray</span> = Price × Avg Yield (${avgYield}oz)</div>
          <div><span style="color:var(--red)">COGS/Tray</span> = Seeds + Medium + Labor + Misc</div>
          <div><span style="color:var(--accent)">Profit/Tray</span> = Revenue − COGS</div>
          <div><span style="color:var(--teal)">Break-Even</span> = COGS ÷ Price per oz</div>
        </div>`,"","background:#080c18")}
      <div class="g2">
        ${inp("Your Price per oz","price-oz","number",price,"$","/oz",`Market range for your variety`)}
        ${inp("Seed Cost per tray","seed-cost","number",seedCost,"$","/tray","Avg 1–2oz seeds per 10×20 tray")}
        ${inp("Growing Medium per tray","medium-cost","number",mediumCost,"$","/tray","Coir, potting mix, or hemp mat")}
      </div>
      ${card(`
        <div style="color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:13px">📊 Per-Tray Analysis</div>
        <div class="g4">
          ${st("Revenue/Tray",fmt(revenuePerTray),"var(--accent)")}
          ${st("COGS/Tray",fmt(totalCOGS*avgYield),"var(--red)")}
          ${st("Profit/Tray",fmt(profitPerTray),profitPerTray>0?"var(--accent)":"var(--red)")}
          ${st("Margin %",pct(profitPerTray,revenuePerTray),margin>0.4?"var(--accent)":margin>0.2?"var(--gold)":"var(--red)")}
        </div>
        <div style="margin-top:12px">${pb(margin*100,margin>0.4?"var(--accent)":margin>0.2?"var(--gold)":"var(--red)",10)}</div>
        <div style="margin-top:10px;padding:8px 12px;background:${profitPerTray>0?"var(--as)":"var(--rs)"};border-radius:8px;display:flex;justify-content:space-between;font-size:12px">
          <span style="color:var(--muted)">Break-even point</span>
          <span style="color:${profitPerTray>0?"var(--accent)":"var(--red)"};font-weight:700;font-family:'Space Mono',monospace">${breakEven} oz to cover tray costs</span>
        </div>`,"glow-gold","background:var(--gs)")}
      ${b("Round 6: Marketing Plan →","submitPricing()","primary","lg full")}
      ${restartLink()}
    </div>`;
}

  S.farm.pricePerOz=+(document.getElementById("price-oz")?.value||S.farm.pricePerOz);

function rollDice(mi){
  if(_diceRolled) return;
  let count=0;
  const d1=document.getElementById("d1"),d2=document.getElementById("d2"),ctrl=document.getElementById("dice-ctrl");
  ctrl.innerHTML=`<div style="color:var(--purple);font-weight:800;font-size:13px;animation:pulse 0.45s infinite">Rolling…</div>`;
  d1.classList.add("shake");d2.classList.add("shake");
  d1.style.border="2px solid var(--purple)";d1.style.background="var(--ps)";
  d2.style.border="2px solid var(--purple)";d2.style.background="var(--ps)";
  _diceInterval=setInterval(()=>{
    const r1=Math.floor(Math.random()*6),r2=Math.floor(Math.random()*6);
    d1.textContent=DICE_FACES[r1];d2.textContent=DICE_FACES[r2];count++;
    if(count>=20){
      clearInterval(_diceInterval);
      const f1=Math.floor(Math.random()*6),f2=Math.floor(Math.random()*6);
      d1.textContent=DICE_FACES[f1];d2.textContent=DICE_FACES[f2];
      d1.classList.remove("shake");d2.classList.remove("shake");
      d1.style.border="2px solid var(--gold)";d1.style.background="var(--gs)";d1.style.boxShadow="0 0 20px #f5b73166";
      d2.style.border="2px solid var(--gold)";d2.style.background="var(--gs)";d2.style.boxShadow="0 0 20px #f5b73166";
      const sum=f1+f2+2;
      const sumEl=document.getElementById("dice-sum");sumEl.style.display="flex";
      document.getElementById("sum-val").textContent=sum;
      ctrl.innerHTML=`<div style="display:flex;gap:8px">${bdg("Die 1: "+(f1+1),"var(--gold)")} ${bdg("Die 2: "+(f2+1),"var(--gold)")}</div>`;
      _diceRolled=true;
      _chosenEvent=pickEvent(f1,f2,mi);
      showEventReveal(_chosenEvent);
    }
  },65);
}

}

function submitMonth(mi){
  if(!_chosenEvent){alert("Roll the dice first!");return;}
  const ev=_chosenEvent;
  const prevCash=S.months.length>0?S.months[S.months.length-1].cashEnd:S.farm.totalCash;
  const prevTrays=S.months.length>0?S.months[S.months.length-1].traysActive:S.strategy.startTrays||PROFILES.find(x=>x.id===S.farm.profileId).trays;
  const seedsCost=+(document.getElementById("seeds-cost")?.value||0);
  const utilCost=+(document.getElementById("util-cost")?.value||60);
  const pkgCost=+(document.getElementById("pkg-cost")?.value||40);
  const mktCost=+(document.getElementById("mkt-cost")?.value||30);
  const empCost=S.farm.solo?0:300;
  const loanPmt=S.farm.loan?Math.round(S.farm.loanAmt*0.10):0;
  const baseExpenses=seedsCost+utilCost+pkgCost+mktCost+empCost+loanPmt;
  let traysActive=prevTrays, revenueAdj=0, expenseAdj=0, traysLost=0;
  if(ev.ef==="trays"){traysLost=Math.abs(ev.v);traysActive=Math.max(0,prevTrays+ev.v);}
  if(ev.ef==="revenue") revenueAdj=ev.v;
  if(ev.ef==="expense") expenseAdj=ev.v;
  const avgYield=8;
  const baseRevenue=Math.round(traysActive*avgYield*S.farm.pricePerOz);
  const revenue=Math.max(0,baseRevenue+revenueAdj);
  const expenses=Math.max(0,baseExpenses+expenseAdj);
  const profit=revenue-expenses;
  const cashEnd=prevCash+revenue-expenses;
  const debt=S.farm.loan?Math.max(0,S.farm.loanAmt-loanPmt*(mi+1)):0;
  S.months.push({month:mi+1,monthName:MONTH_NAMES[mi],seedsCost,utilCost,pkgCost,mktCost,empCost,loanPmt,
    baseExpenses,expenses,cashAdj:revenueAdj||expenseAdj,revenue,profit,cashEnd,cashStart:prevCash,
    traysActive,traysLost,debt,mktSpend:mktCost,event:ev});
  advance();
}

          <div style="font-size:46px;margin-bottom:8px">🏆</div>
          <div style="color:var(--gold);font-size:19px;font-weight:900">Certificate of Completion</div>
          <div style="color:var(--text);font-size:13px;margin-top:5px">nugO Microgreens Business Lab</div>
          <div style="color:var(--muted);font-size:12px;margin-top:12px">This certifies that</div>
          <div style="color:var(--gold);font-size:18px;font-weight:800;margin:5px 0">🌱 ${S.farm.name}</div>
          <div style="color:var(--muted);font-size:12px">completed all 16 rounds including a Full Business Audit</div>
          <div style="color:var(--accent);font-size:13px;font-weight:700;margin-top:3px">${S.farm.profileLabel} · 8-Month Grow & Sell Journey</div>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px">
            ${bdg("Score: "+scores.total+"/100","var(--gold)","lg")}
            ${bdg(opinionIcon+" "+opinion,opinionColor,"lg")}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:14px;text-align:left">
            ${["Farm Profile Setup","Grow Guide (8 Varieties)","Setup Diagram","Equipment Planning","Pricing & Margins","Marketing Channels","8-Month Operations","20 Farm Event Cards","Income Statement","Balance Sheet","Cash Flow Statement","Trial Balance","Audit Checklist","Audit Opinion","nugO Portfolio"].map(s=>`
              <div style="display:flex;gap:6px;align-items:center"><span style="color:var(--accent);font-size:11px">✓</span><span style="color:var(--muted);font-size:10px">${s}</span></div>`).join("")}
          </div>
        </div>
        <div style="text-align:center;margin-top:14px">${b("↺ Start New Farm","restartFull()","ghost","md")}</div>`;
    }
  }

  return `
    ${roundHdr("🔍","16","Full Business Audit","Income Statement → Balance Sheet → Cash Flow → Audit Opinion")}
    <div style="background:linear-gradient(135deg,#061a0a,#040c08);border:1px solid var(--teal)44;border-radius:13px;padding:14px 17px;display:flex;align-items:center;gap:13px;margin-bottom:14px;flex-wrap:wrap">
      <div style="font-size:28px">🌱</div>
      <div style="flex:1"><div style="color:var(--teal);font-weight:900;font-size:14px">${S.farm.name} — Annual Farm Audit</div><div style="color:var(--muted);font-size:11px;margin-top:2px">${S.farm.profileLabel} · 8-Month Operating Period</div></div>
      <div style="display:flex;gap:13px;flex-wrap:wrap">
        ${st("Net Profit",fmt(totalProfit),totalProfit>=0?"var(--accent)":"var(--red)","sm")}
        ${st("Cash End",fmt(cashEnd),"var(--gold)","sm")}
        ${st("Opinion",opinionIcon+" "+opinion.split(" ")[0],opinionColor,"sm")}
      </div>
    </div>
    <div class="tabs">${tabs.map(t=>`<button class="tab ${_auditTab===t.id?"active":""}" onclick="setAuditTab('${t.id}')" style="${_auditTab===t.id?"background:var(--teal);color:#060a12":""}">${t.lbl}</button>`).join("")}</div>
    ${card(tabContent)}
    ${restartLink()}`;
}

function setCheck(id,val){S.auditChecks[id]=val;saveGame();render();}
function setAuditTab(tab){_auditTab=tab;render();}

// ═══════════════════════════════════
// HOW TO PLAY
// ═══════════════════════════════════
function openHTP(){_htpStep=0;renderHTP();document.getElementById("htp-modal").style.display="flex";}
function closeHTP(){document.getElementById("htp-modal").style.display="none";}
function htpNav(dir){_htpStep=Math.max(0,Math.min(HTP.length-1,_htpStep+dir));renderHTP();}
function renderHTP(){
  const s=HTP[_htpStep];
  document.getElementById("htp-step-lbl").textContent=`Step ${_htpStep+1} of ${HTP.length}`;
  document.getElementById("htp-dots").innerHTML=HTP.map((_,i)=>`<div class="modal-prog-seg" onclick="_htpStep=${i};renderHTP()" style="background:${i<=_htpStep?s.color:"var(--border)"}"></div>`).join("");
  document.getElementById("htp-content").innerHTML=`<div style="font-size:50px;text-align:center;margin-bottom:12px">${s.icon}</div><div style="color:${s.color};font-weight:900;font-size:16px;text-align:center;margin-bottom:10px">${s.title}</div><div style="color:var(--muted);font-size:13px;line-height:1.8;text-align:center">${s.body}</div>`;
  document.getElementById("htp-prev").style.display=_htpStep===0?"none":"inline-block";
  const nx=document.getElementById("htp-next");
  if(_htpStep===HTP.length-1){nx.textContent="Let's Grow! 🌱";nx.className="btn primary md";nx.onclick=closeHTP;}
  else{nx.textContent="Next →";nx.className="btn blue md";nx.onclick=()=>htpNav(1);}
  const box=document.getElementById("htp-box");
  box.style.borderColor=s.color+"55";box.style.boxShadow=`0 0 48px ${s.color}33`;
}

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
window.onload=function(){_auditTab="income";_guideTab="overview";render();};
</script>
