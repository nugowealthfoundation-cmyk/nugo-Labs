<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nugO Email Mastery Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--card:#0e1320;--border:#1a2640;
  --accent:#3d9eff;--as:#3d9eff18;
  --gold:#f5b731;--gs:#f5b73118;
  --red:#f04060;--rs:#f0406018;
  --green:#4cdb8a;--grs:#4cdb8a18;
  --blue:#3d9eff;--bs:#3d9eff18;
  --purple:#a875f0;--ps:#a875f018;
  --orange:#ff7c3a;--os:#ff7c3a18;
  --teal:#00d4d4;--ts:#00d4d418;
  --outlook:#0078d4;--gmail:#ea4335;
  --text:#ddeeff;--muted:#7a90b0;--dim:#374a66;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
input,select,textarea{font-family:'Syne',sans-serif;}
button{font-family:'Space Mono',monospace;cursor:pointer;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.fu{animation:fadeUp .32s ease forwards;}
.shake{animation:shake .4s ease;}
.pop{animation:pop .3s ease;}

#app{max-width:720px;margin:0 auto;padding:0 16px 80px;}
#hdr{background:linear-gradient(180deg,#070d1a,transparent);padding:20px 18px 0;margin-bottom:6px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
#hdr-inner{max-width:720px;margin:0 auto;}
.hdr-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.logo-box{background:var(--as);border:1px solid var(--accent)33;border-radius:11px;padding:7px 13px;font-size:19px;flex-shrink:0;}
.logo-title{color:var(--accent);font-weight:900;font-size:16px;letter-spacing:-0.5px;}
.logo-sub{color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:1.5px;}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.mod-progress{display:flex;gap:4px;margin-top:14px;margin-bottom:2px;}
.mp-seg{flex:1;height:4px;border-radius:99px;background:var(--border);transition:background .3s;cursor:pointer;}
.mp-labels{display:flex;justify-content:space-between;margin-top:4px;}
.mp-labels span{color:var(--muted);font-size:9px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:0 2px 20px #00000055;}
.card.blue{border-color:var(--blue)55;box-shadow:0 0 28px var(--blue)22;}
.card.gold{border-color:var(--gold)55;box-shadow:0 0 28px var(--gold)22;}
.card.green{border-color:var(--green)55;box-shadow:0 0 28px var(--green)22;}
.card.red{border-color:var(--red)55;box-shadow:0 0 28px var(--red)22;}
.card.purple{border-color:var(--purple)55;box-shadow:0 0 28px var(--purple)22;}
.card.teal{border-color:var(--teal)55;box-shadow:0 0 28px var(--teal)22;}
.card.dark{background:#080c18;}
.card.outlook{border-color:#0078d455;box-shadow:0 0 28px #0078d422;}
.card.gmail{border-color:#ea433555;box-shadow:0 0 28px #ea433522;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;}
.col{display:flex;flex-direction:column;gap:15px;}
.stat{text-align:center;}
.stat .val{font-family:'Space Mono',monospace;font-weight:800;line-height:1;}
.stat .lbl{color:var(--muted);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
.badge{display:inline-block;border-radius:99px;font-weight:700;white-space:nowrap;}
.pbar{background:#151f35;border-radius:99px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:99px;transition:width .9s cubic-bezier(.4,2,.6,1);}
.inp-wrap{display:flex;flex-direction:column;gap:5px;}
.inp-label{color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.inp-hint{color:var(--dim);font-size:10px;}
.inp-row{display:flex;align-items:center;background:#080c18;border:1px solid var(--border);border-radius:9px;overflow:hidden;}
.inp-pre{color:var(--muted);padding:9px 11px;background:#111825;font-size:12px;border-right:1px solid var(--border);}
.inp-row input,.inp-row select{flex:1;background:transparent;border:none;outline:none;color:var(--text);padding:9px 13px;font-size:14px;font-family:'Space Mono',monospace;width:100%;}
.btn{border-radius:10px;font-weight:800;font-size:12px;letter-spacing:.3px;transition:opacity .15s,transform .1s;border:none;}
.btn:hover{opacity:.85;transform:translateY(-1px);}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.btn.blue{background:var(--blue);color:#060a12;}
.btn.gold{background:var(--gold);color:#060a12;}
.btn.ghost{background:transparent;color:var(--blue);border:1px solid var(--blue)55;}
.btn.dark{background:#151f35;color:var(--muted);border:1px solid var(--border);}
.btn.green{background:var(--green);color:#060a12;}
.btn.red{background:var(--red);color:#fff;}
.btn.teal{background:var(--teal);color:#060a12;}
.btn.outlook{background:#0078d4;color:#fff;}
.btn.gmail{background:#ea4335;color:#fff;}
.btn.sm{padding:6px 14px;font-size:11px;}
.btn.md{padding:9px 20px;}
.btn.lg{padding:13px 28px;font-size:14px;}
.btn.xl{padding:15px 38px;font-size:16px;}
.btn.full{width:100%;}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:14px;}
.mod-hdr{border-radius:14px;padding:20px;margin-bottom:16px;}
.email-preview{background:#080c18;border:1px solid var(--border);border-radius:12px;padding:16px;font-family:'Space Mono',monospace;font-size:12px;line-height:1.8;}
.email-field{display:flex;gap:10px;padding:5px 0;border-bottom:1px solid var(--border)22;}
.email-field .field-label{color:var(--muted);min-width:60px;font-size:11px;}
.email-field .field-val{color:var(--text);font-size:12px;}
.email-body-preview{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)22;color:var(--text);font-size:12px;line-height:1.8;}
.template-card{border:1px solid var(--border);border-radius:11px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all .13s;}
.template-card:hover{border-color:var(--blue)55;background:var(--as);}
.template-card .tc-title{font-weight:800;font-size:13px;margin-bottom:4px;}
.template-card .tc-preview{color:var(--muted);font-size:11px;font-style:italic;}
.shortcut-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-top:1px solid var(--border)22;font-size:12px;}
.shortcut-key{background:#151f35;border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-family:'Space Mono',monospace;font-size:11px;color:var(--blue);}
.dos-donts{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.do-card{background:var(--grs);border:1px solid var(--green)44;border-radius:10px;padding:14px;}
.dont-card{background:var(--rs);border:1px solid var(--red)44;border-radius:10px;padding:14px;}
.quiz-opt{border:2px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .13s;margin-bottom:8px;font-size:13px;}
.quiz-opt:hover{border-color:var(--blue)55;background:var(--as);}
.quiz-opt.correct{border-color:var(--green);background:var(--grs);}
.quiz-opt.wrong{border-color:var(--red);background:var(--rs);}
.score-badge{display:inline-block;background:var(--gold);color:#060a12;border-radius:99px;padding:4px 14px;font-weight:800;font-size:14px;font-family:'Space Mono',monospace;}
.wb-input{background:#080c18;border:1px solid var(--border);border-radius:9px;padding:10px 13px;width:100%;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;outline:none;resize:vertical;min-height:60px;}
.wb-input:focus{border-color:var(--blue)66;}
.sim-email{background:#080c18;border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.sim-header{background:#111825;padding:12px 16px;border-bottom:1px solid var(--border);}
.sim-field{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)22;}
.sim-field label{color:var(--muted);font-size:11px;min-width:50px;}
.sim-field input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:13px;font-family:'Syne',sans-serif;}
.sim-body{padding:14px 16px;}
.sim-body textarea{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:13px;font-family:'Syne',sans-serif;resize:none;min-height:120px;line-height:1.7;}
.cert{background:linear-gradient(135deg,#0a1428,#060e20);border:1px solid var(--blue)55;border-radius:16px;padding:28px;text-align:center;}
.day-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .13s;}
.day-check.done{background:var(--green);border-color:var(--green);color:#060a12;}
.check-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--border)22;}
.comp-table{width:100%;border-collapse:collapse;font-size:11px;}
.comp-table th{color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:1px;padding:8px;text-align:left;border-bottom:1px solid var(--border);}
.comp-table td{padding:9px 8px;border-bottom:1px solid var(--border)22;font-size:12px;}
@media(max-width:500px){.g4{grid-template-columns:1fr 1fr;}.g3{grid-template-columns:1fr 1fr;}.dos-donts{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-inner">
    <div class="hdr-row">
      <div class="logo-box">📧</div>
      <div>
        <div class="logo-title">nugO Email Mastery Lab</div>
        <div class="logo-sub">Outlook · Gmail · Workplace Communication</div>
      </div>
      <div class="hdr-right">
        <div id="prog-pct" style="color:var(--blue);font-size:10px;font-weight:700;font-family:'Space Mono',monospace">0%</div>
        <button class="btn dark sm" id="cert-btn" onclick="toggleCert()" style="display:none">🏆 Certificate</button>
      </div>
    </div>
    <div class="mod-progress" id="mod-progress"></div>
    <div class="mp-labels">
      <span id="mod-lbl">Module 1 of 7</span>
      <span id="mod-name" style="color:var(--blue)">Email Fundamentals</span>
    </div>
  </div>
</div>

<div id="app"><div id="screen" class="fu"></div></div>

<script>
const SAVE_KEY = "nugo-email-v1";
let S = {module:0, completed:[], workbook:{}, checks:{}, quiz:{}, showCert:false, simScore:null};

function save(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(S));}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem(SAVE_KEY)||"null");if(d)S={...S,...d};}catch(e){}}

const MODULES = [
  {num:1,icon:"📧",title:"Email Fundamentals",        color:"var(--blue)"},
  {num:2,icon:"📁",title:"Inbox Organization",         color:"var(--gold)"},
  {num:3,icon:"✍️", title:"Writing Professional Emails",color:"var(--green)"},
  {num:4,icon:"📅",title:"Calendar & Scheduling",      color:"var(--purple)"},
  {num:5,icon:"🔒",title:"Email Security",             color:"var(--red)"},
  {num:6,icon:"🤝",title:"Workplace Communication",    color:"var(--teal)"},
  {num:7,icon:"💼",title:"Outlook vs Gmail Mastery",   color:"var(--orange)"},
];

const fmt   = n => "$" + Math.abs(Math.round(n)).toLocaleString();
const clamp = (v,lo,hi) => Math.min(hi, Math.max(lo, v));
const b     = (txt,fn,v="blue",sz="md",dis=false) =>
  `<button class="btn ${v} ${sz}" onclick="${fn}" ${dis?"disabled":""}>${txt}</button>`;
const bdg   = (txt,color,sz="sm") =>
  `<span class="badge" style="background:${color}28;color:${color};border:1px solid ${color}44;padding:${sz==="lg"?"4px 14px":"2px 10px"};font-size:${sz==="lg"?13:11}px">${txt}</span>`;
const st    = (lbl,val,color) =>
  `<div class="stat"><div class="val" style="color:${color};font-size:20px">${val}</div><div class="lbl">${lbl}</div></div>`;
const card  = (c,cls="",style="") => `<div class="card ${cls}" style="${style}">${c}</div>`;
const modHdr = (m) => `
  <div class="mod-hdr" style="background:linear-gradient(135deg,${m.color}18,transparent);border:1px solid ${m.color}44">
    <div style="display:flex;gap:12px;align-items:center">
      <div style="font-size:28px;background:${m.color}22;border-radius:10px;padding:10px 12px;flex-shrink:0">${m.icon}</div>
      <div>
        <div style="display:flex;gap:7px;margin-bottom:5px;flex-wrap:wrap">
          ${bdg("Module "+m.num,"var(--blue)")}
          ${bdg("of 7","var(--dim)")}
          ${S.completed.includes(m.num-1)?bdg("✓ Complete","var(--green)"):""}
        </div>
        <div style="font-size:17px;font-weight:900">${m.title}</div>
      </div>
    </div>
  </div>`;
const navBtns = (mi) => {
  const prev = mi>0 ? b("← "+MODULES[mi-1].title.split(" ")[0],"goModule("+(mi-1)+")", "dark","sm") : "";
  const next = mi<6
    ? b("Next: "+MODULES[mi+1].title+" →","completeModule("+mi+")","blue","lg full")
    : b("🏆 Complete & Earn Certificate","completeModule("+mi+")","gold","lg full");
  return `<div style="display:flex;gap:8px">${prev}<div style="flex:1"></div></div>${next}`;
};
const wbBlock = (label, id, placeholder) => `
  <div>
    <label style="color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:5px">${label}</label>
    <textarea class="wb-input" id="wb-${id}" oninput="wbSave('${id}')" placeholder="${placeholder}">${S.workbook[id]||""}</textarea>
  </div>`;
const checkItem = (id,text) => {
  const done=S.checks[id];
  return `<div class="check-row">
    <div class="day-check ${done?"done":""}" onclick="toggleCheck('${id}')">${done?"✓":""}</div>
    <span style="color:${done?"var(--muted)":"var(--text)"};font-size:12px;${done?"text-decoration:line-through":""}">${text}</span>
  </div>`;
};

function wbSave(id){const el=document.getElementById("wb-"+id);if(el){S.workbook[id]=el.value;save();}}
function toggleCheck(id){S.checks[id]=!S.checks[id];save();const el=document.querySelector(`[onclick="toggleCheck('${id}')"]`);if(el){el.classList.toggle("done",S.checks[id]);el.textContent=S.checks[id]?"✓":"";const row=el.nextElementSibling;if(row){row.style.textDecoration=S.checks[id]?"line-through":"none";row.style.color=S.checks[id]?"var(--muted)":"var(--text)";}}}
function goModule(i){S.module=i;S.showCert=false;save();render();}
function completeModule(i){if(!S.completed.includes(i))S.completed.push(i);if(i<6)S.module=i+1;else S.showCert=true;save();render();}
function toggleCert(){S.showCert=!S.showCert;save();render();}
function copyTemplate(btn,text){navigator.clipboard.writeText(text).then(()=>{btn.textContent="✅ Copied!";setTimeout(()=>btn.textContent="📋 Copy",2000);});}

function render(){
  updateProgress();
  window.scrollTo({top:0,behavior:"smooth"});
  const el=document.getElementById("screen");
  el.className="fu"; void el.offsetWidth;
  if(S.showCert){el.innerHTML=renderCert();return;}
  const renders=[renderM1,renderM2,renderM3,renderM4,renderM5,renderM6,renderM7];
  el.innerHTML = S.module===0 && S.completed.length===0 ? renderIntro() : renders[S.module]();
}

function updateProgress(){
  const pct=Math.round((S.completed.length/7)*100);
  const pp=document.getElementById("prog-pct");if(pp)pp.textContent=pct+"%";
  const ml=document.getElementById("mod-lbl");if(ml)ml.textContent="Module "+(S.module+1)+" of 7";
  const mn=document.getElementById("mod-name");if(mn)mn.textContent=MODULES[S.module].title;
  MODULES.forEach((_,i)=>{
    const seg=document.getElementById("mseg-"+i);
    if(seg)seg.style.background=S.completed.includes(i)?"var(--green)":i===S.module?"var(--blue)88":"var(--border)";
  });
  const cb=document.getElementById("cert-btn");
  if(cb)cb.style.display=S.completed.length===7?"inline-block":"none";
}

// ═══════════════════════════════════
// INTRO
// ═══════════════════════════════════
function renderIntro(){
  return `<div class="col fu">
    <div style="text-align:center;padding:26px 0 18px">
      <div style="font-size:52px;margin-bottom:12px">📧</div>
      <h1 style="font-size:24px;font-weight:900;margin:0 0 10px;line-height:1.25">Email Mastery<br><span style="color:var(--blue)">for the Workplace</span></h1>
      <p style="color:var(--muted);font-size:13px;line-height:1.75;max-width:460px;margin:0 auto 20px">
        Master <strong style="color:#0078d4">Outlook</strong> and <strong style="color:#ea4335">Gmail</strong> for the modern workplace. Write professional emails, organize your inbox, schedule meetings, and protect yourself online.
      </p>
      <button class="btn blue xl" onclick="goModule(0)">Start Module 1 →</button>
    </div>
    <div class="g3" style="margin-bottom:18px">
      <div class="card" style="text-align:center;padding:15px 10px"><div style="font-size:22px;margin-bottom:5px">✍️</div><div style="font-weight:700;font-size:11px">20+ Templates</div><div style="color:var(--muted);font-size:10px;margin-top:3px">Copy-paste professional emails</div></div>
      <div class="card" style="text-align:center;padding:15px 10px"><div style="font-size:22px;margin-bottom:5px">⌨️</div><div style="font-weight:700;font-size:11px">Shortcuts Guide</div><div style="color:var(--muted);font-size:10px;margin-top:3px">Outlook + Gmail keyboard shortcuts</div></div>
      <div class="card" style="text-align:center;padding:15px 10px"><div style="font-size:22px;margin-bottom:5px">🔍</div><div style="font-weight:700;font-size:11px">Email Simulator</div><div style="color:var(--muted);font-size:10px;margin-top:3px">Practice & get scored</div></div>
    </div>
    ${card(`
      <div class="section-title">📚 7 Modules</div>
      ${MODULES.map((m,i)=>`
        <div style="display:flex;gap:11px;padding:10px 0;border-top:${i>0?"1px solid var(--border)":"none"};align-items:center;cursor:pointer" onclick="goModule(${i})">
          <div style="width:28px;height:28px;border-radius:50%;background:${m.color}22;border:1px solid ${m.color}55;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">${m.icon}</div>
          <div style="flex:1"><div style="font-weight:700;font-size:12px">Module ${m.num}: ${m.title}</div></div>
          ${S.completed.includes(i)?bdg("✓ Done","var(--green)"):bdg("Start →",m.color)}
        </div>`).join("")}
    `)}
  </div>`;
}

// ═══════════════════════════════════
// MODULE 1 — EMAIL FUNDAMENTALS
// ═══════════════════════════════════
function renderM1(){
  const m=MODULES[0];
  return `${modHdr(m)}<div class="col">
    ${card(`
      <div class="section-title">📧 Parts of a Professional Email</div>
      <div class="email-preview">
        <div class="email-field"><span class="field-label">FROM:</span><span class="field-val" style="color:var(--blue)">yourname@company.com</span></div>
        <div class="email-field"><span class="field-label">TO:</span><span class="field-val">supervisor@company.com</span></div>
        <div class="email-field"><span class="field-label">CC:</span><span class="field-val" style="color:var(--muted)">colleague@company.com (optional — only if they NEED to see it)</span></div>
        <div class="email-field"><span class="field-label">SUBJECT:</span><span class="field-val" style="color:var(--gold);font-weight:700">Meeting Request — Q3 Budget Review — Friday 2PM</span></div>
        <div class="email-body-preview">
          <div style="color:var(--muted);font-size:10px;margin-bottom:8px">BODY:</div>
          <div>Hi [Name],</div><br>
          <div>I hope this message finds you well. I am writing to request a brief meeting to discuss the Q3 budget review.</div><br>
          <div>Would Friday at 2:00 PM work for you? I am also available Thursday after 3:00 PM if that is more convenient.</div><br>
          <div>Please let me know what works best for your schedule.</div><br>
          <div>Best regards,<br>[Your Name]<br>[Your Title]<br>[Phone Number]</div>
        </div>
      </div>
    `,"blue")}
    ${card(`
      <div class="section-title">✅ Subject Line Rules</div>
      <div class="dos-donts">
        <div class="do-card">
          <div style="color:var(--green);font-weight:800;font-size:12px;margin-bottom:8px">✅ GOOD Subject Lines</div>
          ${["Meeting Request — Budget Review — Fri 2PM","Question About Client Presentation — Due Friday","Action Required: Please Review Contract by EOD","Following Up — Job Application — John Smith","Out of Office: Jan 15–18 — Contact Sarah for urgent matters"].map(s=>`<div style="color:var(--text);font-size:11px;padding:5px 0;border-top:1px solid var(--border)22">✓ ${s}</div>`).join("")}
        </div>
        <div class="dont-card">

function scoreEmail(){
  const to=document.getElementById("sim-to")?.value||"";
  const subject=document.getElementById("sim-subject")?.value||"";
  const body=document.getElementById("sim-body")?.value||"";
  let score=0; const feedback=[];
  if(to.includes("@")){score+=10;feedback.push({c:"var(--green)",m:"✓ Valid recipient address"});}
  else feedback.push({c:"var(--red)",m:"✗ Add a valid email address"});
  if(subject.length>=10&&subject.length<=80){score+=20;feedback.push({c:"var(--green)",m:"✓ Good subject line length"});}
  else if(subject.length<10) feedback.push({c:"var(--red)",m:"✗ Subject line too short — be more specific"});
  else feedback.push({c:"var(--orange)",m:"⚠ Subject line a bit long — try to be more concise"});
  if(subject.length>0&&subject[0]===subject[0].toUpperCase()){score+=10;feedback.push({c:"var(--green)",m:"✓ Subject line properly capitalized"});}
  const hasGreeting=body.toLowerCase().includes("dear")||body.toLowerCase().includes("hi ")||body.toLowerCase().includes("hello");
  if(hasGreeting){score+=20;feedback.push({c:"var(--green)",m:"✓ Professional greeting included"});}
  else feedback.push({c:"var(--red)",m:"✗ Missing greeting (Dear/Hi [Name])"});
  const hasClosing=body.toLowerCase().includes("regards")||body.toLowerCase().includes("sincerely")||body.toLowerCase().includes("thank you");
  if(hasClosing){score+=20;feedback.push({c:"var(--green)",m:"✓ Professional closing included"});}
  else feedback.push({c:"var(--red)",m:"✗ Missing closing (Best regards, Thank you,)"});
  if(body.length>80){score+=10;feedback.push({c:"var(--green)",m:"✓ Email has sufficient content"});}
  const informal=["hey!","lol","haha","gonna","wanna","tbh","ngl","omg","idk"];
  const hasInformal=informal.some(w=>body.toLowerCase().includes(w));
  if(!hasInformal){score+=10;feedback.push({c:"var(--green)",m:"✓ No informal language detected"});}
  else feedback.push({c:"var(--red)",m:"✗ Contains informal language — keep it professional"});
  const grade=score>=80?"A":score>=70?"B":score>=60?"C":score>=50?"D":"F";
  const gradeColor=score>=80?"var(--green)":score>=60?"var(--gold)":"var(--red)";
  document.getElementById("sim-result").innerHTML=card(`
    <div style="text-align:center;margin-bottom:14px">
      <div style="color:var(--muted);font-size:10px;text-transform:uppercase;margin-bottom:5px">Email Professionalism Score</div>
      <div style="color:${gradeColor};font-size:42px;font-weight:900;font-family:'Space Mono',monospace">${score}/100</div>
      <div style="color:${gradeColor};font-size:18px;font-weight:700">Grade: ${grade}</div>
    </div>
    <div class="col">
      ${feedback.map(f=>`<div style="color:${f.c};font-size:12px;padding:4px 0">${f.m}</div>`).join("")}
    </div>
  `,"dark");
}

function answerQuiz(i){const qi=S.quiz.sec_q||0;S.quiz["sec_ans_"+qi]=i;save();render();}
