<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nugO Affiliate Marketing Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--card:#0e1320;--border:#1a2640;
  --accent:#f5b731;--as:#f5b73118;
  --green:#4cdb8a;--grs:#4cdb8a18;
  --red:#f04060;--rs:#f0406018;
  --blue:#3d9eff;--bs:#3d9eff18;
  --purple:#a875f0;--ps:#a875f018;
  --orange:#ff7c3a;--os:#ff7c3a18;
  --teal:#00d4d4;--ts:#00d4d418;
  --text:#ddeeff;--muted:#7a90b0;--dim:#374a66;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
input,select,textarea{font-family:'Syne',sans-serif;}
button{font-family:'Space Mono',monospace;cursor:pointer;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px var(--accent)44}50%{box-shadow:0 0 40px var(--accent)88}}
.fu{animation:fadeUp .32s ease forwards;}

/* Layout */
#app{max-width:720px;margin:0 auto;padding:0 16px 80px;}

/* Header */
#hdr{background:linear-gradient(180deg,#0d1520,transparent);padding:20px 18px 0;margin-bottom:6px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
#hdr-inner{max-width:720px;margin:0 auto;}

/* Progress */
.module-progress{display:flex;gap:4px;margin-top:14px;margin-bottom:2px;}
.mp-seg{flex:1;height:4px;border-radius:99px;background:var(--border);transition:background .3s;cursor:pointer;}
.mp-labels{display:flex;justify-content:space-between;margin-top:4px;}
.mp-labels span{color:var(--muted);font-size:9px;}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;box-shadow:0 2px 20px #00000055;}
.card.gold{border-color:var(--accent)55;box-shadow:0 0 28px var(--accent)22;}
.card.green{border-color:var(--green)55;box-shadow:0 0 28px var(--green)22;}
.card.red{border-color:var(--red)55;box-shadow:0 0 28px var(--red)22;}
.card.blue{border-color:var(--blue)55;box-shadow:0 0 28px var(--blue)22;}
.card.purple{border-color:var(--purple)55;box-shadow:0 0 28px var(--purple)22;}
.card.teal{border-color:var(--teal)55;box-shadow:0 0 28px var(--teal)22;}
.card.dark{background:#080c18;}

/* Typography */
.display{font-family:'Playfair Display',serif;font-weight:900;}
.mono{font-family:'Space Mono',monospace;}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:14px;}

/* Badges */
.badge{display:inline-block;border-radius:99px;font-weight:700;white-space:nowrap;font-size:11px;padding:2px 10px;}
.badge.lg{font-size:13px;padding:4px 14px;}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;}
.col{display:flex;flex-direction:column;gap:15px;}

/* Stat */
.stat{text-align:center;}
.stat .val{font-family:'Space Mono',monospace;font-weight:800;line-height:1;}
.stat .lbl{color:var(--muted);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:4px;}

/* Progress bar */
.pbar{background:#151f35;border-radius:99px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:99px;transition:width .9s cubic-bezier(.4,2,.6,1);}

/* Inputs */
.inp-wrap{display:flex;flex-direction:column;gap:5px;}
.inp-label{color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.inp-hint{color:var(--dim);font-size:10px;}
.inp-row{display:flex;align-items:center;background:#080c18;border:1px solid var(--border);border-radius:9px;overflow:hidden;}
.inp-pre{color:var(--muted);padding:9px 11px;background:#111825;font-size:12px;border-right:1px solid var(--border);}
.inp-suf{color:var(--muted);padding:9px 11px;font-size:11px;}
.inp-row input,.inp-row select,.inp-row textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);padding:9px 13px;font-size:14px;font-family:'Space Mono',monospace;width:100%;}
.inp-row textarea{resize:vertical;min-height:70px;}

/* Buttons */
.btn{border-radius:10px;font-weight:800;font-size:12px;letter-spacing:.3px;transition:opacity .15s,transform .1s;border:none;}
.btn:hover{opacity:.85;transform:translateY(-1px);}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.btn.gold{background:var(--accent);color:#060a12;}
.btn.green{background:var(--green);color:#060a12;}
.btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent)55;}
.btn.dark{background:#151f35;color:var(--muted);border:1px solid var(--border);}
.btn.blue{background:var(--blue);color:#060a12;}
.btn.teal{background:var(--teal);color:#060a12;}
.btn.red{background:var(--red);color:#fff;}
.btn.sm{padding:6px 14px;font-size:11px;}
.btn.md{padding:9px 20px;}
.btn.lg{padding:13px 28px;font-size:14px;}
.btn.xl{padding:15px 38px;font-size:16px;}
.btn.full{width:100%;}

/* Module header */
.mod-hdr{border-radius:14px;padding:20px;margin-bottom:16px;}
.mod-num{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;}

/* Truth box */
.truth-box{border-radius:12px;padding:14px 16px;margin-top:4px;}
.truth-row{display:flex;gap:10px;padding:8px 0;border-top:1px solid var(--border)22;font-size:12px;line-height:1.7;}

/* Platform card */
.platform-card{border-radius:12px;padding:14px;border:2px solid var(--border);cursor:pointer;transition:all .13s;}
.platform-card.sel{border-color:var(--accent);background:var(--as);}

/* Timeline */
.timeline-item{display:flex;gap:14px;padding:14px 0;border-top:1px solid var(--border);}
.tl-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;flex-shrink:0;font-family:'Space Mono',monospace;}
.tl-week{color:var(--accent);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.tl-title{font-weight:800;font-size:13px;margin:3px 0;}
.tl-tasks{color:var(--muted);font-size:11px;line-height:1.8;}

/* Niche selector */
.niche-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.niche-opt{border-radius:10px;padding:12px 14px;border:1px solid var(--border);cursor:pointer;transition:all .13s;}
.niche-opt.sel{border-color:var(--accent);background:var(--as);}
.niche-opt .ni{font-size:20px;margin-bottom:4px;}
.niche-opt .nl{font-weight:700;font-size:12px;}
.niche-opt .nd{color:var(--muted);font-size:10px;margin-top:2px;}
.niche-opt .np{font-size:10px;font-weight:700;margin-top:5px;}

/* Tool card */
.tool-card{border-radius:11px;padding:12px 14px;border:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;margin-bottom:8px;}

/* Day planner */
.day-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--border)22;}
.day-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .13s;}
.day-check.done{background:var(--green);border-color:var(--green);color:#060a12;}

/* Income calculator */
.calc-result{background:var(--as);border:1px solid var(--accent)44;border-radius:10px;padding:14px;text-align:center;margin-top:14px;}

/* Platform comparison */
.comp-table{width:100%;border-collapse:collapse;font-size:11px;}
.comp-table th{color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:1px;padding:8px;text-align:left;border-bottom:1px solid var(--border);}
.comp-table td{padding:9px 8px;border-bottom:1px solid var(--border)22;font-size:12px;}

/* Cert */
.cert{background:linear-gradient(135deg,#1a1200,#0e1a00);border:1px solid var(--accent)55;border-radius:16px;padding:28px;text-align:center;}

/* Nav tabs */
.nav-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.nav-tab{padding:8px 14px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);font-family:'Space Mono',monospace;transition:all .13s;}
.nav-tab.active{background:var(--accent);color:#060a12;border-color:var(--accent);}

/* Workbook input */
.wb-input{background:#080c18;border:1px solid var(--border);border-radius:9px;padding:10px 13px;width:100%;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;outline:none;resize:vertical;min-height:60px;}
.wb-input:focus{border-color:var(--accent)66;}

@media(max-width:500px){.g4{grid-template-columns:1fr 1fr;}.g3{grid-template-columns:1fr 1fr;}.niche-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-inner">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div style="background:var(--as);border:1px solid var(--accent)33;border-radius:11px;padding:7px 13px;font-size:19px;flex-shrink:0">💰</div>
      <div>
        <div style="color:var(--accent);font-weight:900;font-size:16px;letter-spacing:-0.5px">nugO Affiliate Marketing Lab</div>
        <div style="color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:1.5px">Interactive Workbook · 7 Modules · 90-Day Action Plan</div>
      </div>
      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
        <div id="prog-pct" style="color:var(--accent);font-size:10px;font-weight:700;font-family:'Space Mono',monospace">0%</div>
        <button class="btn dark sm" onclick="toggleCert()" id="cert-btn" style="display:none">🏆 Certificate</button>
      </div>
    </div>
    <div class="module-progress" id="mod-progress">
      ${Array(7).fill("").map((_,i)=>`<div class="mp-seg" id="mseg-${i}" onclick="goModule(${i})"></div>`).join("")}
    </div>
    <div class="mp-labels"><span id="mod-lbl">Module 1 of 7</span><span style="color:var(--accent)" id="mod-name">What is Affiliate Marketing</span></div>
  </div>
</div>

<div id="app"><div id="screen" class="fu"></div></div>

<script>
// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
const SAVE_KEY = "nugo-affiliate-v1";
let S = {
  module: 0,
  completed: [],
  niche: null,
  platforms: [],
  workbook: {},
  dailyTasks: {},
  showCert: false,
};

function save(){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(S)); }catch(e){}
}
function load(){
  try{
    const d = JSON.parse(localStorage.getItem(SAVE_KEY)||"null");
    if(d) S = {...S,...d};
  }catch(e){}
}

// ═══════════════════════════════════
// DATA
// ═══════════════════════════════════
const MODULES = [
  {num:1, icon:"💡", title:"What is Affiliate Marketing", color:"var(--accent)",   short:"Basics"},
  {num:2, icon:"🎯", title:"Pick Your Niche",             color:"var(--green)",    short:"Niche"},
  {num:3, icon:"🛒", title:"Find Your Products",          color:"var(--blue)",     short:"Products"},
  {num:4, icon:"📣", title:"Build Your Platform",         color:"var(--purple)",   short:"Platform"},
  {num:5, icon:"🤖", title:"AI Content Creation",         color:"var(--teal)",     short:"AI Tools"},
  {num:6, icon:"📊", title:"Track & Optimize",            color:"var(--orange)",   short:"Analytics"},
  {num:7, icon:"🗓️", title:"90-Day Action Plan",          color:"var(--accent)",   short:"Action Plan"},
];

const NICHES = [
  {id:"finance",  icon:"💰", label:"Personal Finance",    desc:"Budgeting, investing, credit repair",       comp:"High",   earn:"$50–500/sale",  color:"var(--accent)"},
  {id:"health",   icon:"💪", label:"Health & Fitness",    desc:"Weight loss, supplements, workouts",        comp:"High",   earn:"$20–100/sale",  color:"var(--green)"},
  {id:"business", icon:"💼", label:"Online Business",     desc:"Courses, software, side hustles",           comp:"Medium", earn:"$100–1000/sale", color:"var(--blue)"},
  {id:"tech",     icon:"💻", label:"Software & SaaS",     desc:"Tools, apps, productivity",                 comp:"Medium", earn:"$30–200/mo",     color:"var(--purple)"},
  {id:"beauty",   icon:"💅", label:"Beauty & Fashion",    desc:"Makeup, skincare, style",                   comp:"High",   earn:"$10–50/sale",   color:"var(--teal)"},
  {id:"parenting",icon:"👨‍👩‍👧", label:"Parenting & Family", desc:"Education, toys, family products",       comp:"Low",    earn:"$15–80/sale",   color:"var(--orange)"},
  {id:"food",     icon:"🍽️", label:"Food & Cooking",      desc:"Recipes, meal kits, kitchen gear",          comp:"Medium", earn:"$20–150/sale",  color:"var(--red)"},
  {id:"travel",   icon:"✈️", label:"Travel & Adventure",  desc:"Hotels, gear, travel hacks",                comp:"Medium", earn:"$30–300/sale",  color:"var(--accent)"},
  {id:"pets",     icon:"🐾", label:"Pets & Animals",      desc:"Food, accessories, training",               comp:"Low",    earn:"$15–60/sale",   color:"var(--green)"},
  {id:"selfdev",  icon:"🧠", label:"Self Development",    desc:"Courses, mindset, productivity",            comp:"Medium", earn:"$50–500/sale",  color:"var(--blue)"},
];

const PLATFORMS = [
  {id:"instagram",icon:"📸",name:"Instagram / Reels",   time:"1–2 hrs/day",  reach:"High",   cost:"Free",    best:"Visual products, fashion, food, fitness"},
  {id:"tiktok",   icon:"🎵",name:"TikTok",              time:"1–2 hrs/day",  reach:"Highest",cost:"Free",    best:"Entertainment, trending products, youth"},
  {id:"youtube",  icon:"▶️", name:"YouTube",            time:"3–5 hrs/video",reach:"High",   cost:"Free",    best:"Reviews, tutorials, software demos"},
  {id:"blog",     icon:"📝",name:"Blog / SEO",          time:"3–5 hrs/post", reach:"Medium", cost:"$10–30/mo",best:"Long-term passive traffic, high-ticket"},
  {id:"email",    icon:"📧",name:"Email List",          time:"1–2 hrs/week", reach:"High",   cost:"$15–30/mo",best:"Best ROI, own your audience forever"},
  {id:"pinterest",icon:"📌",name:"Pinterest",           time:"30 min/day",   reach:"Medium", cost:"Free",    best:"DIY, recipes, home decor, fashion"},
];

const AI_TOOLS = [
  {icon:"🤖",name:"ChatGPT / Claude",    use:"Write captions, scripts, emails, blog posts",     cost:"Free – $20/mo",  link:"chatgpt.com"},
  {icon:"🎬",name:"CapCut",              use:"Edit Reels & TikToks — auto-captions, templates",  cost:"Free",          link:"capcut.com"},
  {icon:"🎨",name:"Canva",              use:"Graphics, thumbnails, carousels, story templates",  cost:"Free – $15/mo", link:"canva.com"},
  {icon:"📅",name:"Buffer / Later",     use:"Schedule posts across all platforms automatically", cost:"Free – $18/mo", link:"buffer.com"},
  {icon:"🔍",name:"VidIQ / TubeBuddy", use:"YouTube SEO — find keywords that rank",             cost:"Free – $10/mo", link:"vidiq.com"},
  {icon:"✉️",name:"ConvertKit",         use:"Build email list, send automations, tag subscribers",cost:"Free – $25/mo",link:"convertkit.com"},
  {icon:"🔗",name:"Bitly / Pretty Links",use:"Track clicks on your affiliate links",            cost:"Free – $8/mo",  link:"bitly.com"},
  {icon:"📊",name:"Google Analytics",   use:"Track website traffic, see what converts",         cost:"Free",          link:"analytics.google.com"},
];

const NETWORKS = [
  {name:"JVZoo",        icon:"🏪",focus:"Digital products, software, online courses",  comm:"30–75%",   pay:"Instant–weekly",  best:"Business, marketing niches",    url:"jvzoo.com"},
  {name:"ClickBank",    icon:"💳",focus:"Health, wealth, relationships, digital",       comm:"30–75%",   pay:"Weekly",          best:"Health, self-help, finance",    url:"clickbank.com"},
  {name:"Amazon",       icon:"📦",focus:"Physical products — everything",              comm:"1–10%",    pay:"Monthly",         best:"Any niche, trusted brand",       url:"amazon.com/associates"},
  {name:"ShareASale",   icon:"🤝",focus:"Retail, fashion, home goods, B2B",           comm:"5–50%",    pay:"Monthly",         best:"Physical & software products",   url:"shareasale.com"},
  {name:"Impact",       icon:"🚀",focus:"Major brands — Airbnb, Uber, Target",        comm:"Varies",   pay:"Monthly",         best:"Travel, lifestyle, apps",       url:"impact.com"},
  {name:"CJ Affiliate", icon:"🌐",focus:"Major retailers, Fortune 500 brands",        comm:"Varies",   pay:"Monthly",         best:"Established brands, trust",     url:"cj.com"},
  {name:"Digistore24",  icon:"💫",focus:"Digital products, courses, supplements",     comm:"25–70%",   pay:"Weekly",          best:"Health, business niches",       url:"digistore24.com"},
];

// ═══════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════
const fmt  = n => "$" + Math.abs(Math.round(n)).toLocaleString();
const clamp= (v,lo,hi) => Math.min(hi,Math.max(lo,v));
const b    = (txt,fn,v="gold",sz="md",dis=false) =>
  `<button class="btn ${v} ${sz}" onclick="${fn}" ${dis?"disabled":""}>${txt}</button>`;
const bdg  = (txt,color,sz="sm") =>
  `<span class="badge" style="background:${color}28;color:${color};border:1px solid ${color}44;padding:${sz==="lg"?"4px 14px":"2px 10px"};font-size:${sz==="lg"?13:11}px">${txt}</span>`;
const st   = (lbl,val,color,sm=false) =>
  `<div class="stat"><div class="val" style="color:${color};font-size:${sm?14:20}px">${val}</div><div class="lbl">${lbl}</div></div>`;
const pb   = (p,color,h=8) =>
  `<div class="pbar" style="height:${h}px"><div class="pbar-fill" style="width:${clamp(p,0,100)}%;background:${color}"></div></div>`;
const card = (c,cls="",style="") => `<div class="card ${cls}" style="${style}">${c}</div>`;
const inp  = (lbl,id,type="text",val="",pre="",suf="",hint="") => {
  const pH=pre?`<span class="inp-pre">${pre}</span>`:"";
  const sH=suf?`<span class="inp-suf">${suf}</span>`:"";
  const hH=hint?`<div class="inp-hint">${hint}</div>`:"";
  return `<div class="inp-wrap"><label class="inp-label">${lbl}</label>${hH}<div class="inp-row">${pH}<input type="${type}" id="${id}" value="${val}">${sH}</div></div>`;
};
const truthRow = (guru,reality) =>
  `<div class="truth-row"><div style="flex:1"><span style="color:var(--red)">❌ Guru says:</span> <span style="color:var(--muted)">${guru}</span></div></div>
   <div class="truth-row" style="margin-top:-10px"><div style="flex:1"><span style="color:var(--green)">✅ Reality:</span> <span style="color:var(--text)">${reality}</span></div></div>`;
const modHdr = (m) =>
  `<div class="mod-hdr" style="background:linear-gradient(135deg,${m.color}18,transparent);border:1px solid ${m.color}44">
    <div style="display:flex;gap:12px;align-items:center">
      <div style="font-size:28px;background:${m.color}22;border-radius:10px;padding:10px 12px;flex-shrink:0">${m.icon}</div>
      <div>
        <div style="display:flex;gap:7px;margin-bottom:5px;flex-wrap:wrap">
          ${bdg("Module "+m.num,"var(--accent)")}
          ${bdg("of 7","var(--dim)")}
          ${S.completed.includes(m.num-1)?bdg("✓ Complete","var(--green)"):""}
        </div>
        <div style="font-size:17px;font-weight:900">${m.title}</div>
      </div>
    </div>
  </div>`;

function navBtns(mi){
  const prev = mi>0 ? b("← "+MODULES[mi-1].short,"goModule("+(mi-1)+")", "dark","sm") : "";
  const next = mi<6 ? b("Next: "+MODULES[mi+1].short+" →","completeModule("+mi+")","gold","lg full") :
                       b("🏆 Complete & Earn Certificate","completeModule("+mi+")","gold","lg full");
  return `<div style="display:flex;gap:10px;margin-top:4px">${prev}<div style="flex:1"></div></div>${next}`;
}

// ═══════════════════════════════════
// ROUTER & PROGRESS
// ═══════════════════════════════════
function render(){
  updateProgress();
  window.scrollTo({top:0,behavior:"smooth"});
  const el=document.getElementById("screen");
  el.className="fu";void el.offsetWidth;
  if(S.showCert){ el.innerHTML=renderCert(); return; }
  const renders=[renderM1,renderM2,renderM3,renderM4,renderM5,renderM6,renderM7];
  el.innerHTML = renders[S.module]();
}

function updateProgress(){
  const pct = Math.round((S.completed.length/7)*100);
  document.getElementById("prog-pct").textContent = pct+"%";
  document.getElementById("mod-lbl").textContent = "Module "+(S.module+1)+" of 7";
  document.getElementById("mod-name").textContent = MODULES[S.module].title;
  MODULES.forEach((_,i)=>{
    const seg=document.getElementById("mseg-"+i);
    if(seg) seg.style.background = S.completed.includes(i)?"var(--green)":i===S.module?"var(--accent)88":"var(--border)";
  });
  const cb=document.getElementById("cert-btn");
  if(cb) cb.style.display = S.completed.length===7?"inline-block":"none";
}

function goModule(i){ S.module=i; save(); render(); }
function completeModule(i){
  if(!S.completed.includes(i)) S.completed.push(i);
  if(i<6) S.module=i+1;
  else S.showCert=true;
  save(); render();
}
function toggleCert(){ S.showCert=!S.showCert; save(); render(); }

function copyPrompt(btn, text){
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent="✅ Copied!";
    setTimeout(()=>btn.textContent="📋 Copy Prompt",2000);
  });
}

function calcProjection(){
  const content=+(document.getElementById("proj-content")?.value||30);
  const comm=+(document.getElementById("proj-comm")?.value||75);
  const conv=+(document.getElementById("proj-conv")?.value||2)/100;
  const visitors=+(document.getElementById("proj-visitors")?.value||500);
  S.workbook.proj_content=content; S.workbook.proj_comm=comm;
  S.workbook.proj_conv=conv*100; S.workbook.proj_visitors=visitors; save();
  const sales=Math.round(visitors*conv);
  const monthly=sales*comm;
  const m3=Math.round(monthly*0.3); // ramp up
  const m6=monthly;
  const m12=Math.round(monthly*2.5); // audience has grown
  document.getElementById("proj-result").innerHTML=`
    <div class="calc-result">
      <div style="color:var(--muted);font-size:10px;text-transform:uppercase;margin-bottom:10px">${visitors} visitors × ${(conv*100)}% conversion × ${fmt(comm)}/sale</div>
      <div class="g3">
        ${st("Month 3 Est.",fmt(m3),"var(--orange)")}
        ${st("Month 6 Est.",fmt(m6),"var(--accent)")}
        ${st("Month 12 Est.",fmt(m12),"var(--green)")}
      </div>
      <div style="color:var(--dim);font-size:10px;margin-top:10px">*Estimates assume consistent content posting and list building. Month 12 assumes 2.5x audience growth.</div>
    </div>`;
}
