<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nugO Pro Business Lab — 12-Month Simulation</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--card:#0e1320;--border:#1a2640;
  --accent:#00c896;--as:#00c89618;
  --gold:#f5b731;--gs:#f5b73118;
  --red:#f04060;--rs:#f0406018;
  --blue:#3d9eff;--bs:#3d9eff18;
  --purple:#a875f0;--ps:#a875f018;
  --orange:#ff7c3a;--os:#ff7c3a18;
  --teal:#00d4d4;--ts:#00d4d418;
  --pink:#ff6eb4;--pks:#ff6eb418;
  --text:#ddeeff;--muted:#7a90b0;--dim:#374a66;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
input,select,textarea{font-family:'Syne',sans-serif;}
button{font-family:'Space Mono',monospace;cursor:pointer;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes diceShake{0%{transform:rotate(-10deg)scale(1.12)}50%{transform:rotate(10deg)scale(0.91)}100%{transform:rotate(-5deg)scale(1.05)}}
@keyframes cardReveal{0%{opacity:0;transform:scale(0.85)translateY(12px)}100%{opacity:1;transform:scale(1)translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp 0.32s ease forwards;}
.shake{animation:diceShake 0.07s infinite;}
.reveal{animation:cardReveal 0.4s ease forwards;}
#app{max-width:720px;margin:0 auto;padding:0 16px 80px;}
#hdr{background:linear-gradient(180deg,#0d1520,transparent);padding:20px 18px 0;margin-bottom:6px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
#hdr-inner{max-width:720px;margin:0 auto;}
.hdr-row{display:flex;align-items:center;gap:12px;}
.logo-box{background:var(--as);border:1px solid #00c89633;border-radius:11px;padding:7px 13px;font-size:19px;flex-shrink:0;}
.logo-title{color:var(--accent);font-weight:900;font-size:16px;letter-spacing:-0.5px;}
.logo-sub{color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:1.5px;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.save-flash{color:var(--accent);font-size:10px;font-weight:700;display:flex;align-items:center;gap:3px;}
.htp-btn{background:var(--ps);border:1px solid #a875f055;color:var(--purple);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;}
.biz-name-hdr .name{color:var(--gold);font-weight:800;font-size:12px;}
.biz-name-hdr .type{color:var(--muted);font-size:9px;}
.prog-wrap{margin-top:14px;margin-bottom:2px;}
.prog-bar{display:flex;gap:2px;}
.prog-seg{flex:1;height:4px;border-radius:99px;background:var(--border);transition:background .3s;}
.prog-labels{display:flex;justify-content:space-between;margin-top:4px;}
.prog-labels span{color:var(--muted);font-size:9px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:0 2px 20px #00000055;}
.glow-accent{border-color:#00c89655!important;box-shadow:0 0 28px #00c89622!important;}
.glow-gold{border-color:#f5b73155!important;box-shadow:0 0 28px #f5b73122!important;}
.glow-teal{border-color:#00d4d455!important;box-shadow:0 0 28px #00d4d422!important;}
.glow-purple{border-color:#a875f055!important;box-shadow:0 0 28px #a875f022!important;}
.glow-blue{border-color:#3d9eff55!important;box-shadow:0 0 28px #3d9eff22!important;}
.glow-pink{border-color:#ff6eb455!important;box-shadow:0 0 28px #ff6eb422!important;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.col{display:flex;flex-direction:column;gap:15px;}
.stat{text-align:center;}
.stat .val{font-family:'Space Mono',monospace;font-weight:800;line-height:1;}
.stat .lbl{color:var(--muted);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
.badge{display:inline-block;border-radius:99px;font-weight:700;white-space:nowrap;}
.pbar-wrap{background:#151f35;border-radius:99px;height:8px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:99px;transition:width 1s cubic-bezier(.4,2,.6,1);}
.inp-wrap{display:flex;flex-direction:column;gap:5px;}
.inp-label{color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.inp-hint{color:var(--dim);font-size:10px;margin-top:-3px;}
.inp-row{display:flex;align-items:center;background:#080c18;border:1px solid var(--border);border-radius:9px;overflow:hidden;}
.inp-pre{color:var(--muted);padding:9px 11px;background:#111825;font-size:12px;border-right:1px solid var(--border);}
.inp-suf{color:var(--muted);padding:9px 11px;font-size:11px;}
.inp-row input,.inp-row select{flex:1;background:transparent;border:none;outline:none;color:var(--text);padding:9px 13px;font-size:14px;font-family:'Space Mono',monospace;width:100%;}
.btn{border-radius:10px;font-weight:800;font-size:12px;letter-spacing:.3px;transition:opacity .15s,transform .1s;border:none;}
.btn:hover{opacity:.85;transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.btn.primary{background:var(--accent);color:#060a12;}
.btn.gold{background:var(--gold);color:#060a12;}
.btn.ghost{background:transparent;color:var(--accent);border:1px solid #00c89655;}
.btn.purple{background:var(--purple);color:#fff;}
.btn.blue{background:var(--blue);color:#060a12;}
.btn.teal{background:var(--teal);color:#060a12;}
.btn.red{background:var(--red);color:#fff;}
.btn.dark{background:#151f35;color:var(--muted);border:1px solid var(--border);}
.btn.pink{background:var(--pink);color:#060a12;}
.btn.sm{padding:6px 14px;font-size:11px;}
.btn.md{padding:9px 20px;}
.btn.lg{padding:13px 28px;font-size:14px;}
.btn.xl{padding:15px 38px;font-size:16px;}
.btn.full{width:100%;}
.toggle{width:42px;height:22px;border-radius:99px;cursor:pointer;position:relative;transition:background .2s;border:none;flex-shrink:0;}
.toggle .knob{position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.tab{background:#0a0e1a;color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Space Mono',monospace;transition:all .13s;}
.dice-face{width:72px;height:72px;border-radius:14px;font-size:42px;display:flex;align-items:center;justify-content:center;transition:border-color .3s,background .3s,box-shadow .3s;flex-shrink:0;}
.ev-card{border-radius:14px;padding:14px 17px;display:flex;align-items:center;gap:13px;}
.month-banner{background:linear-gradient(135deg,#0e1730,#131b2e);border:1px solid #3d9eff33;border-radius:13px;padding:13px 16px;display:flex;align-items:center;gap:12px;}
.round-hdr{border-radius:14px;padding:14px 17px;margin-bottom:15px;display:flex;gap:13px;align-items:center;}
.biz-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.biz-opt{border-radius:12px;padding:13px 14px;cursor:pointer;transition:all .13s;border:2px solid var(--border);background:var(--card);}
.biz-opt.sel{border-color:var(--accent);background:var(--as);}
.biz-opt .biz-icon{font-size:28px;margin-bottom:6px;}
.biz-opt .biz-lbl{font-weight:800;font-size:13px;}
.biz-opt .biz-ex{color:var(--muted);font-size:10px;margin-top:3px;}
.biz-opt .biz-stats{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap;}
.mkt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mkt-opt{border-radius:13px;padding:15px;cursor:pointer;transition:all .13s;border:2px solid var(--border);position:relative;}
.mkt-opt.sel{background:var(--as);border-color:var(--accent);}
.modal-overlay{position:fixed;inset:0;background:#000000bb;z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--card);border-radius:20px;padding:26px;max-width:480px;width:100%;animation:slideDown .25s ease;}
.modal-progress{display:flex;gap:5px;margin-bottom:20px;}
.modal-prog-seg{flex:1;height:3px;border-radius:99px;cursor:pointer;transition:background .3s;}
.resume-banner{background:linear-gradient(135deg,#0e1a10,#0a1520);border:1px solid #00c89655;border-radius:14px;padding:14px 17px;display:flex;align-items:center;gap:13px;margin-bottom:16px;box-shadow:0 0 24px #00c89622;}
.cert{background:linear-gradient(135deg,#1a1300,#0e1a0a);border:1px solid #f5b73155;border-radius:16px;padding:26px 18px;text-align:center;box-shadow:0 0 32px #f5b73122;}
.stmt-scroll{max-height:380px;overflow-y:auto;}
.stmt-row{display:flex;justify-content:space-between;padding:7px 0;border-top:1px solid #1a264022;}
.tb-table{width:100%;border-collapse:collapse;font-family:'Space Mono',monospace;font-size:12px;}
.tb-table th{color:var(--dim);font-size:9px;text-transform:uppercase;padding:5px 8px;text-align:left;}
.tb-table td{padding:7px 8px;border-top:1px solid var(--border);}
.score-bar-row{margin-bottom:12px;}
.tqm-opt{border-radius:11px;padding:13px 14px;border:1px solid var(--border);cursor:pointer;transition:all .13s;display:flex;gap:11px;align-items:flex-start;}
.tqm-opt.sel{border-color:var(--teal);background:var(--ts);}
.neg-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:10px;background:#080c18;border:1px solid var(--border);margin-bottom:8px;}
.neg-slider{width:100%;accent-color:var(--accent);}
.profit-bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.profit-bar-track{flex:1;background:#151f35;border-radius:3px;height:12px;position:relative;overflow:hidden;}
.profit-bar-mid{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--border);}
.profit-bar-fill{position:absolute;top:0;bottom:0;}
@media(max-width:500px){.g4{grid-template-columns:1fr 1fr;}.g3{grid-template-columns:1fr 1fr;}.biz-grid{grid-template-columns:1fr;}}
</style>
</head>

// MATH HELPERS (BUAD222-powered)
// ═══════════════════════════════════════════════
const fmt  = n=>"$"+Math.abs(Math.round(n)).toLocaleString();
const fmtS = n=>(n>=0?"+":"−")+fmt(n);
const pct  = (a,b)=>b===0?"0%":Math.round((a/b)*100)+"%";
const clamp= (v,lo,hi)=>Math.min(hi,Math.max(lo,v));

function calcContribMargin(biz,price,laborMod=1,matMod=1){
  const labor = biz.laborBase * laborMod;
  const mat   = biz.materialBase * matMod;
  const total = labor + mat;
  const cm    = price - total;
  const pctM  = price > 0 ? cm/price : 0;
  return {labor,mat,total,cm,pctM};
}

function calcMktCustomers(biz,budget,mktAlloc){
  // BUAD222: weight-based allocation + diminishing returns
  let totalWeight = 0, weightedBudget = 0;
  MKT_CHANNELS.forEach(ch=>{
    const w = biz.mktWeights[ch.id]||0;
    const alloc = mktAlloc ? (mktAlloc[ch.id]||0) : w/10;
    totalWeight += w;
    const spend = budget * alloc;
    const boost = Math.min(1, spend / ch.dimRet);
    weightedBudget += boost * w;
  });
  const baseCustomers = Math.round(8 + (budget/500)*totalWeight*1.8);
  return Math.max(5, baseCustomers);
}

function calcTQMSavings(tqmList){
  let laborMod=1, matMod=1, demandBoost=0, adminSave=0;
  tqmList.forEach(id=>{
    const t = TQM_OPTIONS.find(x=>x.id===id);
    if(!t) return;
    if(t.effect==="labor")    laborMod    *= (1-t.pct);
    if(t.effect==="material") matMod      *= (1-t.pct);
    if(t.effect==="demand")   demandBoost += t.pct;
    if(t.effect==="admin")    adminSave   += t.pct;
  });
  return {laborMod,matMod,demandBoost,adminSave};
}

function pickEvent(d1,d2,mi){
  const sum=d1+d2+2;
  const idx=((sum-2)*2+mi)%EVENTS.length;
  return EVENTS[idx];
}

function calcScores(ops){
  if(!ops.length) return {profit:0,cash:0,debt:0,growth:0,decisions:0,total:0};
  const avg=ops.reduce((a,r)=>a+(r.profit||0),0)/ops.length;
  const profit=clamp(Math.round(50+avg/15),0,100);
  const lastCash=ops[ops.length-1].cashEnd||0;
  const cash=clamp(Math.round(Math.min(100,lastCash/25)),0,100);
  const lastDebt=ops[ops.length-1].debt||0;
  const debt=clamp(Math.round(100-lastDebt/40),0,100);
  const cg=ops.length>1?(ops[ops.length-1].customers||0)-(ops[0].customers||0):0;
  const growth=clamp(Math.round(50+cg*1.5),0,100);
  const decisions=clamp(Math.round(ops.reduce((a,r)=>a+(r.mktBudget>0?15:3)+(r.profit>0?20:0),0)/ops.length),0,100);
  const total=Math.round((profit+cash+debt+growth+decisions)/5);
  return {profit,cash,debt,growth,decisions,total};
}

  const bt=BIZ_TYPES.find(b=>b.id===_bizType);
  const cash=+(document.getElementById("biz-cash")?.value||1500);
  const loanAmt=_loanOn?+(document.getElementById("loan-amt")?.value||0):0;
  S.biz={bizType:_bizType,bizLabel:bt.label,bizIcon:bt.icon,name,startCash:cash,loan:_loanOn,loanAmt,
    solo:_soloOn,totalCash:cash+loanAmt,
    price:bt.price,defaultPrice:bt.price,priceMin:bt.priceMin,priceMax:bt.priceMax,
    supplies:bt.supplies,defaultSupplies:bt.supplies,
    laborBase:bt.laborBase,matBase:bt.materialBase,
    mktWeights:bt.mktWeights,growthRate:bt.growthRate,
    mktBudget:_mktBudget,baseCustomers:16,
    tqmList:[],laborMod:1,matMod:1,demandBoost:0,
    cashChoice:"reinvest",laborNeg:{wage:bt.laborBase,benefits:200,profit:0.02,raise:0.03}
  };
  advance();
}

        ${inp("Monthly Customer Goal","cust-goal","number",S.biz.custGoal||20,"","customers")}
      </div>
      ${card(`
        <div style="color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:13px">📊 BUAD222 Contribution Margin Analysis</div>

          ${st("CM/Unit",fmt(cm.cm),cm.cm>0?"var(--accent)":"var(--red)")}
        </div>
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
          <span style="color:var(--muted);font-size:12px">Margin %</span>
          <span style="color:${cm.pctM>0.3?"var(--accent)":cm.pctM>0.15?"var(--gold)":"var(--red)"};font-weight:800;font-family:'Space Mono',monospace">${pct(cm.cm,price)}</span>
        </div>
        ${pb(cm.pctM*100,cm.pctM>0.3?"var(--accent)":cm.pctM>0.15?"var(--gold)":"var(--red)")}
        ${premium>0.1?`<div style="margin-top:8px;padding:7px 12px;background:var(--gs);border-radius:7px;font-size:11px;color:var(--gold)">💡 Premium pricing — higher margin, fewer customers</div>`:""}
        ${premium<-0.1?`<div style="margin-top:8px;padding:7px 12px;background:var(--bs);border-radius:7px;font-size:11px;color:var(--blue)">💡 Budget pricing — more customers, thinner margin</div>`:""}

      ${b("Round 3: Plan Marketing →","submitPricing()","gold","lg full")}
      ${restartLink()}

function submitPricing(){
  S.biz.price=+(document.getElementById("price")?.value||S.biz.defaultPrice);
  S.biz.custGoal=+(document.getElementById("cust-goal")?.value||20);
  advance();
}

// ═══════════════════════════════════════════════
// ROUND 3 — MARKETING (BUAD222 weight model)
// ═══════════════════════════════════════════════
function renderMarketing(){
  const bz=BIZ_TYPES.find(b=>b.id===S.biz.bizType);
  const budgets=[0,100,250,500,750];

  const channelTable=`
    <div style="color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:10px">📡 Channel Effectiveness for ${bz.label}</div>
    ${MKT_CHANNELS.map(ch=>{
      const w=bz.mktWeights[ch.id]||0;
      const stars="★".repeat(w)+"☆".repeat(3-Math.min(3,w));
      const col=w>=3?"var(--accent)":w>=2?"var(--gold)":w>=1?"var(--blue)":"var(--muted)";
      return `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--border)">
        <span style="flex:1;font-size:12px">${ch.label}</span>
        <span style="color:${col};font-size:13px;letter-spacing:2px">${stars}</span>
        ${bdg(w+"x Weight",col)}
      </div>`;
    }).join("")}`;

  const mktOpts=budgets.map(bg=>{
    const customers=calcMktCustomers(bz,bg,null);
    const sel=_mktBudget===bg;
    return `<div class="mkt-opt ${sel?"sel":""}" onclick="selMkt(${bg})" id="mkt-${bg}">
      ${sel?`<span style="position:absolute;top:9px;right:12px;color:var(--accent)">✓</span>`:""}
      <div style="font-size:17px;font-weight:900;font-family:'Space Mono',monospace;color:${sel?"var(--accent)":"var(--text)"}">${bg===0?"Free":fmt(bg)}</div>
      <div style="color:var(--gold);font-size:19px;font-weight:900;margin:5px 0">${customers}</div>
      <div style="color:var(--muted);font-size:10px">customers/month</div>
    </div>`;
  }).join("");

  return `
    ${roundHdr("📣","var(--blue)","3","Marketing Strategy","Allocate your budget — weighted by BUAD222 channel effectiveness")}
    <div class="col">
      ${card(channelTable,"","background:#080c18")}
      <div class="mkt-grid">${mktOpts}</div>
      ${card(`<div class="g3">
        ${st("Monthly Spend",fmt(_mktBudget),"var(--gold)")}
        ${st("Customers/Mo",calcMktCustomers(bz,_mktBudget,null),"var(--accent)")}
        ${st("12-Month Ad Cost",fmt(_mktBudget*12),"var(--red)")}
      </div>`,"glow-gold","background:var(--gs)")}
      ${b("Round 4: TQM Investment →","submitMarketing()","gold","lg full")}
      ${restartLink()}
    </div>`;
}

function selMkt(b){_mktBudget=b;document.querySelectorAll(".mkt-opt").forEach(el=>{el.classList.remove("sel");el.style.borderColor="var(--border)";el.style.background="var(--card)";});const el=document.getElementById("mkt-"+b);if(el){el.classList.add("sel");el.style.borderColor="var(--accent)";el.style.background="var(--as)";}}
function submitMarketing(){S.biz.mktBudget=_mktBudget;S.biz.baseCustomers=calcMktCustomers(BIZ_TYPES.find(b=>b.id===S.biz.bizType),_mktBudget,null);advance();}

function renderTQM(){
  const savings=calcTQMSavings(_tqmSelected);

function toggleTQM(id){if(_tqmSelected.includes(id)){_tqmSelected=_tqmSelected.filter(x=>x!==id);}else{_tqmSelected.push(id);}render();}
function submitTQM(){const s=calcTQMSavings(_tqmSelected);S.biz.tqmList=_tqmSelected;S.biz.laborMod=s.laborMod;S.biz.matMod=s.matMod;S.biz.demandBoost=s.demandBoost;S.strategy.tqmCost=_tqmSelected.length*500;advance();}

// ═══════════════════════════════════════════════
// ROUND 5 — LABOR NEGOTIATION (BUAD222 model)
// ═══════════════════════════════════════════════
function renderLabor(){
  const bz=BIZ_TYPES.find(b=>b.id===S.biz.bizType);
  const base=bz.laborBase;
  const demands={wage:base*1.30, benefits:250, profit:0.024, raise:0.059};
  const best={wage:base*1.10*0.9, benefits:220, profit:0.020, raise:0.050};
  const ceiling={wage:base*1.32, benefits:262, profit:0.026, raise:0.062};

  if(!_laborNeg.wage) _laborNeg={wage:base*1.10,benefits:235,profit:0.022,raise:0.055};

  const annualCost=!S.biz.solo?Math.round((_laborNeg.wage*2000)+_laborNeg.benefits+(_laborNeg.profit*30000)):0;

  return `
    ${roundHdr("🤝","var(--purple)","5","Labor Negotiation","Negotiate wages & benefits — affects monthly payroll for all 12 months")}
    <div class="col">
      ${card(`
        <div style="color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:10px">📋 Negotiation Positions (BUAD222 Model)</div>
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;font-size:11px;font-family:'Space Mono',monospace">
            <tr style="color:var(--dim);font-size:9px;text-transform:uppercase">
              <td style="padding:5px 8px">Component</td>
              <td style="padding:5px 8px;color:var(--red)">Union Demands</td>
              <td style="padding:5px 8px;color:var(--accent)">Best Contract</td>
              <td style="padding:5px 8px;color:var(--gold)">Your Ceiling</td>
            </tr>
            ${[
              ["Hourly Wage",fmt(demands.wage),fmt(best.wage),fmt(ceiling.wage)],
              ["Monthly Benefits",fmt(demands.benefits),fmt(best.benefits),fmt(ceiling.benefits)],
              ["Profit Sharing",(demands.profit*100).toFixed(1)+"%",(best.profit*100).toFixed(1)+"%",(ceiling.profit*100).toFixed(1)+"%"],
              ["Annual Raise",(demands.raise*100).toFixed(1)+"%",(best.raise*100).toFixed(1)+"%",(ceiling.raise*100).toFixed(1)+"%"],
            ].map(r=>`<tr style="border-top:1px solid var(--border)">
              <td style="padding:7px 8px;color:var(--text)">${r[0]}</td>
              <td style="padding:7px 8px;color:var(--red)">${r[1]}</td>
              <td style="padding:7px 8px;color:var(--accent)">${r[2]}</td>
              <td style="padding:7px 8px;color:var(--gold)">${r[3]}</td>
            </tr>`).join("")}
          </table>
        </div>
      `,"","background:#080c18")}
      ${S.biz.solo?card(`<p style="color:var(--muted);font-size:13px;text-align:center;margin:0">You're running solo — no labor negotiation needed.<br><span style="color:var(--accent)">This round is skipped for solo owners.</span></p>`):`
        <div class="col">
          ${[
            {id:"wage",lbl:"Agreed Hourly Wage",min:best.wage,max:ceiling.wage,step:0.25,pre:"$",val:_laborNeg.wage},
            {id:"benefits",lbl:"Monthly Benefits",min:best.benefits,max:ceiling.benefits,step:5,pre:"$",val:_laborNeg.benefits},
          ].map(f=>`
            <div>
              <div style="display:flex;justify-content:space-between;margin-bottom:6px">
                <label style="color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase">${f.lbl}</label>
                <span style="color:var(--accent);font-weight:800;font-family:'Space Mono',monospace;font-size:12px" id="${f.id}-disp">${f.pre}${f.val.toFixed(2)}</span>
              </div>
              <input type="range" class="neg-slider" id="${f.id}-range" min="${f.min.toFixed(2)}" max="${f.max.toFixed(2)}" step="${f.step}" value="${f.val}" oninput="updateLabor('${f.id}',this.value,'${f.pre}')">
              <div style="display:flex;justify-content:space-between;margin-top:3px">
                <span style="color:var(--accent);font-size:9px">Best: ${f.pre}${f.min.toFixed(2)}</span>
                <span style="color:var(--red);font-size:9px">Ceiling: ${f.pre}${f.max.toFixed(2)}</span>
              </div>
            </div>`).join("")}
        </div>`}
      ${card(`<div class="g3">
        ${st("Annual Labor Cost",S.biz.solo?"Solo":""+fmt(annualCost),"var(--red)")}
        ${st("Monthly Cost",S.biz.solo?"$0":fmt(annualCost/12),"var(--orange)")}
        ${st("Status",S.biz.solo?"No Staff":"Negotiated","var(--accent)")}
      </div>`,"","background:#080c18")}
      ${b("Round 6: Cash Strategy →","submitLabor()","gold","lg full")}
      ${restartLink()}
    </div>`;
}

function updateLabor(field,val,pre){
  _laborNeg[field]=+val;
  const disp=document.getElementById(field+"-disp");
  if(disp) disp.textContent=pre+parseFloat(val).toFixed(2);
}
function submitLabor(){S.biz.laborNeg={..._laborNeg};S.strategy.laborNeg={..._laborNeg};advance();}

function submitCash(){S.biz.cashChoice=_cashChoice;S.strategy.cashChoice=_cashChoice;advance();}

function rollDice(mi){
  if(_diceRolled) return;
  let count=0;
  const d1=document.getElementById("d1"),d2=document.getElementById("d2"),ctrl=document.getElementById("dice-ctrl");
  ctrl.innerHTML=`<div style="color:var(--purple);font-weight:800;font-size:13px;animation:pulse 0.45s infinite">Rolling…</div>`;
  d1.classList.add("shake");d2.classList.add("shake");
  d1.style.border="2px solid var(--purple)";d1.style.background="var(--ps)";
  d2.style.border="2px solid var(--purple)";d2.style.background="var(--ps)";
  _diceInterval=setInterval(()=>{
    const r1=Math.floor(Math.random()*6),r2=Math.floor(Math.random()*6);
    d1.textContent=DICE_FACES[r1];d2.textContent=DICE_FACES[r2];
    count++;
    if(count>=20){
      clearInterval(_diceInterval);
      const f1=Math.floor(Math.random()*6),f2=Math.floor(Math.random()*6);
      d1.textContent=DICE_FACES[f1];d2.textContent=DICE_FACES[f2];
      d1.classList.remove("shake");d2.classList.remove("shake");
      d1.style.border="2px solid var(--gold)";d1.style.background="var(--gs)";d1.style.boxShadow="0 0 20px #f5b73166";
      d2.style.border="2px solid var(--gold)";d2.style.background="var(--gs)";d2.style.boxShadow="0 0 20px #f5b73166";
      const sum=f1+f2+2;
      const sumEl=document.getElementById("dice-sum");sumEl.style.display="flex";
      document.getElementById("sum-val").textContent=sum;
      ctrl.innerHTML=`<div style="display:flex;gap:8px">${bdg("Die 1: "+(f1+1),"var(--gold)")} ${bdg("Die 2: "+(f2+1),"var(--gold)")}</div>`;
      _diceRolled=true;
      const ev=pickEvent(f1,f2,mi);
      _chosenEvent=ev;
      showEventReveal(ev,mi);
    }
  },65);
}

function submitMonth(mi){
  if(!_chosenEvent){alert("Roll the dice first!");return;}
  const supplies=+(document.getElementById("supplies")?.value||S.biz.supplies);
  const rent=+(document.getElementById("rent")?.value||0);
  const misc=+(document.getElementById("misc")?.value||80);
  const empCost=S.biz.solo?0:400;
  const loanPmt=S.biz.loan?Math.round(S.biz.loanAmt*0.10):0;
  const baseExp=supplies+rent+misc+empCost+S.biz.mktBudget+loanPmt;
  const ev=_chosenEvent;
  let customers=Math.round(S.biz.baseCustomers*(1+S.biz.demandBoost)),cashAdj=0,expMult=1;
  if(ev.ef==="customers") customers=Math.max(0,customers+ev.v);
  if(ev.ef==="cash")      cashAdj=ev.v;
  if(ev.ef==="expenses")  expMult=1+ev.v;
  const adjExp=Math.round(baseExp*expMult);
  const revenue=Math.round(customers*S.biz.price);
  const profit=revenue-adjExp;
  const prevCash=S.ops.length>0?S.ops[S.ops.length-1].cashEnd:S.biz.totalCash;
  const cashEnd=prevCash+revenue-adjExp+cashAdj;

  advance();
}

// ROUND 16 — JOURNAL ENTRY MODULE
// ═══════════════════════════════════════════════
function buildTransactions(){
  const ops=S.ops; if(!ops.length) return [];
  const txns=[];
  // Opening entry
  txns.push({id:"open1",date:"Setup",desc:"Owner invests starting capital",dr:"Cash",cr:"Owner's Equity",amt:S.biz.startCash,category:"setup"});
  if(S.biz.loan) txns.push({id:"open2",date:"Setup",desc:"Startup loan received",dr:"Cash",cr:"Loan Payable",amt:S.biz.loanAmt,category:"setup"});
  // Monthly transactions
  ops.forEach(m=>{
    txns.push({id:m.monthName+"-rev",  date:m.monthName, desc:"Sales revenue earned",         dr:"Cash",             cr:"Sales Revenue",   amt:m.revenue,   category:"revenue"});
    if(m.supplies>0) txns.push({id:m.monthName+"-sup", date:m.monthName, desc:"Supplies purchased",         dr:"Supplies Expense", cr:"Cash",            amt:m.supplies, category:"expense"});
    if(m.rent>0)     txns.push({id:m.monthName+"-rent",date:m.monthName, desc:"Rent paid",                  dr:"Rent Expense",     cr:"Cash",            amt:m.rent,     category:"expense"});
    if(m.misc>0)     txns.push({id:m.monthName+"-misc",date:m.monthName, desc:"Misc business expenses",     dr:"Misc Expense",     cr:"Cash",            amt:m.misc,     category:"expense"});
    if(m.empCost>0)  txns.push({id:m.monthName+"-wage",date:m.monthName, desc:"Employee wages paid",        dr:"Wages Expense",    cr:"Cash",            amt:m.empCost,  category:"expense"});
    if(m.mktBudget>0)txns.push({id:m.monthName+"-mkt", date:m.monthName, desc:"Marketing spend",           dr:"Marketing Expense",cr:"Cash",            amt:m.mktBudget,category:"expense"});
    if(m.loanPmt>0)  txns.push({id:m.monthName+"-loan",date:m.monthName, desc:"Loan interest payment",     dr:"Loan Interest",    cr:"Cash",            amt:m.loanPmt,  category:"expense"});
    if(m.cashAdj!==0) txns.push({id:m.monthName+"-evt",date:m.monthName, desc:"Event: "+m.event.t, dr:m.cashAdj>0?"Cash":"Event Expense", cr:m.cashAdj>0?"Event Income":"Cash", amt:Math.abs(m.cashAdj), category:"event"});
  });
  return txns;
}

          <div class="inp-row"><input type="text" id="dr-${t.id}" placeholder="e.g. ${t.dr}" value="${e?.dr||""}" oninput="checkJE('${t.id}','${t.dr}','${t.cr}',${t.amt})"></div>
        </div>

          <label style="color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px">Credit Account</label>

    <div class="col">

        <p style="color:var(--text);font-size:13px;line-height:1.7;margin:0">Every business transaction affects two accounts. The <strong style="color:var(--accent)">Debit</strong> account (left) increases assets or expenses. The <strong style="color:var(--gold)">Credit</strong> account (right) increases liabilities, equity, or revenue. <strong>Debits must always equal Credits.</strong></p>

        </div>
        <div style="margin-top:12px">${pb(pctDone,"var(--gold)")}</div>
        <div style="color:var(--muted);font-size:10px;margin-top:5px;text-align:center">${pctDone}% complete</div>
      </div>

      ${b("Post Entries → Build Trial Balance","submitJournalEntries()","gold","lg full",correct<Math.ceil(all*0.5),"id='je-submit-btn'")}
      ${correct<Math.ceil(all*0.5)?`<div style="text-align:center;color:var(--muted);font-size:11px">Complete at least 50% correctly to advance</div>`:""}
      ${restartLink()}
    </div>`;
}

function checkJE(id,correctDr,correctCr,amt){
  const drEl=document.getElementById("dr-"+id);
  const crEl=document.getElementById("cr-"+id);
  if(!drEl||!crEl) return;
  const dr=drEl.value.trim().toLowerCase();
  const cr=crEl.value.trim().toLowerCase();
  if(dr&&cr){
    const correct=dr===correctDr.toLowerCase()&&cr===correctCr.toLowerCase();
    if(!S.journalEntries) S.journalEntries={};
    S.journalEntries[id]={dr:drEl.value,cr:crEl.value,correct};
  }
}

function submitJournalEntries(){
  // Count correct before saving
  const txns=buildTransactions();
  let correct=0;
  txns.forEach(t=>{const e=S.journalEntries?.[t.id];if(e?.correct) correct++;});
  S.strategy.jeScore=Math.round((correct/txns.length)*100);
  saveGame(); advance();
}

// ROUND 17 — TRIAL BALANCE BUILDER
// ═══════════════════════════════════════════════
function buildAccountBalances(){
  const ops=S.ops; if(!ops.length) return {};
  const accts={
    "Cash":             {type:"asset",    balance:0},
    "Inventory":        {type:"asset",    balance:S.biz.defaultSupplies||S.biz.supplies},
    "Loan Payable":     {type:"liability",balance:ops[ops.length-1]?.debt||0},
    "Owner's Equity":   {type:"equity",   balance:S.biz.startCash},
    "Sales Revenue":    {type:"revenue",  balance:0},
    "Supplies Expense": {type:"expense",  balance:0},
    "Rent Expense":     {type:"expense",  balance:0},
    "Wages Expense":    {type:"expense",  balance:0},
    "Marketing Expense":{type:"expense",  balance:0},
    "Misc Expense":     {type:"expense",  balance:0},
    "Loan Interest":    {type:"expense",  balance:0},
    "Event Income":     {type:"revenue",  balance:0},
    "Event Expense":    {type:"expense",  balance:0},
  };
  // Starting cash
  accts["Cash"].balance=S.biz.totalCash;
  ops.forEach(m=>{
    accts["Cash"].balance         += m.revenue - m.adjExp + m.cashAdj;
    accts["Sales Revenue"].balance+= m.revenue;
    accts["Supplies Expense"].balance+=m.supplies;
    accts["Rent Expense"].balance +=m.rent;
    accts["Wages Expense"].balance+=m.empCost;
    accts["Marketing Expense"].balance+=m.mktBudget;
    accts["Misc Expense"].balance +=m.misc;
    accts["Loan Interest"].balance+=m.loanPmt;
    if(m.cashAdj>0) accts["Event Income"].balance+=m.cashAdj;
    if(m.cashAdj<0) accts["Event Expense"].balance+=Math.abs(m.cashAdj);
  });
  return accts;
}

function renderTrialBalance(){

  const typeOrder=["asset","liability","equity","revenue","expense"];

  let drTotal=0,crTotal=0;

      `,"","background:#080c18")}
      ${card(`
        <div style="color:var(--teal);font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px">📋 ${S.biz.bizIcon} ${S.biz.name} — Trial Balance</div>
        <div style="color:var(--muted);font-size:10px;margin-bottom:13px">Posted from Journal Entries · 9-Month Period</div>
        <div style="overflow-x:auto">
          <table class="tb-table" style="width:100%">
            <thead><tr><th>Account</th><th style="color:var(--accent)">Debit</th><th style="color:var(--gold)">Credit</th></tr></thead>

              <tr style="border-top:2px solid var(--border)">
                <td style="padding:10px 8px;font-weight:800;font-size:13px">TOTALS</td>

          <span style="font-size:20px">${balanced?"✅":"⚠️"}</span>

          </div>
        </div>
      `,"glow-gold")}
      ${card(`

function tbCheck(i){if(!S.tbChecked) S.tbChecked={};S.tbChecked[i]=!S.tbChecked[i];saveGame();render();}
function submitTrialBalance(){S.strategy.tbBalanced=true;saveGame();advance();}

// ═══════════════════════════════════════════════
// ROUND 18 — FINANCIAL STATEMENT BUILDER
// ═══════════════════════════════════════════════
function renderStatementBuilder(){
  const accts=buildAccountBalances();
  if(!S.stmtAssignments) S.stmtAssignments={};
  const assignments=S.stmtAssignments;

  // correct answer map: account → statement
  const correctMap={
    "Sales Revenue":"income","Event Income":"income",
    "Supplies Expense":"income","Rent Expense":"income","Wages Expense":"income",
    "Marketing Expense":"income","Misc Expense":"income","Loan Interest":"income","Event Expense":"income",
    "Cash":"balance","Inventory":"balance","Loan Payable":"balance","Owner's Equity":"balance",
  };

  const stmts=["income","balance","cashflow"];
  const stmtInfo={
    income: {label:"📈 Income Statement",    color:"var(--accent)",  desc:"Revenue & Expenses → Net Profit"},
    balance:{label:"⚖️ Balance Sheet",       color:"var(--blue)",    desc:"Assets, Liabilities & Owner's Equity"},
    cashflow:{label:"💵 Cash Flow Statement",color:"var(--purple)",  desc:"Cash In, Cash Out, Net Change"},
  };

  const accountList=Object.entries(accts).filter(([n,a])=>a.balance>0&&correctMap[n]).map(([name,a])=>{
    const assigned=assignments[name]; const correct=assigned&&assigned===correctMap[name];
    const wrong=assigned&&assigned!==correctMap[name];
    return `<div style="border:1px solid ${correct?"var(--accent)44":wrong?"var(--red)44":"var(--border)"};border-radius:10px;padding:11px 13px;background:${correct?"var(--as)":wrong?"var(--rs)":"var(--card)"}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div style="flex:1"><div style="font-weight:700;font-size:13px">${name}</div><div style="color:var(--gold);font-size:12px;font-family:'Space Mono',monospace">${fmt(a.balance)}</div></div>
        ${correct?`<span style="color:var(--accent);font-weight:800;font-size:11px">✓</span>`:wrong?`<span style="color:var(--red);font-weight:800;font-size:11px">✗</span>`:""}
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${stmts.map(s=>`<button onclick="assignAccount('${name}','${s}')" class="btn sm ${assigned===s?(correct?"primary":wrong?"red":"dark"):"dark"}" style="${assigned===s&&correct?"background:var(--accent);color:#060a12":assigned===s&&wrong?"background:var(--red);color:#fff":""}">${stmtInfo[s].label.split(" ").slice(0,2).join(" ")}</button>`).join("")}
        ${assigned?`<button onclick="assignAccount('${name}','')" class="btn sm dark">Clear</button>`:""}
      </div>
      ${wrong?`<div style="margin-top:7px;font-size:11px;color:var(--red)">💡 Hint: ${name} belongs in the ${stmtInfo[correctMap[name]].label}</div>`:""}
    </div>`;
  }).join("");

  const correctCount=Object.entries(assignments).filter(([n,s])=>s&&correctMap[n]===s).length;
  const total=Object.keys(correctMap).length;
  const score=Math.round((correctCount/total)*100);

  return `
    ${roundHdr("📊","var(--gold)","18","Financial Statement Builder","Assign each account to the correct financial statement")}
    <div class="col">
      ${card(`
        <div style="color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:11px">📚 The Three Core Statements</div>
        ${stmts.map(s=>`<div style="display:flex;gap:11px;padding:9px 0;border-top:1px solid var(--border)">
          <div style="width:28px;height:28px;border-radius:8px;background:${stmtInfo[s].color}22;border:1px solid ${stmtInfo[s].color}44;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">${stmtInfo[s].label.split(" ")[0]}</div>
          <div><div style="font-weight:700;font-size:13px;color:${stmtInfo[s].color}">${stmtInfo[s].label}</div><div style="color:var(--muted);font-size:11px">${stmtInfo[s].desc}</div></div>
        </div>`).join("")}
      `,"","background:#080c18")}
      <div class="card glow-gold" style="background:var(--gs)">
        <div class="g3">
          ${st("Total Accounts",total,"var(--text)")}
          ${st("Correctly Placed",correctCount,"var(--accent)")}
          ${st("Score",score+"%",score>=70?"var(--accent)":score>=40?"var(--gold)":"var(--red)")}
        </div>
        <div style="margin-top:11px">${pb(score,score>=70?"var(--accent)":score>=40?"var(--gold)":"var(--red)")}</div>
      </div>
      <div style="color:var(--text);font-size:13px;font-weight:700">Assign Each Account:</div>
      <div class="col">${accountList}</div>
      ${b("Complete Accounting Lab → Full Audit","submitStatements()","gold","lg full",correctCount<Math.ceil(total*0.5),"id='stmt-submit-btn'")}
      ${correctCount<Math.ceil(total*0.5)?`<div style="text-align:center;color:var(--muted);font-size:11px">Place at least 50% correctly to advance</div>`:""}
      ${restartLink()}
    </div>`;
}

function assignAccount(name,stmt){
  if(!S.stmtAssignments) S.stmtAssignments={};
  if(stmt==="") delete S.stmtAssignments[name];
  else S.stmtAssignments[name]=stmt;
  saveGame(); render();
}
function submitStatements(){
  const accts=buildAccountBalances();
  const correctMap={"Sales Revenue":"income","Event Income":"income","Supplies Expense":"income","Rent Expense":"income","Wages Expense":"income","Marketing Expense":"income","Misc Expense":"income","Loan Interest":"income","Event Expense":"income","Cash":"balance","Inventory":"balance","Loan Payable":"balance","Owner's Equity":"balance"};
  const assignments=S.stmtAssignments||{};
  const correct=Object.entries(assignments).filter(([n,s])=>s&&correctMap[n]===s).length;
  S.strategy.stmtScore=Math.round((correct/Object.keys(correctMap).length)*100);
  saveGame(); advance();
}

// ═══════════════════════════════════════════════
// ROUND 19 — FULL AUDIT
// ═══════════════════════════════════════════════
function renderAudit(){
  const ops=S.ops;
  const totalRevenue=ops.reduce((a,r)=>a+(r.revenue||0),0);
  const totalExpenses=ops.reduce((a,r)=>a+(r.adjExp||0),0);
  const totalProfit=totalRevenue-totalExpenses;
  const cashEnd=ops[ops.length-1]?.cashEnd||0;
  const cashStart=S.biz.totalCash;
  const debt=ops[ops.length-1]?.debt||0;
  const inventory=S.biz.defaultSupplies||S.biz.supplies;
  const totalCashAdj=ops.reduce((a,r)=>a+(r.cashAdj||0),0);
  const equity=cashEnd+inventory-debt;
  const totalLoanPmts=ops.reduce((a,r)=>a+(r.loanPmt||0),0);
  const totalEmpCost=ops.reduce((a,r)=>a+(r.empCost||0),0);
  const totalMkt=ops.reduce((a,r)=>a+(r.mktBudget||0),0);
  const totalRent=ops.reduce((a,r)=>a+(r.rent||0),0);
  const totalSupplies=ops.reduce((a,r)=>a+(r.supplies||0),0);
  const totalMisc=ops.reduce((a,r)=>a+(r.misc||0),0);
  const tqmCost=(S.strategy.tqmCost||0)*9;

  const flagCount=Object.values(S.auditChecks).filter(v=>v==="flag").length;
  const passCount=Object.values(S.auditChecks).filter(v=>v==="pass").length;
  const allChecked=AUDIT_CHECKS.every(c=>S.auditChecks[c.id]);
  let opinion,opinionColor,opinionIcon;
  if(!allChecked){opinion="Incomplete";opinionColor="var(--muted)";opinionIcon="⏳";}
  else if(flagCount===0&&cashEnd>0){opinion="Unqualified (Clean)";opinionColor="var(--accent)";opinionIcon="✅";}
  else if(flagCount<=2){opinion="Qualified Opinion";opinionColor="var(--gold)";opinionIcon="⚠️";}
  else{opinion="Adverse / Disclaimer";opinionColor="var(--red)";opinionIcon="🚨";}

  const scores=calcScores(ops);
  const cm=calcContribMargin(S.biz,S.biz.price,S.biz.laborMod,S.biz.matMod);

  const tabs=[
    {id:"trial",lbl:"📋 Trial Balance"},{id:"income",lbl:"📈 Income Statement"},
    {id:"balance",lbl:"⚖️ Balance Sheet"},{id:"cashflow",lbl:"💵 Cash Flow"},
    {id:"checklist",lbl:"🔍 Checklist"},{id:"opinion",lbl:"🏛️ Opinion"},
  ];

  let tabContent="";
  if(_auditTab==="trial"){
    const drTotal=cashEnd+inventory+totalExpenses+tqmCost;
    const crTotal=debt+equity+totalRevenue;
    const balanced=Math.abs(drTotal-crTotal)<10;
    const rows=[
      {l:"Cash",dr:cashEnd,cr:0},{l:"Inventory/Supplies",dr:inventory,cr:0},{l:"TQM Investments",dr:tqmCost,cr:0},
      {l:"Loan Payable",dr:0,cr:debt},{l:"Owner's Equity",dr:0,cr:equity},
      {l:"Sales Revenue",dr:0,cr:totalRevenue},{l:"Rent Expense",dr:totalRent,cr:0},
      {l:"Supplies Expense",dr:totalSupplies,cr:0},{l:"Marketing Expense",dr:totalMkt,cr:0},
      {l:"Wages Expense",dr:totalEmpCost,cr:0},{l:"Misc Expense",dr:totalMisc,cr:0},
      {l:"Loan Interest",dr:totalLoanPmts,cr:0},
    ];
    tabContent=`<div class="stmt-scroll"><table class="tb-table">
      <thead><tr><th>Account</th><th style="color:var(--accent)">Debit</th><th style="color:var(--gold)">Credit</th></tr></thead>
      <tbody>${rows.map(r=>`<tr><td>${r.l}</td><td style="color:${r.dr>0?"var(--accent)":"var(--dim)"};;font-weight:${r.dr>0?700:400}">${r.dr>0?fmt(r.dr):"—"}</td><td style="color:${r.cr>0?"var(--gold)":"var(--dim)"};font-weight:${r.cr>0?700:400}">${r.cr>0?fmt(r.cr):"—"}</td></tr>`).join("")}
      <tr style="border-top:2px solid var(--border)"><td style="font-weight:800">TOTALS</td><td style="color:var(--accent);font-weight:800">${fmt(drTotal)}</td><td style="color:var(--gold);font-weight:800">${fmt(crTotal)}</td></tr>
      </tbody></table></div>
      <div style="margin-top:10px;padding:9px 13px;background:${balanced?"var(--as)":"var(--rs)"};border:1px solid ${balanced?"var(--accent)":"var(--red)"}44;border-radius:9px;font-size:12px;color:${balanced?"var(--accent)":"var(--red)"};font-weight:700">
        ${balanced?"✓ Trial Balance is BALANCED":"⚠ Trial Balance OUT OF BALANCE — Review entries"}
      </div>`;
  }
  else if(_auditTab==="income"){
    const rows=[
      {l:"Sales Revenue",a:totalRevenue,type:"rev"},
      {l:"  Rent Expense",a:-totalRent,type:"exp"},{l:"  Supplies Expense",a:-totalSupplies,type:"exp"},
      {l:"  Marketing Expense",a:-totalMkt,type:"exp"},{l:"  Wages Expense",a:-totalEmpCost,type:"exp"},
      {l:"  Misc Expense",a:-totalMisc,type:"exp"},{l:"  Loan Interest",a:-totalLoanPmts,type:"exp"},
      {l:"  TQM Investments",a:-tqmCost,type:"exp"},
      {l:"Total Expenses",a:-totalExpenses,type:"sub"},{l:"NET INCOME / (LOSS)",a:totalProfit,type:"total"},
    ];
    tabContent=`<div class="stmt-scroll">
      <div style="color:var(--teal);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:8px">${S.biz.bizIcon} ${S.biz.name} · Income Statement · Jan–${MONTH_NAMES[ops.length-1]}</div>
      ${rows.map(r=>{
        const isT=r.type==="total",isS=r.type==="sub";
        return `<div class="stmt-row" style="border-top:${isT||isS?"2px":"1px"} solid var(--border);font-weight:${isT||isS?"800":"400"}">
          <span style="color:${isT||isS?"var(--text)":"var(--muted)"};padding-left:${r.l.startsWith("  ")?14:0}px;font-size:12px">${r.l.trim()}</span>
          <span style="color:${isT?(r.a>=0?"var(--accent)":"var(--red)"):isS?"var(--red)":(r.a>=0?"var(--accent)":"var(--red)")};font-family:'Space Mono',monospace;font-size:12px;font-weight:${isT||isS?"800":"500"}">
            ${r.a>=0?fmt(r.a):"("+fmt(Math.abs(r.a))+")"}</span>
        </div>`;
      }).join("")}
      <div style="margin-top:10px;padding:9px 13px;background:${totalProfit>=0?"var(--as)":"var(--rs)"};border-radius:9px;display:flex;justify-content:space-between">
        <span style="color:${totalProfit>=0?"var(--accent)":"var(--red)"};font-weight:800;font-size:12px">Contribution Margin % (BUAD222)</span>
        <span style="color:${totalProfit>=0?"var(--accent)":"var(--red)"};font-family:'Space Mono',monospace;font-weight:800">${pct(cm.cm,S.biz.price)}</span>
      </div>
    </div>`;
  }
  else if(_auditTab==="balance"){
    const rows=[
      {h:"ASSETS"},{l:"  Cash",a:cashEnd},{l:"  Inventory",a:inventory},{l:"  TQM Assets",a:tqmCost},{l:"  Total Assets",a:cashEnd+inventory+tqmCost,bold:true},
      {h:"LIABILITIES"},{l:"  Loan Payable",a:debt},{l:"  Total Liabilities",a:debt,bold:true},
      {h:"OWNER'S EQUITY"},{l:"  Beginning Capital",a:cashStart},{l:"  Net Income/(Loss)",a:totalProfit},{l:"  Total Equity",a:equity,bold:true},
      {l:"TOTAL LIAB + EQUITY",a:debt+equity,bold:true,teal:true},
    ];
    tabContent=`<div class="stmt-scroll">${rows.map(r=>{
      if(r.h) return `<div style="color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:10px 0 3px;border-top:1px solid var(--border)">${r.h}</div>`;
      const col=r.teal?"var(--teal)":r.bold?(r.a>=0?"var(--gold)":"var(--red)"):(r.a>=0?"var(--accent)":"var(--red)");
      return `<div class="stmt-row" style="font-weight:${r.bold?"800":"400"}">

        <span style="color:${col};font-family:'Space Mono',monospace;font-size:12px;font-weight:${r.bold?"800":"500"}">${r.a>=0?fmt(r.a):"("+fmt(Math.abs(r.a))+")"}</span>
      </div>`;
    }).join("")}</div>`;
  }
  else if(_auditTab==="cashflow"){
    const netOp=totalRevenue-totalExpenses+totalCashAdj;
    const netFin=(S.biz.loan?S.biz.loanAmt:0)-totalLoanPmts;
    const rows=[
      {h:"OPERATING ACTIVITIES"},{l:"  Cash from Sales",a:totalRevenue},{l:"  Cash for Expenses",a:-totalExpenses},
      {l:"  Event Adjustments",a:totalCashAdj},{l:"  Net Operating Cash",a:netOp,bold:true},
      {h:"INVESTING ACTIVITIES"},{l:"  TQM Investments",a:-tqmCost},{l:"  Net Investing Cash",a:-tqmCost,bold:true},
      {h:"FINANCING ACTIVITIES"},{l:"  Loan Proceeds",a:S.biz.loan?S.biz.loanAmt:0},{l:"  Loan Repayments",a:-totalLoanPmts},{l:"  Net Financing Cash",a:netFin,bold:true},
      {l:"NET CHANGE IN CASH",a:cashEnd-cashStart,bold:true,teal:true},
      {l:"Beginning Cash Balance",a:cashStart},{l:"ENDING CASH BALANCE",a:cashEnd,bold:true},
    ];
    tabContent=`<div class="stmt-scroll">${rows.map(r=>{
      if(r.h) return `<div style="color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:10px 0 3px;border-top:1px solid var(--border)">${r.h}</div>`;
      const col=r.teal?"var(--teal)":r.bold?(r.a>=0?"var(--gold)":"var(--red)"):(r.a>=0?"var(--accent)":"var(--red)");
      return `<div class="stmt-row" style="font-weight:${r.bold?"800":"400"}">
        <span style="color:${r.bold?"var(--text)":"var(--muted)"};padding-left:${r.l?.startsWith("  ")?14:0}px;font-size:12px">${r.l?.trim()}</span>
        <span style="color:${col};font-family:'Space Mono',monospace;font-size:12px;font-weight:${r.bold?"800":"500"}">${r.a>=0?fmt(r.a):"("+fmt(Math.abs(r.a))+")"}</span>
      </div>`;
    }).join("")}</div>`;
  }
  else if(_auditTab==="checklist"){
    tabContent=`${AUDIT_CHECKS.map(c=>{

        <div style="display:flex;gap:6px;flex-shrink:0">

  else if(_auditTab==="opinion"){

        ?`Except for the ${flagCount} matter(s) flagged, the statements present fairly in all material respects. Management should address the flagged items in the next reporting period.`

      const maxAbs=Math.max(...ops.map(o=>Math.abs(o.profit||0)),1);

      }).join("");

      tabContent=`
        <div style="border-radius:14px;padding:24px 18px;text-align:center;background:${opinionColor}18;border:1px solid ${opinionColor}55;margin-bottom:13px">
          <div style="font-size:42px;margin-bottom:8px">${opinionIcon}</div>

        </div>
        ${flagCount>0?card(`
          <div style="color:var(--red);font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:11px">⚑ Audit Findings</div>
          ${AUDIT_CHECKS.filter(c=>S.auditChecks[c.id]==="flag").map((c,i)=>`
            <div style="padding:9px 0;border-top:${i>0?"1px solid var(--border)":"none"};display:flex;gap:11px;align-items:flex-start">
              ${bdg("Finding "+(i+1),"var(--red)")}
              <div><div style="font-weight:700;font-size:12px">${c.lbl}</div><div style="color:var(--muted);font-size:11px;margin-top:2px">Accounts: ${c.accts.join(", ")}</div></div>

        `):""}
        ${card(`
          <div style="color:var(--gold);font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:13px">📊 9-Month Financial Summary</div>
          <div class="g3" style="margin-bottom:13px">
            ${st("Total Revenue",fmt(totalRevenue),"var(--accent)")}
            ${st("Total Expenses",fmt(totalExpenses),"var(--red)")}
            ${st("Net Profit",fmt(totalProfit),totalProfit>=0?"var(--accent)":"var(--red)")}
            ${st("Ending Cash",fmt(cashEnd),"var(--gold)")}
            ${st("Loan Balance",debt>0?fmt(debt):"None",debt>0?"var(--red)":"var(--accent)")}
            ${st("Owner Equity",fmt(equity),equity>=0?"var(--blue)":"var(--red)")}
          </div>
          <div style="border-top:1px solid var(--border);padding-top:13px">
            <div style="color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:9px">Month-by-Month Profit</div>
            ${profitChart}
          </div>
        `,"glow-gold","background:var(--gs)")}
        ${card(`
          <div style="color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:13px">🎯 Final Performance Scores</div>
          ${[{k:"profit",l:"Profit Management",i:"📈"},{k:"cash",l:"Cash Flow Control",i:"💵"},{k:"debt",l:"Debt Management",i:"🏦"},{k:"growth",l:"Growth Strategy",i:"🚀"},{k:"decisions",l:"Financial Decisions",i:"🎯"}].map(s=>`
            <div class="score-bar-row">
              <div style="display:flex;justify-content:space-between;margin-bottom:5px">
                <span style="font-size:12px">${s.i} ${s.l}</span>
                <span style="color:var(--accent);font-weight:800;font-family:'Space Mono',monospace">${scores[s.k]}/100</span>
              </div>
              ${pb(scores[s.k],scores[s.k]>70?"var(--accent)":scores[s.k]>40?"var(--gold)":"var(--red)")}
            </div>`).join("")}
          <div style="background:var(--as);border:1px solid var(--accent)44;border-radius:10px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:6px">
            <span style="font-weight:800;font-size:14px">🏆 Overall Score</span>
            <span style="color:var(--gold);font-weight:900;font-size:26px;font-family:'Space Mono',monospace">${scores.total}/100</span>
          </div>
        `)}
        <div class="cert">
          <div style="font-size:46px;margin-bottom:8px">🏆</div>
          <div style="color:var(--gold);font-size:19px;font-weight:900">Certificate of Completion</div>
          <div style="color:var(--text);font-size:13px;margin-top:5px">nugO Pro Business Lab</div>
          <div style="color:var(--muted);font-size:12px;margin-top:12px">This certifies that</div>
          <div style="color:var(--gold);font-size:18px;font-weight:800;margin:5px 0">${S.biz.bizIcon} ${S.biz.name}</div>
          <div style="color:var(--muted);font-size:12px">completed all 19 rounds including the Accounting Lab & Full Audit</div>
          <div style="color:var(--teal);font-size:13px;font-weight:700;margin-top:3px">${S.biz.bizLabel} · 9-Month Business Journey</div>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px">
            ${bdg("Score: "+scores.total+"/100","var(--gold)","lg")}
            ${bdg(opinionIcon+" "+opinion,opinionColor,"lg")}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:14px;text-align:left">
            ${["Business Selection","Pricing Strategy (BUAD222)","Marketing Allocation","TQM Investments","Labor Negotiation","Cash Strategy","9-Month Operations","Dice Event Management","Journal Entry Recording","Trial Balance Verification","Financial Statement Builder","4 Financial Statements","12-Item Audit Checklist","Audit Opinion","nugO Pro Portfolio"].map(s=>`
              <div style="display:flex;gap:6px;align-items:center"><span style="color:var(--accent);font-size:11px">✓</span><span style="color:var(--muted);font-size:10px">${s}</span></div>`).join("")}
          </div>
        </div>
        <div style="text-align:center;margin-top:14px">${b("↺ Start New Business","restartFull()","ghost","md")}</div>`;
    }
  }

  return `
    ${roundHdr("🔍","var(--teal)","19","Full Audit Simulation","Trial Balance → Statements → Audit Opinion")}
    <div style="background:linear-gradient(135deg,#0a1228,#0d1520);border:1px solid var(--teal)44;border-radius:13px;padding:14px 17px;display:flex;align-items:center;gap:13px;margin-bottom:14px;flex-wrap:wrap">
      <div style="font-size:28px">${S.biz.bizIcon}</div>
      <div style="flex:1"><div style="color:var(--teal);font-weight:900;font-size:14px">${S.biz.name} — Full Corporate Audit</div><div style="color:var(--muted);font-size:11px;margin-top:2px">${S.biz.bizLabel} · 9-Month Operating Period</div></div>
      <div style="display:flex;gap:13px;flex-wrap:wrap">
        ${st("Net Profit",fmt(totalProfit),totalProfit>=0?"var(--accent)":"var(--red)","sm")}
        ${st("Cash End",fmt(cashEnd),"var(--gold)","sm")}
        ${st("Opinion",opinionIcon+" "+opinion,opinionColor,"sm")}
      </div>
    </div>
    <div class="tabs">${tabs.map(t=>`<button class="tab ${_auditTab===t.id?"active":""}" onclick="setAuditTab('${t.id}')" style="${_auditTab===t.id?"background:var(--teal);color:#060a12":""}">${t.lbl}</button>`).join("")}</div>
    ${card(tabContent)}
    ${restartLink()}`;
}

function setCheck(id,val){S.auditChecks[id]=val;saveGame();render();}
function setAuditTab(tab){_auditTab=tab;render();}

// ═══════════════════════════════════════════════
// HOW TO PLAY MODAL
// ═══════════════════════════════════════════════
function openHTP(){_htpStep=0;renderHTP();document.getElementById("htp-modal").style.display="flex";}
function closeHTP(){document.getElementById("htp-modal").style.display="none";}
function htpNav(dir){_htpStep=Math.max(0,Math.min(HTP.length-1,_htpStep+dir));renderHTP();}
function renderHTP(){
  const s=HTP[_htpStep];
  document.getElementById("htp-step-lbl").textContent=`Step ${_htpStep+1} of ${HTP.length}`;
  document.getElementById("htp-dots").innerHTML=HTP.map((_,i)=>`<div class="modal-prog-seg" onclick="_htpStep=${i};renderHTP()" style="background:${i<=_htpStep?s.color:"var(--border)"}"></div>`).join("");
  document.getElementById("htp-content").innerHTML=`<div style="font-size:50px;text-align:center;margin-bottom:12px">${s.icon}</div><div style="color:${s.color};font-weight:900;font-size:16px;text-align:center;margin-bottom:10px">${s.title}</div><div style="color:var(--muted);font-size:13px;line-height:1.8;text-align:center">${s.body}</div>`;
  document.getElementById("htp-prev").style.display=_htpStep===0?"none":"inline-block";
  const nx=document.getElementById("htp-next");
  if(_htpStep===HTP.length-1){nx.textContent="Got it! 🚀";nx.className="btn gold md";nx.onclick=closeHTP;}
  else{nx.textContent="Next →";nx.className="btn blue md";nx.onclick=()=>htpNav(1);}
  const box=document.getElementById("htp-box");
  box.style.borderColor=s.color+"55";box.style.boxShadow=`0 0 48px ${s.color}33`;
}

window.onload=function(){
  const saved=loadSave();
  if(saved&&saved.biz){_bizType=saved.biz.bizType||"foodtruck";_loanOn=saved.biz.loan||false;_soloOn=saved.biz.solo!==false;_mktBudget=saved.biz.mktBudget||250;_tqmSelected=saved.biz.tqmList||[];}
  _auditTab="trial";
  render();
};
