<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nugO Excel Mastery Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--card:#0e1320;--border:#1a2640;
  --green:#4cdb8a;--grs:#4cdb8a18;
  --blue:#3d9eff;--bs:#3d9eff18;
  --gold:#f5b731;--gs:#f5b73118;
  --red:#f04060;--rs:#f0406018;
  --purple:#a875f0;--ps:#a875f018;
  --teal:#00d4d4;--ts:#00d4d418;
  --orange:#ff7c3a;--os:#ff7c3a18;
  --text:#ddeeff;--muted:#7a90b0;--dim:#374a66;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
button{font-family:'Space Mono',monospace;cursor:pointer;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
.fu{animation:fadeUp .32s ease forwards;}
#app{max-width:720px;margin:0 auto;padding:0 16px 80px;}
#hdr{background:linear-gradient(180deg,#060a14,transparent);padding:20px 18px 0;margin-bottom:6px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
#hdr-inner{max-width:720px;margin:0 auto;}
.hdr-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.logo-box{background:var(--grs);border:1px solid var(--green)33;border-radius:11px;padding:7px 13px;font-size:19px;flex-shrink:0;}
.prog-wrap{margin-top:14px;margin-bottom:2px;}
.prog-bar{display:flex;gap:2px;}
.prog-seg{flex:1;height:4px;border-radius:99px;background:var(--border);transition:background .3s;}
.prog-labels{display:flex;justify-content:space-between;margin-top:4px;}
.prog-labels span{color:var(--muted);font-size:9px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:0 2px 20px #00000055;}
.card.green{border-color:var(--green)55;box-shadow:0 0 28px var(--green)22;}
.card.blue{border-color:var(--blue)55;box-shadow:0 0 28px var(--blue)22;}
.card.gold{border-color:var(--gold)55;box-shadow:0 0 28px var(--gold)22;}
.card.purple{border-color:var(--purple)55;box-shadow:0 0 28px var(--purple)22;}
.card.teal{border-color:var(--teal)55;box-shadow:0 0 28px var(--teal)22;}
.card.dark{background:#080c18;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;}
.col{display:flex;flex-direction:column;gap:15px;}
.stat{text-align:center;}
.stat .val{font-family:'Space Mono',monospace;font-weight:800;line-height:1;}
.stat .lbl{color:var(--muted);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
.badge{display:inline-block;border-radius:99px;font-weight:700;white-space:nowrap;}
.pbar{background:#151f35;border-radius:99px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:99px;transition:width 1.2s cubic-bezier(.4,2,.6,1);}
.btn{border-radius:10px;font-weight:800;font-size:12px;letter-spacing:.3px;transition:opacity .15s,transform .1s;border:none;}
.btn:hover{opacity:.85;transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.btn.primary{background:var(--green);color:#060a12;}
.btn.blue{background:var(--blue);color:#060a12;}
.btn.gold{background:var(--gold);color:#060a12;}
.btn.ghost{background:transparent;color:var(--green);border:1px solid var(--green)55;}
.btn.dark{background:#151f35;color:var(--muted);border:1px solid var(--border);}
.btn.red{background:var(--red);color:#fff;}
.btn.purple{background:var(--purple);color:#fff;}
.btn.teal{background:var(--teal);color:#060a12;}
.btn.sm{padding:6px 14px;font-size:11px;}
.btn.md{padding:9px 20px;}
.btn.lg{padding:13px 28px;font-size:14px;}
.btn.xl{padding:15px 38px;font-size:16px;}
.btn.full{width:100%;}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:14px;}
.round-hdr{border-radius:14px;padding:14px 17px;margin-bottom:15px;display:flex;gap:13px;align-items:center;}
.modal-overlay{position:fixed;inset:0;background:#000000bb;z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--card);border-radius:20px;padding:26px;max-width:500px;width:100%;animation:slideDown .25s ease;max-height:90vh;overflow-y:auto;}
.cert{background:linear-gradient(135deg,#0a1428,#060e20);border:1px solid var(--green)55;border-radius:16px;padding:28px;text-align:center;}
/* Excel-style spreadsheet */
.xl-sheet{background:#080c18;border:1px solid var(--border);border-radius:12px;overflow:hidden;font-family:'Space Mono',monospace;font-size:11px;}
.xl-header{background:#111825;padding:8px 12px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;}
.xl-grid{overflow-x:auto;}
.xl-table{width:100%;border-collapse:collapse;min-width:400px;}
.xl-table th{background:#111825;color:var(--muted);font-size:10px;padding:6px 10px;text-align:left;border:1px solid var(--border)22;font-weight:700;letter-spacing:.5px;}
.xl-table td{padding:6px 10px;border:1px solid var(--border)22;color:var(--text);font-size:11px;white-space:nowrap;}
.xl-table tr:nth-child(even) td{background:#0a0f1a;}
.xl-table tr.highlight td{background:var(--gs);color:var(--green);}
.xl-row-num{color:var(--dim);font-size:10px;min-width:28px;}
.formula-bar{background:#080c18;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:'Space Mono',monospace;font-size:12px;display:flex;align-items:center;gap:8px;}
.formula-bar .fx{color:var(--green);font-weight:700;font-size:13px;flex-shrink:0;}
.formula-input{flex:1;background:transparent;border:none;outline:none;color:var(--gold);font-family:'Space Mono',monospace;font-size:12px;width:100%;}
.answer-opt{border-radius:11px;padding:12px 14px;border:1px solid var(--border);cursor:pointer;transition:all .13s;margin-bottom:8px;font-family:'Space Mono',monospace;font-size:12px;}
.answer-opt:hover{border-color:var(--green);background:var(--grs);}
.answer-opt.correct{border-color:var(--green);background:var(--grs);color:var(--green);}
.answer-opt.wrong{border-color:var(--red);background:var(--rs);color:var(--red);}
.answer-opt.reveal{border-color:var(--blue);background:var(--bs);}
.task-card{border-radius:13px;padding:15px;border:2px solid var(--border);cursor:pointer;transition:all .13s;margin-bottom:10px;}
.task-card.sel{border-color:var(--green);background:var(--grs);}
.cat-pill{display:inline-flex;align-items:center;gap:5px;border-radius:99px;padding:4px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;}
.skill-bar-wrap{margin-bottom:8px;}
.skill-label{display:flex;justify-content:space-between;margin-bottom:4px;font-size:10px;}
.tip-box{background:var(--gs);border:1px solid var(--gold)44;border-radius:10px;padding:11px 14px;font-size:12px;color:var(--gold);line-height:1.7;}
@media(max-width:500px){.g3{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-inner">
    <div class="hdr-row">
      <div class="logo-box">📊</div>
      <div>
        <div style="color:var(--green);font-weight:900;font-size:16px;letter-spacing:-0.5px">nugO Excel Mastery Lab</div>
        <div style="color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:1.5px">Formulas · Lookups · Dashboards · Real Workplace Skills</div>
      </div>
      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
        <div id="prof-hdr" style="display:none;text-align:right">
          <div id="prof-hdr-score" style="color:var(--gold);font-weight:800;font-size:12px"></div>
          <div id="prof-hdr-level" style="color:var(--muted);font-size:9px"></div>
        </div>
      </div>
    </div>
    <div id="prog-wrap" class="prog-wrap" style="display:none">
      <div class="prog-bar" id="prog-bar"></div>
      <div class="prog-labels"><span id="prog-l">Module 1</span><span id="prog-r" style="color:var(--green)">0%</span></div>
    </div>
  </div>
</div>

<div id="app"><div id="screen"></div></div>

<script>
// ═══════════════════════════════════
// DATA
// ═══════════════════════════════════
const CATEGORIES=[
  {id:"lookup",icon:"🔍",label:"Lookup & Retrieval",color:"var(--blue)",   desc:"XLOOKUP, VLOOKUP, INDEX, MATCH"},
  {id:"logic", icon:"⚡",label:"Logical Functions",  color:"var(--gold)",  desc:"IF, IFS, AND, OR, IFERROR"},
  {id:"math",  icon:"💰",label:"Math & Financial",   color:"var(--green)", desc:"SUM, SUMIFS, AVERAGE, ROUND"},
  {id:"text",  icon:"✏️", label:"Text Functions",     color:"var(--purple)",desc:"LEFT, RIGHT, MID, TRIM, CONCAT"},
  {id:"date",  icon:"📅",label:"Date & Time",         color:"var(--teal)",  desc:"TODAY, DATEDIF, WORKDAY"},
  {id:"analysis",icon:"📈",label:"Data Analysis",    color:"var(--orange)",desc:"COUNT, COUNTIFS, AVERAGEIF"},
  {id:"modern",icon:"🚀",label:"Modern Excel",        color:"var(--red)",   desc:"FILTER, SORT, UNIQUE, SEQUENCE"},
];

const LESSONS=[
  // ── LOOKUP ──
  {id:"vlookup1",cat:"lookup",fn:"VLOOKUP",level:"Beginner",xp:10,
   title:"Find Employee Salary",
   scenario:"You have an HR spreadsheet. You need to find John Smith's salary using his Employee ID.",
   table:{cols:["A","B","C","D"],headers:["Emp ID","Name","Department","Salary"],rows:[["E001","Maria Garcia","Finance","$52,000"],["E002","John Smith","HR","$48,000"],["E003","Lisa Chen","IT","$65,000"],["E004","Marcus Brown","Finance","$55,000"]]},
   question:"Which formula finds John Smith's salary using his ID in cell F2?",
   answers:["=VLOOKUP(F2,A:D,4,FALSE)","=VLOOKUP(F2,A:D,2,FALSE)","=VLOOKUP(F2,B:D,3,FALSE)","=VLOOKUP(\"John Smith\",A:D,4,FALSE)"],
   correct:0,
   explanation:"VLOOKUP(lookup_value, table_array, col_index, [exact_match]). We look up F2 (the ID) in columns A:D, return column 4 (Salary), FALSE = exact match.",
   tip:"VLOOKUP always searches the FIRST column of your range. The col_index counts from the start of your range, not the whole sheet."},

  {id:"xlookup1",cat:"lookup",fn:"XLOOKUP",level:"Intermediate",xp:20,
   title:"Modern Lookup — Two-Way Search",
   scenario:"Your manager wants you to update the old VLOOKUP formulas. XLOOKUP is more powerful and flexible.",
   table:{cols:["A","B","C","D"],headers:["Product","Region","Q1 Sales","Q2 Sales"],rows:[["Widget A","East","$12,400","$14,200"],["Widget B","West","$8,900","$11,300"],["Widget C","East","$15,600","$16,800"],["Widget D","North","$7,200","$9,100"]]},
   question:"Which XLOOKUP finds Widget C's Q2 Sales?",
   answers:["=XLOOKUP(\"Widget C\",A:A,D:D)","=XLOOKUP(D:D,\"Widget C\",A:A)","=XLOOKUP(A:A,\"Widget C\",D:D)","=XLOOKUP(\"Widget C\",D:D,A:A)"],
   correct:0,
   explanation:"XLOOKUP(lookup_value, lookup_array, return_array). Find 'Widget C' in column A, return the matching value from column D (Q2 Sales).",
   tip:"XLOOKUP can search any column — not just the first. It also works right-to-left, which VLOOKUP can't do."},

  {id:"indexmatch1",cat:"lookup",fn:"INDEX/MATCH",level:"Advanced",xp:30,
   title:"INDEX + MATCH Power Combo",
   scenario:"You need a dynamic lookup that works both horizontally and vertically on a budget report.",
   table:{cols:["A","B","C","D"],headers:["Department","Jan","Feb","Mar"],rows:[["Marketing","$8,200","$9,100","$7,800"],["Operations","$22,000","$21,500","$23,200"],["HR","$15,000","$15,000","$15,000"],["IT","$31,000","$28,500","$33,400"]]},
   question:"Which formula finds Operations' February budget?",
   answers:["=INDEX(B:D,MATCH(\"Operations\",A:A,0),2)","=INDEX(A:D,MATCH(\"Operations\",A:A,0),2)","=INDEX(B:D,MATCH(\"Operations\",B:D,0),2)","=MATCH(\"Operations\",A:A,INDEX(B:D,0,2))"],
   correct:0,
   explanation:"MATCH finds the row number of 'Operations' in column A. INDEX then returns the value at that row, column 2 (February) within the B:D range.",
   tip:"INDEX/MATCH is more flexible than VLOOKUP — it can look left, handle column insertions, and is faster on large datasets."},

  // ── LOGIC ──
  {id:"if1",cat:"logic",fn:"IF",level:"Beginner",xp:10,
   title:"Pass or Fail Grade Check",
   scenario:"You're tracking employee training scores. Anyone scoring 70 or above passes.",
   table:{cols:["A","B","C"],headers:["Employee","Score","Result"],rows:[["Davis, T.","85","?"],["Wilson, K.","62","?"],["Moore, A.","91","?"],["Taylor, J.","68","?"]]},
   question:"Which formula goes in C2 to show Pass or Fail?",
   answers:["=IF(B2>=70,\"Pass\",\"Fail\")","=IF(B2>70,\"Pass\",\"Fail\")","=IF(B2=\"70\",\"Pass\",\"Fail\")","=IF(\"Pass\",B2>=70,\"Fail\")"],
   correct:0,
   explanation:"=IF(condition, value_if_true, value_if_false). B2>=70 checks if score is 70 or above. If yes → \"Pass\", if no → \"Fail\".",
   tip:"Use >= for 'greater than or equal to'. Using > would mark a score of exactly 70 as Fail."},

  {id:"iferror1",cat:"logic",fn:"IFERROR",level:"Intermediate",xp:20,
   title:"Clean Up Error Messages",
   scenario:"Your VLOOKUP sometimes returns #N/A errors when an item isn't found. Your manager wants clean output.",
   table:{cols:["A","B","C"],headers:["Order ID","Product","Lookup Result"],rows:[["ORD-101","Widget A","$12.99"],["ORD-102","Widget Z","#N/A"],["ORD-103","Widget B","$8.49"],["ORD-104","Widget Q","#N/A"]]},
   question:"Which formula wraps VLOOKUP to show 'Not Found' instead of #N/A?",
   answers:["=IFERROR(VLOOKUP(A2,Products!A:B,2,FALSE),\"Not Found\")","=IF(VLOOKUP(A2,Products!A:B,2,FALSE),\"Not Found\")","=IFERROR(\"Not Found\",VLOOKUP(A2,Products!A:B,2,FALSE))","=VLOOKUP(IFERROR(A2,\"Not Found\"),Products!A:B,2,FALSE)"],
   correct:0,
   explanation:"IFERROR(value, value_if_error). If the VLOOKUP produces any error, show 'Not Found' instead. Otherwise show the normal result.",
   tip:"IFERROR handles ALL errors: #N/A, #REF!, #VALUE!, #DIV/0!. Use it anytime your formula might break on missing data."},

  {id:"ifs1",cat:"logic",fn:"IFS",level:"Intermediate",xp:20,
   title:"Multi-Level Performance Rating",
   scenario:"HR needs performance ratings: Excellent (90+), Good (75-89), Needs Improvement (60-74), Poor (below 60).",
   table:{cols:["A","B","C"],headers:["Employee","Score","Rating"],rows:[["Adams","94","?"],["Baker","78","?"],["Clark","65","?"],["Davis","52","?"]]},
   question:"Which IFS formula assigns the correct rating?",
   answers:["=IFS(B2>=90,\"Excellent\",B2>=75,\"Good\",B2>=60,\"Needs Improvement\",TRUE,\"Poor\")","=IFS(B2>=75,\"Good\",B2>=90,\"Excellent\",B2>=60,\"Needs Improvement\",TRUE,\"Poor\")","=IFS(B2<60,\"Poor\",B2<75,\"Needs Improvement\",B2<90,\"Good\",TRUE,\"Excellent\")","=IF(B2>=90,\"Excellent\",IF(B2>=75,\"Good\",IF(B2>=60,\"Needs Improvement\",\"Poor\")))"],
   correct:0,
   explanation:"IFS checks conditions in ORDER. Start with the highest threshold (90+) and work down. TRUE as the last condition acts as the 'else' catch-all.",
   tip:"Order matters in IFS! Always go from most restrictive to least restrictive, or you'll get wrong results."},

  // ── MATH ──
  {id:"sumifs1",cat:"math",fn:"SUMIFS",level:"Intermediate",xp:20,
   title:"Department Budget Totals",
   scenario:"Finance needs the total expenses for the Marketing department in Q1 only.",
   table:{cols:["A","B","C","D"],headers:["Department","Quarter","Category","Amount"],rows:[["Marketing","Q1","Ads","$5,200"],["Operations","Q1","Supplies","$3,100"],["Marketing","Q2","Ads","$6,800"],["Marketing","Q1","Events","$2,900"],["HR","Q1","Training","$4,000"]]},
   question:"Which SUMIFS totals Marketing Q1 expenses?",
   answers:["=SUMIFS(D:D,A:A,\"Marketing\",B:B,\"Q1\")","=SUMIFS(A:A,\"Marketing\",B:B,\"Q1\",D:D)","=SUMIF(A:A,\"Marketing\",D:D)","=SUM(IF(A:A=\"Marketing\",IF(B:B=\"Q1\",D:D)))"],
   correct:0,
   explanation:"SUMIFS(sum_range, criteria_range1, criteria1, criteria_range2, criteria2...). Sum column D where A='Marketing' AND B='Q1'.",
   tip:"SUMIFS can handle multiple conditions. SUMIF only handles one. In the workplace, you'll almost always need SUMIFS."},

  {id:"round1",cat:"math",fn:"ROUND",level:"Beginner",xp:10,
   title:"Clean Up Financial Reports",
   scenario:"Your expense report has long decimal numbers. Finance wants everything rounded to 2 decimal places.",
   table:{cols:["A","B","C"],headers:["Item","Raw Amount","Rounded"],rows:[["Supplies","$234.5678","?"],["Travel","$891.2341","?"],["Software","$1204.9999","?"],["Meals","$67.1250","?"]]},
   question:"Which formula rounds the amount in B2 to 2 decimal places?",
   answers:["=ROUND(B2,2)","=ROUND(B2,0)","=ROUNDUP(B2,2)","=INT(B2)"],
   correct:0,
   explanation:"ROUND(number, num_digits). Using 2 rounds to 2 decimal places ($234.57). Using 0 rounds to whole number. Negative numbers round left of decimal.",
   tip:"ROUND rounds normally (0.5 goes up). ROUNDUP always rounds up. ROUNDDOWN always rounds down. Use ROUND for standard financial reports."},

  // ── TEXT ──
  {id:"left1",cat:"text",fn:"LEFT/RIGHT/MID",level:"Beginner",xp:10,
   title:"Extract Employee ID Codes",
   scenario:"Your database has employee codes like 'EMP-2024-HR-001'. You need just the department code (HR).",
   table:{cols:["A","B"],headers:["Full Code","Dept Code"],rows:[["EMP-2024-HR-001","?"],["EMP-2024-IT-002","?"],["EMP-2024-FIN-003","?"],["EMP-2024-OPS-004","?"]]},
   question:"Which formula extracts the 2-letter dept code from position 10?",
   answers:["=MID(A2,10,2)","=LEFT(A2,2)","=RIGHT(A2,2)","=MID(A2,2,10)"],
   correct:0,
   explanation:"MID(text, start_num, num_chars). Starting at position 10, extract 2 characters. LEFT gets from the start, RIGHT gets from the end.",
   tip:"Count characters including dashes. EMP-2024- is 9 characters, so HR starts at position 10."},

  {id:"trim1",cat:"text",fn:"TRIM",level:"Beginner",xp:10,
   title:"Clean Imported Data",
   scenario:"You imported customer names from another system. Many have extra spaces that are breaking your lookups.",
   table:{cols:["A","B"],headers:["Raw Name","Cleaned"],rows:[["  John Smith  ","?"],["Lisa  Chen","?"],["  Marcus Brown","?"],["Taylor,  James","?"]]},
   question:"Which formula removes leading, trailing, and extra spaces?",
   answers:["=TRIM(A2)","=CLEAN(A2)","=LEFT(TRIM(A2),LEN(A2))","=SUBSTITUTE(A2,\" \",\"\")"],
   correct:0,
   explanation:"TRIM removes all leading and trailing spaces, and reduces multiple internal spaces to single spaces. It's the first step in data cleaning.",
   tip:"TRIM only removes spaces. Use CLEAN to remove non-printable characters. Use both =TRIM(CLEAN(A2)) for heavily corrupted imported data."},

  {id:"textjoin1",cat:"text",fn:"TEXTJOIN",level:"Intermediate",xp:20,
   title:"Build Full Address from Columns",
   scenario:"Your database has address parts in separate columns. You need to combine them with commas.",
   table:{cols:["A","B","C","D"],headers:["Street","City","State","Zip"],rows:[["123 Main St","Baltimore","MD","21201"],["456 Oak Ave","Salisbury","MD","21801"],["789 Pine Rd","Ocean City","MD","21842"]]},
   question:"Which formula combines all address parts with ', ' between them?",
   answers:["=TEXTJOIN(\", \",TRUE,A2,B2,C2,D2)","=CONCAT(A2,\", \",B2,\", \",C2,\", \",D2)","=A2&\", \"&B2&\", \"&C2&\", \"&D2","=JOIN(\", \",A2:D2)"],
   correct:0,
   explanation:"TEXTJOIN(delimiter, ignore_empty, text1, text2...). The TRUE argument skips empty cells automatically — great for optional address fields.",
   tip:"TEXTJOIN is far better than & for combining multiple cells because it handles empty cells and you only type the delimiter once."},

  // ── DATE ──
  {id:"today1",cat:"date",fn:"TODAY/DATEDIF",level:"Beginner",xp:10,
   title:"Calculate Employee Tenure",
   scenario:"HR needs to calculate how many years each employee has worked at the company.",
   table:{cols:["A","B","C"],headers:["Employee","Hire Date","Years"],rows:[["Johnson, M.","3/15/2018","?"],["Williams, P.","7/22/2020","?"],["Anderson, R.","1/8/2015","?"],["Thomas, K.","11/30/2022","?"]]},
   question:"Which formula calculates complete years of service from hire date in B2?",
   answers:["=DATEDIF(B2,TODAY(),\"Y\")","=TODAY()-B2","=YEAR(TODAY())-YEAR(B2)","=DAYS(TODAY(),B2)/365"],
   correct:0,
   explanation:"DATEDIF(start_date, end_date, unit). \"Y\" returns complete years. TODAY() gives today's date dynamically — it updates every day automatically.",
   tip:"DATEDIF is a hidden function — it doesn't appear in autocomplete but it works. Use \"Y\" for years, \"M\" for months, \"D\" for days, \"YM\" for months ignoring years."},

  {id:"workday1",cat:"date",fn:"WORKDAY",level:"Intermediate",xp:20,
   title:"Calculate Project Deadlines",
   scenario:"Project management needs to calculate deadlines that are 30 business days from the start date (excluding weekends).",
   table:{cols:["A","B","C"],headers:["Project","Start Date","Deadline"],rows:[["Website Redesign","5/1/2026","?"],["Data Migration","5/15/2026","?"],["Staff Training","6/1/2026","?"],["Audit Prep","6/10/2026","?"]]},
   question:"Which formula adds 30 working days to the start date in B2?",
   answers:["=WORKDAY(B2,30)","=B2+30","=B2+(30*7/5)","=NETWORKDAYS(B2,30)"],
   correct:0,
   explanation:"WORKDAY(start_date, days, [holidays]) automatically skips weekends. Add a holidays range as the 3rd argument to also skip holidays.",
   tip:"WORKDAY calculates a future date. NETWORKDAYS counts working days BETWEEN two dates. Don't confuse them."},

  // ── ANALYSIS ──
  {id:"countifs1",cat:"analysis",fn:"COUNTIFS",level:"Intermediate",xp:20,
   title:"Track Program Completions",

const TOTAL_LESSONS=LESSONS.length;
const SAVE_KEY="nugo-excel-v1";

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let S={
  screen:"intro",   // intro | catselect | lesson | result | summary | cert
  completedIds:[],
  scores:{},        // lessonId -> correct(true/false)
  xp:0,
  currentLesson:null,
  selectedAnswer:null,
  answered:false,
  catFilter:null,
};

function saveGame(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(S));}catch(e){}}
function loadSave(){try{return JSON.parse(localStorage.getItem(SAVE_KEY)||"null");}catch{return null;}}
function clearSave(){try{localStorage.removeItem(SAVE_KEY);}catch{}}

// ═══════════════════════════════════
// HELPERS
// ═══════════════════════════════════
const clamp=(v,lo,hi)=>Math.min(hi,Math.max(lo,v));
const bdg=(txt,color,sz="sm")=>
  `<span class="badge" style="background:${color}28;color:${color};border:1px solid ${color}44;padding:${sz==="lg"?"4px 14px":"2px 10px"};font-size:${sz==="lg"?13:11}px">${txt}</span>`;
const st=(lbl,val,color,sm=false)=>
  `<div class="stat"><div class="val" style="color:${color};font-size:${sm?14:20}px">${val}</div><div class="lbl">${lbl}</div></div>`;
const pb=(p,color,h=8)=>
  `<div class="pbar" style="height:${h}px"><div class="pbar-fill" style="width:${clamp(p,0,100)}%;background:${color}"></div></div>`;
const btn=(txt,fn,v="primary",sz="md",dis=false)=>
  `<button class="btn ${v} ${sz}" onclick="${fn}" ${dis?"disabled":""}>${txt}</button>`;

function levelFromXP(xp){
  if(xp>=300) return {label:"Excel Expert",   color:"var(--teal)",  icon:"🏆"};
  if(xp>=200) return {label:"Advanced",        color:"var(--green)", icon:"⭐"};
  if(xp>=100) return {label:"Intermediate",    color:"var(--blue)",  icon:"📈"};
  if(xp>=40)  return {label:"Developing",      color:"var(--gold)",  icon:"📊"};
  return              {label:"Beginner",        color:"var(--muted)", icon:"🌱"};
}

function getCatProgress(catId){
  const catLessons=LESSONS.filter(l=>l.cat===catId);
  const done=catLessons.filter(l=>S.completedIds.includes(l.id)).length;
  return {total:catLessons.length,done,pct:Math.round(done/catLessons.length*100)};
}

function getOverallProgress(){
  return {done:S.completedIds.length,total:TOTAL_LESSONS,pct:Math.round(S.completedIds.length/TOTAL_LESSONS*100)};
}

// ═══════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════
function render(){
  updateHeader();
  window.scrollTo({top:0,behavior:"smooth"});
  const el=document.getElementById("screen");
  el.className="fu";void el.offsetWidth;
  if(S.screen==="intro")      el.innerHTML=renderIntro();
  else if(S.screen==="catselect") el.innerHTML=renderCatSelect();
  else if(S.screen==="lesson")    el.innerHTML=renderLesson();
  else if(S.screen==="result")    el.innerHTML=renderResult();
  else if(S.screen==="summary")   el.innerHTML=renderSummary();
  else if(S.screen==="cert")      el.innerHTML=renderCert();
}

function updateHeader(){
  const pw=document.getElementById("prog-wrap"),ph=document.getElementById("prof-hdr");
  if(S.screen==="intro"){if(pw)pw.style.display="none";if(ph)ph.style.display="none";return;}
  if(pw)pw.style.display="block";
  const prog=getOverallProgress();
  const bar=document.getElementById("prog-bar");
  if(bar){
    const segs=20;
    bar.innerHTML=Array.from({length:segs},(_,i)=>{
      const done=i<Math.round(prog.pct/100*segs);
      return `<div class="prog-seg" style="background:${done?"var(--green)":"var(--border)"}"></div>`;
    }).join("");
  }
  const pl=document.getElementById("prog-l");if(pl)pl.textContent=`${prog.done}/${prog.total} lessons`;
  const pr=document.getElementById("prog-r");if(pr)pr.textContent=prog.pct+"%";
  if(ph){
    ph.style.display="block";
    const lv=levelFromXP(S.xp);
    document.getElementById("prof-hdr-score").textContent=S.xp+" XP";
    document.getElementById("prof-hdr-level").textContent=lv.icon+" "+lv.label;
  }
}

function startCat(catId){
  const avail=LESSONS.filter(l=>l.cat===catId&&!S.completedIds.includes(l.id));
  if(avail.length===0){
    // All done — pick any from this cat
    const all=LESSONS.filter(l=>l.cat===catId);
    S.currentLesson=all[0];
  } else {
    S.currentLesson=avail[0];
  }
  S.selectedAnswer=null;S.answered=false;S.screen="lesson";
  render();
}

function goToCert(){S.screen="cert";render();}

             onclick="${S.answered?"":"selectAnswer("+i+")"}" 
             id="ans-${i}">
          <span style="color:var(--muted);margin-right:8px">${["A","B","C","D"][i]}.</span>${ans}
          ${S.answered&&i===l.correct?` <span style="color:var(--green);margin-left:8px">✓</span>`:""}

    <div id="explanation" style="display:${S.answered?"block":"none"}">
      <div style="background:var(--bs);border:1px solid var(--blue)44;border-radius:10px;padding:13px;margin-top:12px;font-size:12px;line-height:1.7">

        <div style="color:var(--text)">${l.explanation}</div>
      </div>

      </div>
      <div style="margin-top:14px;display:flex;gap:10px">
        ${btn("← Categories","goBack()","dark","md")}
        ${btn("Next Lesson →","nextLesson()","primary","md")}

    </div>`;
}

function selectAnswer(i){
  if(S.answered)return;
  S.selectedAnswer=i;
  S.answered=true;
  const l=S.currentLesson;
  const correct=i===l.correct;
  if(!S.completedIds.includes(l.id)){
    S.completedIds.push(l.id);
    S.scores[l.id]=correct;
    if(correct)S.xp+=l.xp;
    else S.xp+=Math.round(l.xp*0.3); // partial XP for trying
    saveGame();
  }
  render();
}

function nextLesson(){
  const l=S.currentLesson;
  const catLessons=LESSONS.filter(x=>x.cat===l.cat&&!S.completedIds.includes(x.id));
  if(catLessons.length>0){
    S.currentLesson=catLessons[0];
    S.selectedAnswer=null;S.answered=false;
    render();
  } else {
    // Category done
    S.screen="catselect";
    render();
  }
}

function goBack(){S.screen="catselect";S.selectedAnswer=null;S.answered=false;render();}

      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;text-align:left">
        ${CATEGORIES.map(c=>{const cp=getCatProgress(c.id);return `<div style="display:flex;gap:6px;align-items:center;padding:6px 10px;background:${cp.pct===100?"var(--grs)":"var(--card)"};border-radius:8px;border:1px solid ${cp.pct===100?"var(--green)44":"var(--border)22"}"><span style="font-size:14px">${c.icon}</span><div><div style="font-weight:700;font-size:10px;color:${cp.pct===100?"var(--green)":"var(--muted)"}">${c.label}</div><div style="font-size:9px;color:var(--dim)">${cp.done}/${cp.total} lessons</div></div></div>`;}).join("")}
      </div>
    </div>
    <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">
      ${btn("← Back to Training","goBack()","dark","md")}
      ${btn("↺ Start Over","startFresh()","ghost","md")}
    </div>
    <a href="https://nugo-wealth-building-visz.glide.page/" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:10px;margin-top:16px;padding:13px 20px;background:linear-gradient(135deg,var(--gs),var(--bs));border:1px solid var(--gold)55;border-radius:13px;text-decoration:none" onmouseover="this.style.opacity='.8'" onmouseout="this.style.opacity='1'">
      <span style="font-size:20px">⭐</span>
      <div style="text-align:left"><div style="color:var(--gold);font-weight:800;font-size:12px;font-family:'Space Mono',monospace">nugO Wealth Building Academy</div><div style="color:var(--muted);font-size:10px;margin-top:2px">Continue your financial journey →</div></div>
    </a>`;
}
