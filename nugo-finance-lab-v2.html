<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nugO Personal Finance Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--card:#0e1320;--border:#1a2640;
  --accent:#f5b731;--as:#f5b73118;
  --green:#4cdb8a;--grs:#4cdb8a18;
  --red:#f04060;--rs:#f0406018;
  --blue:#3d9eff;--bs:#3d9eff18;
  --purple:#a875f0;--ps:#a875f018;
  --orange:#ff7c3a;--os:#ff7c3a18;
  --teal:#00d4d4;--ts:#00d4d418;
  --text:#ddeeff;--muted:#7a90b0;--dim:#374a66;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
input,select,textarea{font-family:'Syne',sans-serif;}
button{font-family:'Space Mono',monospace;cursor:pointer;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes diceShake{0%{transform:rotate(-10deg)scale(1.12)}50%{transform:rotate(10deg)scale(.91)}100%{transform:rotate(-5deg)scale(1.05)}}
@keyframes cardReveal{0%{opacity:0;transform:scale(.85)translateY(12px)}100%{opacity:1;transform:scale(1)translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .32s ease forwards;}
.shake{animation:diceShake .07s infinite;}
.reveal{animation:cardReveal .4s ease forwards;}
#app{max-width:720px;margin:0 auto;padding:0 16px 80px;}
#hdr{background:linear-gradient(180deg,#0d1218,transparent);padding:20px 18px 0;margin-bottom:6px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
#hdr-inner{max-width:720px;margin:0 auto;}
.hdr-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.logo-box{background:var(--as);border:1px solid var(--accent)33;border-radius:11px;padding:7px 13px;font-size:19px;flex-shrink:0;}
.prog-wrap{margin-top:14px;margin-bottom:2px;}
.prog-bar{display:flex;gap:2px;}
.prog-seg{flex:1;height:4px;border-radius:99px;background:var(--border);transition:background .3s;}
.prog-labels{display:flex;justify-content:space-between;margin-top:4px;}
.prog-labels span{color:var(--muted);font-size:9px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:0 2px 20px #00000055;}
.card.gold{border-color:var(--accent)55;box-shadow:0 0 28px var(--accent)22;}
.card.green{border-color:var(--green)55;box-shadow:0 0 28px var(--green)22;}
.card.red{border-color:var(--red)55;box-shadow:0 0 28px var(--red)22;}
.card.blue{border-color:var(--blue)55;box-shadow:0 0 28px var(--blue)22;}
.card.purple{border-color:var(--purple)55;box-shadow:0 0 28px var(--purple)22;}
.card.teal{border-color:var(--teal)55;box-shadow:0 0 28px var(--teal)22;}
.card.dark{background:#080c18;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;}
.col{display:flex;flex-direction:column;gap:15px;}
.stat{text-align:center;}
.stat .val{font-family:'Space Mono',monospace;font-weight:800;line-height:1;}
.stat .lbl{color:var(--muted);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
.badge{display:inline-block;border-radius:99px;font-weight:700;white-space:nowrap;}
.pbar{background:#151f35;border-radius:99px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:99px;transition:width 1.2s cubic-bezier(.4,2,.6,1);}
.inp-wrap{display:flex;flex-direction:column;gap:5px;}
.inp-label{color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.inp-hint{color:var(--dim);font-size:10px;}
.inp-row{display:flex;align-items:center;background:#080c18;border:1px solid var(--border);border-radius:9px;overflow:hidden;transition:border-color .2s;}
.inp-row:focus-within{border-color:var(--accent)66;}
.inp-pre{color:var(--muted);padding:9px 11px;background:#111825;font-size:12px;border-right:1px solid var(--border);}
.inp-suf{color:var(--muted);padding:9px 11px;font-size:11px;}
.inp-row input,.inp-row select{flex:1;background:transparent;border:none;outline:none;color:var(--text);padding:10px 13px;font-size:15px;font-family:'Space Mono',monospace;width:100%;}
.inp-row select option{background:#0e1320;}
.btn{border-radius:10px;font-weight:800;font-size:12px;letter-spacing:.3px;transition:opacity .15s,transform .1s;border:none;}
.btn:hover{opacity:.85;transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.btn.primary{background:var(--accent);color:#060a12;}
.btn.gold{background:var(--accent);color:#060a12;}
.btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent)55;}
.btn.dark{background:#151f35;color:var(--muted);border:1px solid var(--border);}
.btn.green{background:var(--green);color:#060a12;}
.btn.blue{background:var(--blue);color:#060a12;}
.btn.red{background:var(--red);color:#fff;}
.btn.teal{background:var(--teal);color:#060a12;}
.btn.purple{background:var(--purple);color:#fff;}
.btn.sm{padding:6px 14px;font-size:11px;}
.btn.md{padding:9px 20px;}
.btn.lg{padding:13px 28px;font-size:14px;}
.btn.xl{padding:15px 38px;font-size:16px;}
.btn.full{width:100%;}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:14px;}
.round-hdr{border-radius:14px;padding:14px 17px;margin-bottom:15px;display:flex;gap:13px;align-items:center;}
.dice-face{width:72px;height:72px;border-radius:14px;font-size:42px;display:flex;align-items:center;justify-content:center;transition:all .3s;flex-shrink:0;}
.modal-overlay{position:fixed;inset:0;background:#000000bb;z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--card);border-radius:20px;padding:26px;max-width:480px;width:100%;animation:slideDown .25s ease;max-height:88vh;overflow-y:auto;}
.modal-progress{display:flex;gap:5px;margin-bottom:20px;}
.modal-prog-seg{flex:1;height:3px;border-radius:99px;cursor:pointer;transition:background .3s;}
.resume-banner{background:linear-gradient(135deg,#1a1000,#0a0800);border:1px solid var(--accent)55;border-radius:14px;padding:14px 17px;display:flex;align-items:center;gap:13px;margin-bottom:16px;}
.cert{background:linear-gradient(135deg,#1a1200,#0e0a00);border:1px solid var(--accent)55;border-radius:16px;padding:28px;text-align:center;}
.ai-bubble{background:linear-gradient(135deg,#0a1428,#060e18);border:1px solid var(--blue)44;border-radius:16px 16px 16px 4px;padding:16px 18px;position:relative;}
.ai-bubble::before{content:'';position:absolute;bottom:-8px;left:20px;width:16px;height:16px;background:#0a1428;border-bottom:1px solid var(--blue)44;border-right:1px solid var(--blue)44;transform:rotate(45deg);}
.priority-card{border-radius:14px;padding:16px;border:2px solid var(--border);transition:all .2s;}
.priority-card.urgent{border-color:var(--red);background:var(--rs);}
.priority-card.action{border-color:var(--accent);background:var(--as);}
.priority-card.good{border-color:var(--green);background:var(--grs);}
.month-banner{background:linear-gradient(135deg,#1a1000,#0a0800);border:1px solid var(--accent)33;border-radius:13px;padding:13px 16px;display:flex;align-items:center;gap:12px;}
.check-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--border)22;}
.day-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .13s;}
.day-check.done{background:var(--green);border-color:var(--green);color:#060a12;}
.nw-row{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--border)22;font-size:12px;}
.stmt-row{display:flex;justify-content:space-between;padding:7px 0;border-top:1px solid #1a264022;font-size:12px;}
@media(max-width:500px){.g4{grid-template-columns:1fr 1fr;}.g3{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<div id="htp-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeHTP()">
  <div class="modal-box" id="htp-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div><div style="color:var(--teal);font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:1.5px">How to Play</div><div style="color:var(--muted);font-size:11px;margin-top:2px" id="htp-step-lbl">Step 1 of 10</div></div>
      <button class="btn dark sm" onclick="closeHTP()">✕ Close</button>
    </div>
    <div class="modal-progress" id="htp-dots"></div>

    <div style="display:flex;gap:10px;margin-top:20px">

      <div style="flex:1"></div>
      <button class="btn primary md" id="htp-next" onclick="htpNav(1)">Next →</button>
    </div>

</div>

<div id="hdr">
  <div id="hdr-inner">
    <div class="hdr-row">
      <div class="logo-box">💰</div>
      <div>
        <div style="color:var(--accent);font-weight:900;font-size:16px;letter-spacing:-0.5px">nugO Personal Finance Lab</div>
        <div style="color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:1.5px">Real Numbers · AI Guidance · 12-Month Simulation</div>
      </div>
      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
        <div id="save-flash" style="color:var(--green);font-size:10px;font-weight:700;display:none">💾 Saved</div>
        <button class="btn dark sm" onclick="openHTP()" style="background:var(--ps);border:1px solid var(--purple)55;color:var(--purple)">❓ How to Play</button>
        <div id="user-hdr" style="display:none;text-align:right">
          <div id="user-hdr-name" style="color:var(--gold);font-weight:800;font-size:12px"></div>
          <div id="user-hdr-score" style="color:var(--muted);font-size:9px"></div>
        </div>
      </div>
    </div>
    <div id="prog-wrap" class="prog-wrap" style="display:none">
      <div class="prog-bar" id="prog-bar"></div>
      <div class="prog-labels"><span id="prog-l">Round 1 of 20</span><span id="prog-r" style="color:var(--accent)">0%</span></div>
    </div>
  </div>
</div>

<div id="app"><div id="screen"></div></div>

<script>
// ═══════════════════════════════════
// DATA
// ═══════════════════════════════════
const LIFE_EVENTS=[
  {id:"carbreak",  e:"🚗",t:"Car Broke Down",          d:"Unexpected repair bill this month.",                    ef:"expense",v:800,   lbl:"-$800 Repair",      c:"var(--red)"},

  {id:"raise",     e:"📈",t:"Got a Raise!",             d:"Your employer increased your monthly salary.",          ef:"income", v:300,   lbl:"+$300 Income",      c:"var(--green)"},
  {id:"layoff",    e:"😰",t:"Hours Cut",                d:"Work hours reduced — lower income this month.",         ef:"income", v:-500,  lbl:"-$500 Income",      c:"var(--red)"},

  {id:"refund",    e:"💸",t:"Tax Refund Arrived!",      d:"Your tax refund hit your account this month.",          ef:"income", v:1200,  lbl:"+$1,200 Refund",    c:"var(--accent)"},
  {id:"sidehustle",e:"💻",t:"Side Hustle Pays Off",     d:"Your side gig brought in extra cash.",                  ef:"income", v:450,   lbl:"+$450 Extra",       c:"var(--green)"},
  {id:"rentup",    e:"🏠",t:"Rent Increased",           d:"Landlord raised your rent starting this month.",        ef:"expense",v:150,   lbl:"+$150 Rent Hike",   c:"var(--red)"},
  {id:"bonus",     e:"🎉",t:"Year-End Bonus!",          d:"Your employer paid out a performance bonus.",           ef:"income", v:1500,  lbl:"+$1,500 Bonus",     c:"var(--accent)"},
  {id:"invdip",    e:"📉",t:"Investment Dip",           d:"Market pulled back — portfolio value dropped.",         ef:"invest", v:-0.08, lbl:"-8% Portfolio",     c:"var(--orange)"},
  {id:"invgain",   e:"📊",t:"Investment Gains",         d:"Strong market month — portfolio gained value.",         ef:"invest", v:0.06,  lbl:"+6% Portfolio",     c:"var(--green)"},
  {id:"emergency", e:"🔥",t:"Home Emergency",           d:"Appliance broke or pipe burst — repair needed.",        ef:"expense",v:950,   lbl:"-$950 Emergency",   c:"var(--red)"},
  {id:"freelance", e:"🤝",t:"Freelance Project",        d:"Extra freelance work came your way this month.",        ef:"income", v:700,   lbl:"+$700 Freelance",   c:"var(--green)"},
  {id:"subs",      e:"📱",t:"Subscription Creep",       d:"You've been overpaying on subscriptions.",              ef:"expense",v:120,   lbl:"-$120 Subscriptions",c:"var(--orange)"},
  {id:"foodinfl",  e:"🛒",t:"Grocery Prices Up",        d:"Inflation hit the grocery store hard this month.",      ef:"expense",v:100,   lbl:"+$100 Food Costs",  c:"var(--red)"},
  {id:"windfall",  e:"🎁",t:"Unexpected Windfall",      d:"Birthday gift, inheritance, or lottery scratch win.",   ef:"income", v:500,   lbl:"+$500 Windfall",    c:"var(--accent)"},
  {id:"creditup",  e:"⭐",t:"Credit Score Boost",       d:"On-time payments boosted your credit score.",           ef:"credit", v:15,    lbl:"+15 Credit Pts",    c:"var(--blue)"},
  {id:"creditdn",  e:"⚠️",t:"Missed Payment",           d:"You missed a payment — credit score took a hit.",       ef:"credit", v:-25,   lbl:"-25 Credit Pts",    c:"var(--red)"},
  {id:"sale",      e:"🏷️",t:"Big Sale — Smart Buy",    d:"You found a great deal and saved on a purchase.",       ef:"expense",v:-200,  lbl:"-$200 Saved",       c:"var(--green)"},
  {id:"pet",       e:"🐾",t:"Pet Vet Bill",             d:"Your furry friend needed an unexpected vet visit.",     ef:"expense",v:350,   lbl:"-$350 Vet Bill",    c:"var(--red)"},
];

const MONTH_NAMES=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DICE_FACES=["⚀","⚁","⚂","⚃","⚄","⚅"];
const TOTAL_ROUNDS=20;
const SAVE_KEY="nugo-finance-v2";

const HTP=[
  {icon:"💰",title:"Welcome to the Personal Finance Lab",color:"var(--accent)",body:"This lab uses YOUR real financial numbers — not a preset profile. Enter your actual income, expenses, debt, and savings. The AI analyzes your situation and gives you a personalized financial plan for the next 12 months."},
  {icon:"📋",title:"Round 1 — Enter Your Real Numbers",color:"var(--accent)",body:"You will enter your actual monthly income, rent, groceries, transportation, utilities, total debt, current savings, credit score, and your primary financial goal. The more honest you are, the more useful your plan will be."},
  {icon:"🧠",title:"Round 2 — AI Financial Snapshot",color:"var(--blue)",body:"The AI analyzes all your numbers and gives you a complete financial health assessment — your savings rate, debt-to-income ratio, financial health score, and most importantly, your #1 priority right now based on your real situation."},
  {icon:"📊",title:"Round 3 — Build Your Real Budget",color:"var(--accent)",body:"Using YOUR income, you build a real 50/30/20 budget. The AI tells you exactly how much to allocate to needs, wants, and savings based on your actual numbers — not generic advice."},
  {icon:"🛡️",title:"Round 4 — Emergency Fund Plan",color:"var(--teal)",body:"The AI calculates YOUR specific emergency fund target based on your actual monthly expenses. It tells you exactly how many months it will take to reach it at your current savings rate — and gives you a faster path."},
  {icon:"💳",title:"Round 5 — Debt Strategy",color:"var(--red)",body:"Based on your actual debt amount and income, the AI recommends either the Avalanche method (saves the most money) or Snowball method (builds momentum). It calculates exactly how much interest you'll save with each approach."},
  {icon:"⭐",title:"Round 6 — Credit Decision",color:"var(--blue)",body:"Based on your actual credit score, the AI gives you the 3 most impactful actions to take right now. Different advice for a 580 score vs a 680 score vs a 740 score — because the strategy changes at each level."},
  {icon:"📈",title:"Round 7 — Investment Plan",color:"var(--green)",body:"The AI checks if you're ready to invest based on your emergency fund and debt levels — then recommends exactly how much to put in your 401(k), Roth IRA, and index funds based on YOUR income and goals."},
  {icon:"📅",title:"Rounds 8–19 — 12 Months of Life",color:"var(--blue)",body:"Each round = one month. You review your financial position, make decisions on payments and savings, then roll 2 dice. A random life event is auto-applied — raise, car breakdown, bonus, medical bill, investment dip. Just like real life."},
  {icon:"🔍",title:"Round 20 — Full Financial Audit",color:"var(--teal)",body:"Review your Net Worth Statement, budget performance, debt payoff progress, investment growth, and credit score journey. Complete the 12-item Financial Health Checklist and receive your personalized Financial Health Opinion and Certificate of Completion."},
];

const AUDIT_CHECKS=[
  {id:"budget",    lbl:"Monthly budget was followed — spending stayed within plan",    cat:"Budgeting",  risk:"high"},
  {id:"emergency", lbl:"Emergency fund reached or grew toward target",                 cat:"Savings",    risk:"high"},
  {id:"debt",      lbl:"Debt balance decreased over the 12-month period",             cat:"Debt",       risk:"high"},
  {id:"credit",    lbl:"Credit score maintained or improved",                         cat:"Credit",     risk:"medium"},
  {id:"invest",    lbl:"Consistent investing contributions were made",                 cat:"Investing",  risk:"medium"},
  {id:"savings",   lbl:"Personal savings rate is positive (not spending all income)", cat:"Savings",    risk:"high"},
  {id:"needs",     lbl:"Needs spending stayed at or below 50% of income",             cat:"Budgeting",  risk:"medium"},
  {id:"wants",     lbl:"Wants spending stayed at or below 30% of income",             cat:"Budgeting",  risk:"low"},
  {id:"networth",  lbl:"Net worth increased compared to starting position",            cat:"Net Worth",  risk:"high"},
  {id:"taxes",     lbl:"Income and major deductions were tracked",                     cat:"Taxes",      risk:"medium"},
  {id:"insure",    lbl:"Adequate insurance coverage was maintained",                   cat:"Protection", risk:"low"},
  {id:"goals",     lbl:"At least one financial goal was set and actively tracked",     cat:"Planning",   risk:"low"},
];

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let S={round:0,user:null,months:[],auditChecks:{},strategy:{},showCert:false};
let _htpStep=0,_auditTab="networth";
let _diceRolled=false,_chosenEvent=null,_diceInterval=null;

function saveGame(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(S));const el=document.getElementById("save-flash");if(el){el.style.display="flex";setTimeout(()=>el.style.display="none",2200);}}catch(e){}}
function loadSave(){try{return JSON.parse(localStorage.getItem(SAVE_KEY)||"null");}catch{return null;}}
function clearSave(){try{localStorage.removeItem(SAVE_KEY);}catch{}}
function advance(){S.round++;if(S.round>0&&S.user)saveGame();render();}

// ═══════════════════════════════════
// AI DECISION ENGINE
// ═══════════════════════════════════
function getAIAnalysis(u){
  const disposable=u.income-u.expenses;
  const savingsRate=u.income>0?disposable/u.income:0;
  const debtRatio=u.income>0?u.debt/(u.income*12):0;
  const efTarget=u.expenses*3;
  const efStatus=u.savings>=efTarget?"funded":u.savings>=efTarget*0.5?"halfway":"critical";
  const creditLabel=u.credit<580?"Damaged":u.credit<670?"Fair":u.credit<740?"Good":u.credit<800?"Very Good":"Excellent";
  const creditColor=u.credit<580?"var(--red)":u.credit<670?"var(--orange)":u.credit<740?"var(--accent)":u.credit<800?"var(--green)":"var(--teal)";

  // Financial Health Score
  const creditScore=Math.round(clamp((u.credit-300)/550,0,1)*25);
  const savingsScore=Math.round(clamp(savingsRate*200,0,25));
  const debtScore=Math.round(clamp((1-debtRatio)*25,0,25));
  const efScore=Math.round(efStatus==="funded"?25:efStatus==="halfway"?12:0);
  const healthScore=creditScore+savingsScore+debtScore+efScore;

  // Priority
  let priority,priorityColor,priorityIcon;
  if(efStatus==="critical"&&savingsRate<0.05){
    priority="You are spending too much and have no safety net. One emergency wipes everything out.";
    priorityColor="var(--red)";priorityIcon="🚨";
  } else if(efStatus==="critical"){
    priority="Build a $500 mini emergency fund first — before anything else.";
    priorityColor="var(--red)";priorityIcon="🛡️";
  } else if(u.credit<600){
    priority="Your credit score needs urgent attention — it's blocking your financial future.";
    priorityColor="var(--red)";priorityIcon="⭐";
  } else if(u.debt>u.income*6){
    priority="Your debt load is high — focus on aggressive payoff before investing.";
    priorityColor="var(--orange)";priorityIcon="💳";
  } else if(efStatus==="halfway"){
    priority="Fully fund your emergency fund — you're halfway there.";
    priorityColor="var(--accent)";priorityIcon="🛡️";
  } else if(savingsRate<0.10){
    priority="Increase your savings rate — you're not saving enough to build wealth.";
    priorityColor="var(--accent)";priorityIcon="📊";
  } else {
    priority="Your foundation is solid — focus on growing your investments now.";
    priorityColor="var(--green)";priorityIcon="📈";
  }

  return {disposable,savingsRate,debtRatio,efTarget,efStatus,creditLabel,creditColor,healthScore,priority,priorityColor,priorityIcon,creditScore,savingsScore,debtScore,efScore};
}

function getDebtRecommendation(u){
  const monthlyExtra=Math.round((u.income-u.expenses)*0.3);
  const highInterest=u.debt>0&&u.income>0&&u.debt/(u.income)>8;
  const method=highInterest?"Avalanche":"Snowball";
  const interestSaved=Math.round(u.debt*0.18*0.7);
  const payoffMonths=monthlyExtra>0?Math.ceil(u.debt/monthlyExtra):0;
  return {method,interestSaved,monthlyExtra,payoffMonths};
}

function getCreditMoves(score){
  if(score<580) return ["Stop all new credit applications immediately","Pay down highest utilization card first — target under 30%","Set up autopay on ALL accounts today","Dispute any errors at AnnualCreditReport.com","Get a secured credit card if you have none"];
  if(score<670) return ["Pay down cards to below 20% utilization","Do not close old accounts — keep them open","Avoid new hard inquiries for 6 months","Make every payment on time — set up autopay","Consider a credit limit increase request"];
  if(score<740) return ["Push utilization below 10% for maximum impact","Request credit limit increases — lowers ratio instantly","Keep perfect payment streak going","Diversify credit mix if you only have one type"];
  return ["Keep utilization below 10% consistently","Only apply for credit when genuinely needed","Consider a premium rewards card to maximize your excellent score"];
}

function getInvestmentPlan(u,ai){
  const monthly401k=Math.round(u.income*0.04);
  const monthlyRoth=Math.round(u.income*0.03);
  const monthlyIndex=Math.round(u.income*0.03);
  const ready=ai.efStatus==="funded"&&u.credit>=600;
  return {monthly401k,monthlyRoth,monthlyIndex,ready,total:monthly401k+monthlyRoth+monthlyIndex};
}

const fmt  = n=>"$"+Math.abs(Math.round(n)).toLocaleString();
const fmtS = n=>(n>=0?"+":"−")+fmt(n);
const pct  = (a,b)=>b===0?"0%":Math.round((a/b)*100)+"%";
const clamp= (v,lo,hi)=>Math.min(hi,Math.max(lo,v));
const b    = (txt,fn,v="primary",sz="md",dis=false)=>
  `<button class="btn ${v} ${sz}" onclick="${fn}" ${dis?"disabled":""}>${txt}</button>`;
const bdg  = (txt,color,sz="sm")=>
  `<span class="badge" style="background:${color}28;color:${color};border:1px solid ${color}44;padding:${sz==="lg"?"4px 14px":"2px 10px"};font-size:${sz==="lg"?13:11}px">${txt}</span>`;
const st   = (lbl,val,color,sm=false)=>
  `<div class="stat"><div class="val" style="color:${color};font-size:${sm?14:20}px">${val}</div><div class="lbl">${lbl}</div></div>`;
const pb   = (p,color,h=8)=>
  `<div class="pbar" style="height:${h}px"><div class="pbar-fill" style="width:${clamp(p,0,100)}%;background:${color}"></div></div>`;
const card = (c,cls="",style="")=>`<div class="card ${cls}" style="${style}">${c}</div>`;
const inp  = (lbl,id,type,val,pre="",suf="",hint="")=>{
  const pH=pre?`<span class="inp-pre">${pre}</span>`:"";
  const sH=suf?`<span class="inp-suf">${suf}</span>`:"";
  const hH=hint?`<div class="inp-hint">${hint}</div>`:"";
  if(type==="select") return `<div class="inp-wrap"><label class="inp-label">${lbl}</label>${hH}<div class="inp-row">${pH}<select id="${id}">${val}</select></div></div>`;

};
const aiBubble=(msg,title="nugO AI Coach")=>`

function roundHdr(icon,rndNum,title,desc){
  const r=S.round;
  const isAudit=r===20;const isMonth=r>=8&&r<=19;const isStrat=r>=3&&r<=7;

  return `<div class="round-hdr" style="background:linear-gradient(135deg,${bgC},transparent);border:1px solid ${brdC}44">

function updateHeader(){
  const pw=document.getElementById("prog-wrap"),uh=document.getElementById("user-hdr");
  if(S.round===0){if(pw)pw.style.display="none";if(uh)uh.style.display="none";return;}
  if(pw)pw.style.display="block";
  const bar=document.getElementById("prog-bar");
  if(bar)bar.innerHTML=Array.from({length:TOTAL_ROUNDS},(_,i)=>{
    const done=i<S.round;
    const col=i===19?"var(--teal)":i>=7&&i<=18?"var(--accent)":i>=2&&i<=6?"var(--green)":"var(--accent)";
    return `<div class="prog-seg" style="background:${done?col:i===S.round-1?col+"88":"var(--border)"}"></div>`;
  }).join("");
  const pl=document.getElementById("prog-l");if(pl)pl.textContent=`Round ${S.round} of ${TOTAL_ROUNDS}`;
  const pr=document.getElementById("prog-r");if(pr)pr.textContent=Math.round((S.round/TOTAL_ROUNDS)*100)+"%";
  if(S.user&&uh){
    uh.style.display="block";
    const un=document.getElementById("user-hdr-name");if(un)un.textContent=S.user.name;
    const us=document.getElementById("user-hdr-score");
    if(us){
      const lastMonth=S.months[S.months.length-1];
      const savings=lastMonth?lastMonth.savingsEnd:S.user.savings;
      if(us)us.textContent="Savings: "+fmt(savings);
    }
  }
}

        ai.efStatus==="halfway"?`You need ${fmt(ai.efTarget-u.savings)} more. At your current ${fmt(S.strategy.savings||200)}/month savings rate, you'll reach your goal in <strong style="color:var(--gold)">${monthsToReach} months</strong>.`:

function rollDice(mi){
  if(_diceRolled)return;
  let count=0;
  const d1=document.getElementById("d1"),d2=document.getElementById("d2"),ctrl=document.getElementById("dice-ctrl");
  ctrl.innerHTML=`<div style="color:var(--purple);font-weight:800;font-size:13px;animation:pulse 0.45s infinite">Rolling…</div>`;
  d1.classList.add("shake");d2.classList.add("shake");
  d1.style.border="2px solid var(--purple)";d1.style.background="var(--ps)";
  d2.style.border="2px solid var(--purple)";d2.style.background="var(--ps)";
  _diceInterval=setInterval(()=>{
    const r1=Math.floor(Math.random()*6),r2=Math.floor(Math.random()*6);

          </div>
        </div>
        <div style="text-align:center;margin-top:14px">${b("↺ Start New Journey","restartFull()","ghost","md")}</div>`;
    }
  }
  return `
    ${roundHdr("🔍",20,"Full Financial Audit","Net Worth · Budget · Debt · Investments · AI Opinion")}
    <div style="background:linear-gradient(135deg,#1a1200,#0a0800);border:1px solid var(--teal)44;border-radius:13px;padding:14px 17px;display:flex;align-items:center;gap:13px;margin-bottom:14px;flex-wrap:wrap">
      <div style="font-size:28px">💰</div>
      <div style="flex:1"><div style="color:var(--teal);font-weight:900;font-size:14px">${u.name} — Annual Financial Review</div><div style="color:var(--muted);font-size:11px;margin-top:2px">AI-Powered · 12-Month Personal Finance Journey</div></div>
      <div style="display:flex;gap:13px;flex-wrap:wrap">
        ${st("Net Worth",fmt(netWorthEnd),netWorthEnd>=netWorthStart?"var(--accent)":"var(--red)","sm")}
        ${st("Change",fmtS(nwChange),nwChange>=0?"var(--green)":"var(--red)","sm")}
        ${st("Health",opinionIcon,opinionColor,"sm")}
      </div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
      ${tabs.map(t=>`<button class="btn ${_auditTab===t.id?"gold":"dark"} sm" onclick="setAuditTab('${t.id}')">${t.lbl}</button>`).join("")}
    </div>
    ${card(tabContent)}
    ${restartLink()}`;
}

function setCheck(id,val){S.auditChecks[id]=val;saveGame();render();}
function setAuditTab(tab){_auditTab=tab;render();}

// ═══════════════════════════════════
// HOW TO PLAY MODAL
// ═══════════════════════════════════
function openHTP(){_htpStep=0;renderHTP();document.getElementById("htp-modal").style.display="flex";}
function closeHTP(){document.getElementById("htp-modal").style.display="none";}
function htpNav(dir){_htpStep=Math.max(0,Math.min(HTP.length-1,_htpStep+dir));renderHTP();}
function renderHTP(){
  const s=HTP[_htpStep];
  document.getElementById("htp-step-lbl").textContent=`Step ${_htpStep+1} of ${HTP.length}`;
  document.getElementById("htp-dots").innerHTML=HTP.map((_,i)=>`<div class="modal-prog-seg" onclick="_htpStep=${i};renderHTP()" style="background:${i<=_htpStep?s.color:"var(--border)"}"></div>`).join("");
  document.getElementById("htp-content").innerHTML=`<div style="text-align:center;margin-bottom:14px"><div style="font-size:52px;margin-bottom:12px">${s.icon}</div><div style="color:${s.color};font-weight:900;font-size:16px;margin-bottom:10px;line-height:1.3">${s.title}</div><div style="color:var(--muted);font-size:13px;line-height:1.85;text-align:left">${s.body}</div></div>`;
  document.getElementById("htp-prev").style.display=_htpStep===0?"none":"inline-block";
  const nx=document.getElementById("htp-next");
  if(_htpStep===HTP.length-1){nx.textContent="Let's Start! 💰";nx.className="btn gold md";nx.onclick=closeHTP;}
  else{nx.textContent="Next →";nx.className="btn blue md";nx.onclick=()=>htpNav(1);}
  const box=document.getElementById("htp-box");
  if(box){box.style.borderColor=s.color+"55";box.style.boxShadow=`0 0 48px ${s.color}33`;}
}

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
window.onload=function(){_auditTab="networth";render();};
</script>
